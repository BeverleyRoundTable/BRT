<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TurboSanta — Route Card Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  /* ═══════════════════════════════════════ */
  /* TURBOSANTA DESIGN SYSTEM */
  /* ═══════════════════════════════════════ */
  :root {
    --gold: #FBAF33;
    --gold-dim: rgba(251,175,51,0.12);
    --gold-glow: rgba(251,175,51,0.25);
    --dark: #0d0d0b;
    --surface: #161614;
    --surface-2: #1e1e1b;
    --surface-3: #252522;
    --border: rgba(255,255,255,0.08);
    --border-gold: rgba(251,175,51,0.2);
    --text: #eaeae5;
    --text-dim: rgba(255,255,255,0.55);
    --text-muted: rgba(255,255,255,0.3);
    --red: #D31C1C;
    --success: #2ecc71;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    background: var(--dark);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── LAYOUT ── */
  .app {
    max-width: 1200px;
    margin: 0 auto;
    padding: 48px 24px 64px;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 56px;
    letter-spacing: 2px;
    color: #fff;
    line-height: 1;
    margin-bottom: 8px;
  }
  
  header h1 span { color: var(--gold); }

  header p {
    color: var(--text-dim);
    font-size: 15px;
    font-weight: 500;
  }

  .btn {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 14px;
    border: none;
    border-radius: 8px;
    padding: 12px 24px;
    cursor: pointer;
    transition: transform 0.1s, background 0.2s;
    white-space: nowrap;
    text-align: center;
  }

  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-primary {
    background: var(--red);
    color: white;
  }
  .btn-primary:hover { background: #e02a2a; }

  .btn-ghost {
    background: var(--surface-2);
    color: #fff;
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--surface-3); }

  .btn-gold {
    background: var(--gold);
    color: #000;
  }
  .btn-gold:hover { background: #e59d28; }

  /* ── STATUS ── */
  .status {
    text-align: center;
    padding: 48px;
    color: var(--text-dim);
    font-size: 14px;
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 500;
  }

  .status.error { color: var(--red); }

  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── ROUTE LIST ── */
  .routes-grid {
    display: grid;
    gap: 24px;
  }

  .route-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 32px 28px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 24px;
    align-items: center;
    transition: border-color 0.2s, transform 0.2s;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }

  .route-item:hover { 
    border-color: var(--border-gold); 
    transform: translateY(-2px);
  }

  .route-meta h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 1px;
    color: #fff;
    margin-bottom: 8px;
    line-height: 1;
  }

  .route-meta .date {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .route-meta .streets {
    font-size: 14px;
    color: var(--text-dim);
    line-height: 1.5;
    max-width: 500px;
  }

  .route-actions {
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-width: 160px;
  }

  /* ── CARD FORMATS SELECTOR ── */
  .format-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .format-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
    flex: 1;
    text-align: center;
  }

  .format-btn:hover { border-color: var(--border-gold); color: #fff; }
  .format-btn.active { border-color: var(--gold); background: var(--gold); color: #000; }

  /* ── CUSTOM TEXT INPUT ── */
  .custom-field {
    margin-top: 20px;
  }

  .custom-field label {
    display: block; 
    font-family: 'DM Mono', monospace;
    font-size: 10px; 
    font-weight: 700;
    color: var(--text-muted); 
    text-transform: uppercase;
    letter-spacing: 1.5px; 
    margin-bottom: 8px;
  }

  .custom-field input,
  .custom-field textarea {
    width: 100%;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    color: #fff;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    resize: vertical;
    transition: all 0.2s;
  }
  
  .custom-field input::placeholder,
  .custom-field textarea::placeholder {
    color: var(--text-muted);
  }

  .custom-field input:focus,
  .custom-field textarea:focus { 
    border-color: var(--gold); 
    box-shadow: 0 0 0 3px var(--gold-glow);
  }

  .edit-fields {
    display: none;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .edit-fields.open { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .toggle-edit {
    font-size: 13px;
    color: var(--text-dim);
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 4px;
    font-family: 'DM Sans', sans-serif;
    margin-top: 16px;
    font-weight: 600;
    transition: color 0.15s;
  }

  .toggle-edit:hover { color: var(--gold); }

  /* ── PREVIEW MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(13, 13, 11, 0.95);
    z-index: 9000;
    align-items: center;
    justify-content: center;
    padding: 24px;
    backdrop-filter: blur(8px);
  }

  .modal-overlay.open { display: flex; }

  .modal-inner {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    max-width: 90vw;
    max-height: 90vh;
    overflow: auto;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
  }

  .modal-inner h2 {
    font-family: 'Bebas Neue', sans-serif;
    margin-bottom: 20px;
    font-size: 32px;
    letter-spacing: 1px;
    color: #fff;
    line-height: 1;
  }

  .preview-wrap {
    display: inline-block;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    margin-bottom: 24px;
    border: 1px solid var(--border);
  }

  .modal-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }

  /* ── CAPTION AREA ── */
  .caption-area {
    margin-top: 32px;
    text-align: left;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    position: relative;
  }

  .caption-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  .btn-copy {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 700;
    background: var(--surface-3);
    color: #fff;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    cursor: pointer;
    transition: 0.15s;
  }

  .btn-copy:hover {
    background: var(--gold);
    color: #000;
    border-color: var(--gold);
  }

  .btn-copy:active { transform: scale(0.95); }

  .caption-text {
    width: 100%;
    min-height: 140px;
    background: var(--dark);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    color: var(--text);
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    line-height: 1.6;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }

  .caption-text:focus { border-color: var(--gold); }

  .caption-copied {
    display: none;
    position: absolute;
    top: 20px;
    right: 80px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--green);
  }

  .caption-copied.show { display: inline; }

  /* ── CARD CANVAS (rendered offscreen then captured) ── */
  .card-render-area {
    position: fixed;
    left: -9999px;
    top: 0;
  }

  /* ===========================
     CARD DESIGNS — V3 (bg image)
     =========================== */

  /* ── SHARED ── */
  .card-square, .card-landscape, .card-story {
    position: relative;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
    color: white;
    background: #0d0d0b;
  }

  .card-bg-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
  }

  /* Story: image sits in top portion only, not stretched full height */
  .card-story .card-bg-img {
    height: 65%;
    bottom: auto;
  }

  .card-bg-overlay {
    position: absolute;
    inset: 0;
  }

  .card-accent-bar {
    height: 6px;
    background: linear-gradient(90deg, #D31C1C 0%, #FBAF33 100%);
    flex-shrink: 0;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 48px;
    background: #0d0d0b;
    flex-shrink: 0;
  }

  .card-footer-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .card-footer .card-logo {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    object-fit: contain;
    background: rgba(255,255,255,0.05);
    padding: 4px;
  }

  .card-footer .card-sleigh-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 1px;
    color: #fff;
    line-height: 1;
    margin-top: 4px;
  }

  .card-footer .card-sponsor-area {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .card-footer .card-sponsor-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #888;
  }

  .card-footer .card-sponsor-img {
    max-height: 40px;
    max-width: 160px;
    object-fit: contain;
  }

  .card-map-inset {
    border-radius: 12px;
    object-fit: cover;
    border: 4px solid rgba(255,255,255,0.1);
    box-shadow: 0 12px 40px rgba(0,0,0,0.8);
    flex-shrink: 0;
  }

  /* ── SQUARE 1080×1080 ── */
  .card-square { width: 1080px; height: 1080px; }

  .card-square .card-bg-overlay {
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.05) 0%,
      rgba(0,0,0,0.2) 25%,
      rgba(13,13,11,0.85) 45%,
      rgba(13,13,11,0.98) 55%,
      rgba(13,13,11,1) 100%
    );
  }

  /* No-image fallback */
  .card-square.no-bg .card-bg-overlay {
    background:
      radial-gradient(ellipse at 30% 20%, rgba(211,28,28,0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(251,175,51,0.1) 0%, transparent 50%),
      #0d0d0b;
  }

  .card-square .card-inner {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }

  .card-square .card-body {
    padding: 0 48px 32px;
  }

  .card-square .card-route-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    letter-spacing: 2px;
    line-height: 1;
    margin-bottom: 8px;
    color: #fff;
    text-shadow: 0 4px 12px rgba(0,0,0,0.6);
  }

  .card-square .card-date {
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: 2px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
  }

  .card-square .card-info-row {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .card-square .card-map-inset {
    width: 100%;
    height: 480px;
  }

  .card-square .card-streets {
    font-size: 22px;
    font-weight: 500;
    color: rgba(255,255,255,0.7);
    line-height: 1.5;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
  }

  .card-square .card-cta {
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--gold);
    margin-top: 16px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
  }

  .card-square .card-footer { padding: 24px 48px; }

  /* ── LANDSCAPE 1200×630 ── */
  .card-landscape { width: 1200px; height: 630px; }

  .card-landscape .card-bg-overlay {
    background: linear-gradient(
      to right,
      rgba(13,13,11,0.95) 0%,
      rgba(13,13,11,0.85) 40%,
      rgba(0,0,0,0.4) 70%,
      rgba(0,0,0,0.1) 100%
    );
  }

  .card-landscape.no-bg .card-bg-overlay {
    background:
      radial-gradient(ellipse at 20% 50%, rgba(211,28,28,0.12) 0%, transparent 60%),
      radial-gradient(ellipse at 90% 30%, rgba(251,175,51,0.08) 0%, transparent 50%),
      #0d0d0b;
  }

  .card-landscape .card-inner {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .card-landscape .card-main {
    flex: 1;
    display: flex;
    min-height: 0;
  }

  .card-landscape .card-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 40px 56px;
    max-width: 50%;
  }

  .card-landscape .card-route-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 56px;
    letter-spacing: 2px;
    line-height: 1;
    margin-bottom: 12px;
    color: #fff;
    text-shadow: 0 4px 16px rgba(0,0,0,0.8);
  }

  .card-landscape .card-date {
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 2px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
  }

  .card-landscape .card-streets {
    font-size: 18px;
    color: rgba(255,255,255,0.7);
    line-height: 1.5;
    font-weight: 500;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
  }

  .card-landscape .card-cta {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--gold);
    margin-top: 24px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
  }

  .card-landscape .card-footer {
    padding: 16px 56px;
  }

  .card-landscape .card-map-corner {
    width: 50%;
    flex-shrink: 0;
  }

  .card-landscape .card-map-inset {
    width: 100%;
    height: 100%;
    border-radius: 0;
    border: none;
    border-left: 2px solid var(--border);
    box-shadow: -12px 0 48px rgba(0,0,0,0.6);
  }

  .card-landscape .card-accent-bar,
  .card-landscape .card-footer {
    position: relative;
    z-index: 2;
  }

  .card-landscape .card-footer .card-logo { width: 40px; height: 40px; border-radius: 10px; }
  .card-landscape .card-footer .card-sleigh-name { font-size: 24px; margin-top: 2px; }
  .card-landscape .card-footer .card-sponsor-label { font-size: 10px; }
  .card-landscape .card-footer .card-sponsor-img { max-height: 32px; max-width: 120px; }

  /* ── STORY 1080×1920 ── */
  .card-story { width: 1080px; height: 1920px; }

  .card-story .card-bg-overlay {
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.05) 0%,
      rgba(0,0,0,0.1) 35%,
      rgba(13,13,11,0.7) 58%,
      rgba(13,13,11,0.98) 68%,
      rgba(13,13,11,1) 75%,
      rgba(13,13,11,1) 100%
    );
  }

  .card-story.no-bg .card-bg-overlay {
    background:
      radial-gradient(ellipse at 50% 20%, rgba(211,28,28,0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 50% 80%, rgba(251,175,51,0.1) 0%, transparent 50%),
      #0d0d0b;
  }

  .card-story .card-inner {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }

  .card-story .card-body {
    padding: 0 64px 48px;
    text-align: center;
  }

  .card-story .card-route-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 88px;
    letter-spacing: 2px;
    line-height: 1;
    margin-bottom: 16px;
    color: #fff;
    text-shadow: 0 6px 20px rgba(0,0,0,0.7);
  }

  .card-story .card-date {
    font-family: 'DM Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 24px;
    text-transform: uppercase;
    letter-spacing: 3px;
    text-shadow: 0 4px 16px rgba(0,0,0,0.8);
  }

  .card-story .card-streets {
    font-size: 28px;
    color: rgba(255,255,255,0.7);
    line-height: 1.5;
    max-width: 900px;
    margin: 0 auto;
    text-shadow: 0 2px 12px rgba(0,0,0,0.8);
    font-weight: 500;
  }

  .card-story .card-cta {
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-top: 32px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.8);
  }

  .card-story .card-map-inset {
    width: 940px;
    height: 660px;
    margin: 0 auto 32px;
  }

  .card-story .card-footer { padding: 32px 64px; }
  .card-story .card-footer .card-logo { width: 64px; height: 64px; border-radius: 16px; }
  .card-story .card-footer .card-sleigh-name { font-size: 40px; margin-top: 6px; }
  .card-story .card-footer .card-sponsor-img { max-height: 48px; max-width: 170px; }
  .card-story .card-footer .card-sponsor-label { font-size: 14px; }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    .route-item { grid-template-columns: 1fr; gap: 16px; }
    .route-actions { flex-direction: row; flex-wrap: wrap; }
    header h1 { font-size: 40px; }
    .modal-inner { padding: 20px; }
  }

</style>
</head>
<body>
<div class="app">
  <header>
    <h1>🎅 ROUTE CARD <span>GENERATOR</span></h1>
    <p>Generate branded social media cards from your TurboSanta routes</p>
  </header>

  <div id="routesList">
    <div class="status" id="statusMsg"><div class="spinner"></div>Loading routes…</div>
  </div>
</div>

<div class="modal-overlay" id="previewModal">
  <div class="modal-inner">
    <h2 id="previewTitle">Preview</h2>
    <div class="preview-wrap" id="previewWrap"></div>
    <div class="modal-actions">
      <button class="btn btn-gold" onclick="downloadCard()">⬇ Download PNG</button>
      <button class="btn btn-ghost" onclick="closePreview()">Close</button>
    </div>
    <div class="caption-area" id="captionArea">
      <div class="caption-header">
        <span>📋 Social Media Caption</span>
        <button class="btn-copy" onclick="copyCaption()">Copy</button>
      </div>
      <textarea class="caption-text" id="captionText" readonly></textarea>
      <div class="caption-copied" id="captionCopied">✓ Copied!</div>
    </div>
  </div>
</div>

<div class="card-render-area" id="renderArea"></div>

<script>
const STATE = {
  routes: [],
  settings: {},
  donations: {},
  currentCard: null,
  currentSlug: ''
};

// ── PERSISTENCE ──
function getApiUrl() {
  const params = new URLSearchParams(location.search);
  return params.get('api') || '';
}

// ── INIT ──
document.addEventListener('DOMContentLoaded', () => {
  const api = getApiUrl();
  if (!api) {
    document.getElementById('routesList').innerHTML =
      '<div class="status error">Missing <strong>?api=</strong> parameter.<br><br>Usage: <code>route_cards?api=YOUR_TURBOSANTA_API_URL</code></div>';
    return;
  }
  loadRoutes();
});

// ── LOAD ROUTES ──
async function loadRoutes() {
  const url = getApiUrl();
  const list = document.getElementById('routesList');
  list.innerHTML = '<div class="status"><div class="spinner"></div>Loading routes…</div>';

  try {
    const res = await fetch(url, { cache: 'no-store' });
    const data = await res.json();

    STATE.routes = data.routes || [];
    STATE.settings = data.settings || {};
    STATE.donations = data.donations || {};

    if (!STATE.routes.length) {
      list.innerHTML = '<div class="status">No routes found in API response.</div>';
      return;
    }

    renderRouteList();
  } catch(e) {
    list.innerHTML = `<div class="status error">Failed to load: ${e.message}</div>`;
  }
}

// ── FORMAT DATE ──
function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  if (isNaN(d)) return dateStr;
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
}

  function timeStr(route) {
  const s = route["Start Time"] || "";
  const e = route["End Time"] || "";
  return s ? ` · ${s}–${e}` : "";
}

function shortDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  if (isNaN(d)) return dateStr;
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`;
}

// ── RENDER ROUTE LIST ──
function renderRouteList() {
  const list = document.getElementById('routesList');
  const html = STATE.routes.map((r, i) => {
    const streets = r.streets || '';
    const streetsPreview = streets.length > 120 ? streets.slice(0,120) + '…' : streets;

    return `
      <div class="route-item">
        <div class="route-meta">
          <h3>${r.routeName || 'Unnamed Route'}</h3>
          <div class="date">📅 ${formatDate(r.date)}${timeStr(r)}</div>
          ${streetsPreview ? `<div class="streets">${streetsPreview}</div>` : ''}

          <button class="toggle-edit" onclick="toggleEdit(${i})">✏️ Customise text</button>
          <div class="edit-fields" id="edit-${i}">
            <div class="custom-field">
              <label>Route Title</label>
              <input type="text" id="title-${i}" value="${(r.routeName || '').replace(/"/g, '&quot;')}">
            </div>
            <div class="custom-field">
              <label>Date Text</label>
              <input type="text" id="date-${i}" value="${(formatDate(r.date) + timeStr(r)).replace(/"/g, '&quot;')}">
            </div>
            <div class="custom-field">
              <label>Streets / Description</label>
              <textarea rows="2" id="streets-${i}">${streets}</textarea>
            </div>
            <div class="custom-field">
              <label>Call to Action</label>
              <input type="text" id="cta-${i}" value="Track Santa live at our website!" placeholder="Track Santa live...">
            </div>
            <div class="custom-field">
              <label>Background Image URL (sleigh photo, event photo, etc.)</label>
              <input type="text" id="bg-${i}" value="${(r.bgImageUrl || STATE.settings?.bgImageUrl || '').replace(/"/g, '&quot;')}" placeholder="https://i.postimg.cc/…">
            </div>
          </div>
        </div>
        <div class="route-actions">
          <div class="format-row">
            <button class="format-btn active" data-route="${i}" data-fmt="square" onclick="selectFormat(this)">Square</button>
            <button class="format-btn" data-route="${i}" data-fmt="landscape" onclick="selectFormat(this)">Landscape</button>
            <button class="format-btn" data-route="${i}" data-fmt="story" onclick="selectFormat(this)">Story</button>
          </div>
          <button class="btn btn-gold" onclick="generateCard(${i})">Generate Card</button>
        </div>
      </div>
    `;
  }).join('');

  list.innerHTML = `<div class="routes-grid">${html}</div>`;
}

function toggleEdit(i) {
  document.getElementById(`edit-${i}`).classList.toggle('open');
}

function selectFormat(btn) {
  const route = btn.dataset.route;
  btn.parentElement.querySelectorAll('.format-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function getSelectedFormat(routeIndex) {
  const active = document.querySelector(`.format-btn.active[data-route="${routeIndex}"]`);
  return active ? active.dataset.fmt : 'square';
}

// ── PRELOAD IMAGE AS BASE64 ──
async function preloadImage(url) {
  if (!url) return '';
  try {
    return new Promise((resolve) => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => resolve(url);
      img.onerror = () => resolve('');
      img.src = url;
      setTimeout(() => resolve(url), 3000);
    });
  } catch { return ''; }
}

// ── GENERATE CARD ──
async function generateCard(routeIndex) {
  const route = STATE.routes[routeIndex];
  const format = getSelectedFormat(routeIndex);

  // Get custom values or defaults
  const title = document.getElementById(`title-${routeIndex}`)?.value || route.routeName || 'Route';
  const dateText = document.getElementById(`date-${routeIndex}`)?.value || formatDate(route.date);
  const streets = document.getElementById(`streets-${routeIndex}`)?.value || route.streets || '';
  const cta = document.getElementById(`cta-${routeIndex}`)?.value || 'Track Santa live at our website!';

  const logoUrl = STATE.settings.logo_overlay_url || '';
  const sponsorUrl = route.sponsorUrl || '';
  const mapUrl = route.mapImageUrl || '';
  const bgUrl = document.getElementById(`bg-${routeIndex}`)?.value || route.bgImageUrl || STATE.settings.bgImageUrl || '';
  const sleighName = STATE.settings.sleigh_display_name || STATE.settings.sleigh_name || 'Santa Sleigh';

  // Build card HTML
  const renderArea = document.getElementById('renderArea');
  let cardClass, cardHtml;

  const hasBg = !!bgUrl;
  const noBgClass = hasBg ? '' : ' no-bg';

  const logoHtml = logoUrl ? `<img class="card-logo" src="${logoUrl}" crossorigin="anonymous">` : '';
  const sponsorHtml = sponsorUrl ? `
    <div class="card-sponsor-area">
      <span class="card-sponsor-label">Proudly sponsored by</span>
      <img class="card-sponsor-img" src="${sponsorUrl}" crossorigin="anonymous">
    </div>` : '';

  const streetsHtml = streets ? `<div class="card-streets">${streets.replace(/,/g, ' · ')}</div>` : '';

  const bgHtml = hasBg
    ? `<img class="card-bg-img" src="${bgUrl}" crossorigin="anonymous">`
    : '';

  const footerHtml = `
    <div class="card-accent-bar"></div>
    <div class="card-footer">
      <div class="card-footer-left">
        ${logoHtml}
        <div class="card-sleigh-name">${sleighName}</div>
      </div>
      ${sponsorHtml}
    </div>`;

  // Map inset: always show if we have a map image
  const mapInsetHtml = mapUrl ? `<img class="card-map-inset" src="${mapUrl}" crossorigin="anonymous">` : '';
  // Background: use bg image if set, otherwise dark fallback
  const effectiveBgHtml = hasBg ? bgHtml : '';
  const effectiveNoBg = !hasBg;

  if (format === 'square') {
    cardClass = 'card-square' + (effectiveNoBg ? ' no-bg' : '');
    cardHtml = `
      ${effectiveBgHtml}
      <div class="card-bg-overlay"></div>
      <div class="card-inner">
        <div class="card-body">
          <div class="card-date">${dateText}</div>
          <div class="card-route-name">${title}</div>
          <div class="card-info-row">
            ${mapInsetHtml}
            <div class="card-info-text">
              ${streetsHtml}
              <div class="card-cta">${cta}</div>
            </div>
          </div>
        </div>
        ${footerHtml}
      </div>`;
  } else if (format === 'landscape') {
    cardClass = 'card-landscape' + (effectiveNoBg ? ' no-bg' : '');
    cardHtml = `
      ${effectiveBgHtml}
      <div class="card-bg-overlay"></div>
      <div class="card-inner">
        <div class="card-main">
          <div class="card-body">
            <div class="card-date">${dateText}</div>
            <div class="card-route-name">${title}</div>
            ${streetsHtml}
            <div class="card-cta">${cta}</div>
          </div>
          ${mapInsetHtml ? `<div class="card-map-corner">${mapInsetHtml}</div>` : ''}
        </div>
        ${footerHtml}
      </div>`;
  } else {
    cardClass = 'card-story' + (effectiveNoBg ? ' no-bg' : '');
    cardHtml = `
      ${effectiveBgHtml}
      <div class="card-bg-overlay"></div>
      <div class="card-inner">
        <div class="card-body">
          <div class="card-date">${dateText}</div>
          <div class="card-route-name">${title}</div>
          ${mapInsetHtml}
          ${streetsHtml}
          <div class="card-cta">${cta}</div>
        </div>
        ${footerHtml}
      </div>`;
  }

  renderArea.innerHTML = `<div class="${cardClass}" id="cardCapture">${cardHtml}</div>`;

  // Wait for images to load
  const images = renderArea.querySelectorAll('img');
  await Promise.all([...images].map(img => new Promise(resolve => {
    if (img.complete) return resolve();
    img.onload = resolve;
    img.onerror = resolve;
    setTimeout(resolve, 4000);
  })));

  // Small delay for fonts
  await new Promise(r => setTimeout(r, 200));

  // Capture
  const el = document.getElementById('cardCapture');
  try {
    const canvas = await html2canvas(el, {
      scale: 1,
      useCORS: true,
      allowTaint: true,
      backgroundColor: '#0d0d0b',
      logging: false,
      width: el.offsetWidth,
      height: el.offsetHeight
    });

    STATE.currentCard = canvas;
    STATE.currentSlug = `${(route.routeName || 'route').replace(/\s+/g, '_')}_${format}`;

    // Show preview
    const previewWrap = document.getElementById('previewWrap');
    const previewImg = document.createElement('img');

    // Scale preview to fit screen
    const maxW = Math.min(window.innerWidth * 0.8, 800);
    const ratio = el.offsetHeight / el.offsetWidth;
    previewImg.style.width = maxW + 'px';
    previewImg.style.height = (maxW * ratio) + 'px';
    previewImg.src = canvas.toDataURL('image/png');

    previewWrap.innerHTML = '';
    previewWrap.appendChild(previewImg);

    document.getElementById('previewTitle').textContent = `${title} — ${format}`;

    // Generate social caption
    generateCaption(route, title, dateText, streets, cta);

    document.getElementById('previewModal').classList.add('open');
  } catch(e) {
    alert('Error generating card: ' + e.message);
  }
}

// ── DOWNLOAD ──
function downloadCard() {
  if (!STATE.currentCard) return;
  const link = document.createElement('a');
  link.download = `${STATE.currentSlug}.png`;
  link.href = STATE.currentCard.toDataURL('image/png');
  link.click();
}

// ── CLOSE PREVIEW ──
function closePreview() {
  document.getElementById('previewModal').classList.remove('open');
  document.getElementById('captionCopied').classList.remove('show');
}

// ── GENERATE CAPTION ──
function generateCaption(route, title, dateText, streets, cta) {
  const sleighName = STATE.settings.sleigh_display_name || STATE.settings.sleigh_name || 'Santa Sleigh';
  const donateUrl = STATE.settings.donate_url || '';

  // Build tracker URL — prefer clean URL from Settings
  const apiUrl = getApiUrl();
  const trackerUrl = STATE.settings.tracker_url
    || `https://brt-23f.pages.dev/santa_sleigh_tracker_dynamic?api=${encodeURIComponent(apiUrl)}`;

  // Format streets nicely
  const streetList = streets
    ? streets.split(',').map(s => s.trim()).filter(Boolean).join(' · ')
    : '';

  // 1. Build the primary sleigh hashtag (e.g. #BeverleyRoundTableSantaSleigh)
  const hashName = sleighName.replace(/[^a-zA-Z0-9]/g, '');
  
  // 2. Extract the location text
  let locationText = sleighName;
  
  // Remove a leading "The " if it exists
  locationText = locationText.replace(/^The\s+/i, '');
  
  // Replace "&" with " And " so it formats nicely
  locationText = locationText.replace(/&/g, ' And ');

  // Split at common organization/event words
  const splitKeywords = /\s+(Round Table|Santa|Rotary|Lions|Sleigh)/i;
  const parts = locationText.split(splitKeywords);

  // If we successfully found text BEFORE the keyword, use it. 
  if (parts[0] && parts[0].trim().length > 0) {
    locationText = parts[0].trim();
  } else {
    locationText = sleighName.replace(/\b(The|Santa|Sleigh|Round Table)\b/gi, '').trim();
    if (!locationText) locationText = sleighName.split(/\s+/)[0];
  }

  // 3. Convert location to a readable PascalCase hashtag
  const townHash = locationText
    .split(/\s+/)
    .map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase())
    .join('')
    .replace(/[^a-zA-Z0-9]/g, '');
  
  // 4. Extract the route name
  const routeHash = (route.routeName || '').replace(/[^a-zA-Z0-9]/g, '');
  
  // Build the final dynamic hashtag string
  let hashtags = `#${hashName}`;
  if (townHash && townHash !== hashName) hashtags += ` #${townHash}`;
  if (routeHash) hashtags += ` #${routeHash}`;
  hashtags += ` #SantaTracker #RoundTable #Christmas`;

  // Build caption
  let caption = '';
  caption += `🎅 Santa's sleigh is heading to YOUR street! 🛷\n\n`;
  caption += `📅 ${dateText}\n`;
  if (streetList) {
    caption += `📍 ${streetList}\n`;
  }
  caption += `\n`;
  caption += `Track Santa LIVE 🗺️\n`;
  caption += `${trackerUrl}\n`;
  if (donateUrl) {
    caption += `\n❤️ Donate: ${donateUrl}\n`;
  }
  caption += `\n${hashtags}`;

  const el = document.getElementById('captionText');
  if (el) {
    el.value = caption;
    el.readOnly = false; // let them edit before copying
  }
}

// ── COPY CAPTION ──
function copyCaption() {
  const el = document.getElementById('captionText');
  if (!el) return;
  navigator.clipboard.writeText(el.value).then(() => {
    const badge = document.getElementById('captionCopied');
    badge.classList.add('show');
    setTimeout(() => badge.classList.remove('show'), 2000);
  });
}

// Close on escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePreview();
});

// Close on backdrop click
document.getElementById('previewModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closePreview();
});
</script>
</body>
</html>
