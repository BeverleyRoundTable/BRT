<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>God Mode — TurboSanta National</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

  <style>
    /* ═══════════════════════════════════════ */
    /* TURBOSANTA DESIGN SYSTEM */
    /* ═══════════════════════════════════════ */
    :root {
      --gold: #FBAF33;
      --gold-dim: rgba(251,175,51,0.12);
      --gold-glow: rgba(251,175,51,0.25);
      --dark: #0d0d0b;
      --surface: #161614;
      --surface-2: #1e1e1b;
      --surface-3: #252522;
      --border: rgba(255,255,255,0.08);
      --border-gold: rgba(251,175,51,0.2);
      --red: #D31C1C;
      --green: #2ecc71;
      --text: #eaeae5;
      --text-dim: rgba(255,255,255,0.55);
      --text-muted: rgba(255,255,255,0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── LOADER ── */
    .loader {
      position: fixed; inset: 0; background: var(--dark);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px; z-index: 9999;
      transition: opacity 0.4s;
    }
    .loader.done { opacity: 0; pointer-events: none; }
    .loader-spin {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── ERROR DISPLAY ── */
    .error-msg {
      text-align: center; padding: 80px 24px; color: var(--red);
      font-size: 1.1em; max-width: 600px; margin: 0 auto;
    }
    .error-msg code {
      background: var(--surface-2); padding: 4px 10px; border-radius: 6px; 
      font-size: 0.85em; font-family: 'DM Mono', monospace;
    }

    .dashboard { max-width: 1440px; margin: 0 auto; padding: 32px 24px; }

    /* ── TOP BAR ── */
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 32px; flex-wrap: wrap; gap: 16px;
    }
    .top-bar-left { display: flex; align-items: center; gap: 16px; }
    .top-bar .logo {
      width: 54px; height: 54px; border-radius: 12px;
      background: var(--surface); border: 1px solid var(--border); padding: 4px;
    }
    .top-bar .title { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 2px; }
    .top-bar .title span { color: var(--gold); }

    .top-bar-right { display: flex; align-items: center; gap: 20px; }

    .live-badge {
      display: flex; align-items: center; gap: 8px;
      font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 700; 
      text-transform: uppercase; letter-spacing: 1.5px; 
      color: var(--green); background: rgba(46,204,113,0.1);
      padding: 8px 16px; border-radius: 100px; border: 1px solid rgba(46,204,113,0.2);
    }
    .live-dot {
      width: 8px; height: 8px; background: var(--green);
      border-radius: 50%; animation: pulseBadge 1.5s ease-in-out infinite;
    }
    .live-badge.stale { color: var(--red); background: rgba(211,28,28,0.1); border-color: rgba(211,28,28,0.2); }
    .live-badge.stale .live-dot { background: var(--red); animation: none; }
    @keyframes pulseBadge {
      0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0px var(--green); }
      50% { opacity: 0.5; transform: scale(0.8); box-shadow: 0 0 8px var(--green); }
    }

    .clock {
      font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 600; color: var(--text-dim);
    }

    /* ── STAT CARDS ── */
    .stats-row {
      display: grid; 
      grid-template-columns: repeat(5, 1fr); 
      gap: 16px; margin-bottom: 24px;
    }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 24px 20px; text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    .stat-card .label {
      font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 700; 
      text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); margin-bottom: 8px;
    }
    .stat-card .value {
      font-family: 'Bebas Neue', sans-serif; font-size: 42px; font-weight: 400; line-height: 1;
      letter-spacing: 1px;
    }
    .stat-card .sub { font-size: 12px; color: var(--text-dim); margin-top: 8px; font-weight: 500; }
    .stat-card .value.gold { color: var(--gold); }
    .stat-card .value.green { color: var(--green); }
    .stat-card .value.red { color: var(--red); }

    /* ── MAIN GRID ── */
    .main-grid { display: grid; grid-template-columns: 1fr 380px; gap: 20px; }

    .map-panel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden; position: relative; min-height: 500px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.4);
    }
    #godMap { width: 100%; height: 100%; min-height: 500px; z-index: 1; }
    .map-overlay-label {
      position: absolute; top: 16px; left: 16px;
      background: var(--surface-2); color: var(--text); border: 1px solid var(--border);
      font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 700; 
      text-transform: uppercase; letter-spacing: 1.5px; padding: 8px 14px; 
      border-radius: 8px; z-index: 1000; pointer-events: none;
    }

    .sidebar { display: flex; flex-direction: column; gap: 16px; }
    .panel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 24px;
    }
    .panel-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .panel-header .icon { font-size: 20px; }
    .panel-header h3 {
      font-family: 'Bebas Neue', sans-serif; font-size: 24px;
      letter-spacing: 1.5px; color: #fff; line-height: 1;
    }

    /* ── INPUTS & SELECTS ── */
    .pa-input {
      width: 100%; background: var(--surface-2); border: 1px solid var(--border);
      color: #fff; padding: 14px; border-radius: 8px; font-family: 'DM Sans', sans-serif; 
      font-size: 14px; margin-bottom: 12px; outline: none; transition: border-color 0.2s;
    }
    .pa-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px var(--gold-glow); }
    
    select.pa-input { font-family: 'DM Sans', sans-serif; font-weight: 600; cursor: pointer; }
    select.pa-input option { background: var(--surface-2); color: #fff; }

    .pa-btns { display: flex; gap: 10px; }
    .pa-btns button {
      flex: 1; padding: 12px; font-family: 'DM Sans', sans-serif; font-weight: 700; 
      border-radius: 8px; cursor: pointer; border: none; transition: 0.2s; font-size: 13px;
    }
    .pa-btns button:active { transform: scale(0.96); }
    
    .btn-broadcast { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
    .btn-broadcast.live-active { 
      background: var(--gold) !important; color: #000 !important;
      font-weight: 800 !important; text-transform: uppercase;
      animation: pulseBroadcast 1.5s infinite; 
    }
    @keyframes pulseBroadcast {
      0% { box-shadow: 0 0 0 0 rgba(251, 175, 51, 0.4); }
      50% { box-shadow: 0 0 0 12px rgba(251, 175, 51, 0); }
      100% { box-shadow: 0 0 0 0 rgba(251, 175, 51, 0); }
    }

    .btn-clear { background: var(--surface-3); color: var(--text-dim); border: 1px solid var(--border); }

    /* ── CREW ALERT ── */
    .crew-alert-panel { border-color: rgba(211,28,28,0.2) !important; }
    .crew-alert-badge {
      font-family: 'DM Mono', monospace; font-size: 9px; font-weight: 700; 
      text-transform: uppercase; letter-spacing: 1px; color: var(--red);
      background: rgba(211,28,28,0.08); border: 1px solid rgba(211,28,28,0.2);
      padding: 4px 10px; border-radius: 4px; margin-left: auto;
    }
    .btn-crew-send { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
    .btn-crew-send.crew-active {
      background: var(--red) !important; color: #fff !important;
      animation: pulseCrew 1.5s infinite;
    }
    @keyframes pulseCrew {
      0% { box-shadow: 0 0 0 0 rgba(211,28,28,0.4); }
      50% { box-shadow: 0 0 0 10px rgba(211,28,28,0); }
      100% { box-shadow: 0 0 0 0 rgba(211,28,28,0); }
    }

    /* ── MESSAGES ── */
    .msg-item { background: var(--surface-2); padding: 16px; border-radius: 10px; margin-bottom: 12px; border-left: 4px solid #c88bff; }
    .msg-text { font-size: 14px; margin-bottom: 14px; color: #fff; font-style: italic; line-height: 1.5; }
    .msg-actions { display: flex; gap: 8px; }
    .btn-approve { background: #c88bff; color: #000; border: none; padding: 10px; border-radius: 6px; cursor: pointer; flex: 2; font-weight: 700; font-size: 13px; }
    .btn-reject { background: var(--surface-3); color: var(--red); border: 1px solid var(--border); padding: 10px; border-radius: 6px; cursor: pointer; flex: 1; font-weight: 700; font-size: 13px; }

    .active-user-msg { 
      background: rgba(200, 139, 255, 0.1); border: 1px solid rgba(200, 139, 255, 0.3); 
      color: #e6c2ff; padding: 16px; border-radius: 10px; margin-bottom: 16px; 
      font-size: 14px; font-weight: 700; display: none; text-align: center;
    }

    /* ── GPS INFO ── */
    .gps-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .gps-item { background: var(--surface-2); border-radius: 8px; border: 1px solid var(--border); padding: 14px; }
    .gps-label {
      font-family: 'DM Mono', monospace; font-size: 9px; font-weight: 700; 
      text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 4px;
    }
    .gps-value { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 700; color: #fff; }

    /* ── ROUTE PROGRESS ── */
    .route-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 16px; background: var(--surface-2); border-radius: 8px; margin-bottom: 8px;
    }
    .route-label { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-dim); font-weight: 600; text-transform: uppercase; }
    .route-value { font-size: 14px; font-weight: 700; color: #fff; }
    .route-value.gold { color: var(--gold); }
    .streets-scroll {
      max-height: 160px; overflow-y: auto; font-family: 'DM Mono', monospace; font-size: 11px;
      color: var(--text-dim); line-height: 2; padding: 12px; background: var(--surface-3); border-radius: 8px; margin-top: 10px;
    }

    /* ── HEATMAP UI ── */
    .heatmap-controls { display: none; margin-top: 15px; background: var(--surface-3); padding: 16px; border-radius: 10px; border: 1px solid var(--border); }
    .heatmap-controls.active { display: block; }
    .heatmap-controls select { 
      width: 100%; margin-bottom: 10px; padding: 12px; background: var(--surface-2); color: var(--gold); 
      font-weight: 700; border: 1px solid var(--border); border-radius: 8px; outline: none; font-family: 'DM Sans', sans-serif;
    }
    .btn-heat { 
      background: var(--surface-2); color: var(--red); border: 1px solid var(--border); 
      margin-top: 16px; width: 100%; padding: 14px; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.2s;
    }
    .btn-heat.active { background: var(--red); color: #fff; border-color: var(--red); box-shadow: 0 0 20px rgba(211, 28, 28, 0.3); }

    /* ── DONATIONS ── */
    .donation-mini { display: flex; flex-direction: column; gap: 12px; }
    .donation-labels { display: flex; justify-content: space-between; font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 700; }
    .donation-bar-outer { height: 12px; background: var(--surface-2); border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
    .donation-bar-inner {
      height: 100%; background: linear-gradient(90deg, var(--red), var(--gold));
      border-radius: 10px; transition: width 1s ease;
    }

    /* ── FOOTER ── */
    .last-updated {
      text-align: center; font-family: 'DM Mono', monospace; font-size: 11px; 
      color: var(--text-muted); margin-top: 40px; padding-bottom: 24px; text-transform: uppercase; letter-spacing: 1px;
    }

    /* ⭐ GPS HEALTH VISUALS */
    .gps-health-tl { display: flex; align-items: flex-end; gap: 2px; height: 40px; margin-top: 16px; background: var(--surface-3); padding: 4px; border-radius: 6px; }
    .tl-bar { flex: 1; min-height: 2px; border-radius: 2px; transition: height 0.3s, background 0.3s; }
    .gps-health-badge {
      display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 100px;
      font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 700; letter-spacing: 1px;
    }
    .gps-health-dot { width: 8px; height: 8px; border-radius: 50%; }

    /* Leaflet Night Overlays */
    .leaflet-tile-pane { filter: invert(1) hue-rotate(180deg) brightness(0.4) contrast(0.9); }
    .leaflet-container { background: #000 !important; }
  </style>
</head>
<body>

<div class="loader" id="loader"><div class="loader-spin"></div></div>
<div id="app"></div>

<script>
const API = new URLSearchParams(location.search).get('api') || '';

const STATE = {
  settings: {}, routes: [], donations: {}, tracker: {}, streets: [],
  gps: null, activeViewers: 0, totalWaves: 0, 
  lastApiUpdate: null, lastGpsUpdate: null, lastViewerUpdate: null,
  map: null, marker: null, routeGlowLayer: null, routeMainLayer: null, gpxLoaded: false
};

function haversineMeters(a, b) {
  const R = 6371000;
  const dLat = (b.lat - a.lat) * Math.PI / 180;
  const dLng = (b.lng - a.lng) * Math.PI / 180;
  const s = Math.sin(dLat / 2) ** 2 + Math.cos(a.lat * Math.PI / 180) * Math.cos(b.lat * Math.PI / 180) * Math.sin(dLng / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(s));
}
  
function getApiUrl(params = '') {
  const secret = sessionStorage.getItem('sleighSecret') || '';
  const base = API.includes('?') ? API : API + '?';
  const separator = base.endsWith('?') ? '' : '&';
  return `${base}${separator}secret=${encodeURIComponent(secret)}${params ? '&' + params : ''}`;
}

if (!API) {
  document.getElementById('loader').classList.add('done');
  document.getElementById('app').innerHTML =
    '<div class="error-msg">Missing <strong>?api=</strong> parameter.<br><br>Usage: <code>god_mode?api=YOUR_API_URL</code></div>';
} else {
  init();
}

async function init() {
  let secret = sessionStorage.getItem('sleighSecret');
  
  if (!secret) {
    secret = prompt("🎅 God Mode Authorization Required\n\nEnter the Master Password:");
    if (!secret) {
      document.getElementById('app').innerHTML = '<div class="error-msg">Authorization required. Refresh the page to try again.</div>';
      document.getElementById('loader').classList.add('done');
      return;
    }
    
    try {
      const sep = API.includes('?') ? '&' : '?';
      const check = await fetch(`${API}${sep}function=verifyGodMode&secret=${encodeURIComponent(secret)}`);
      const result = await check.json();
      
      if (!result.valid) {
        document.getElementById('app').innerHTML = '<div class="error-msg">❌ Access Denied. Incorrect Password.</div>';
        document.getElementById('loader').classList.add('done');
        return;
      }
      
      sessionStorage.setItem('sleighSecret', secret);
    } catch(e) {
      document.getElementById('app').innerHTML = '<div class="error-msg">❌ Failed to connect to API to verify password.</div>';
      document.getElementById('loader').classList.add('done');
      return;
    }
  }

  await fetchApiData();
  buildDashboard();
  initMap();
  document.getElementById('loader').classList.add('done');
  
  fetchGps();
  if (STATE.tracker.firebase_url) {
    GpsHealth.init(STATE.tracker.firebase_url.replace(/\/$/, ""));
  }
  fetchViewers();
  fetchWeather();
  
  setInterval(fetchApiData, 30000);
  setInterval(fetchGps, 5000);
  setInterval(fetchViewers, 10000);
  setInterval(fetchWeather, 900000);
  setInterval(updateClock, 1000);
  setInterval(updateGpsAge, 1000);
  setInterval(updateUserMsgState, 1000);
}

async function fetchApiData() {
  try {
    const res = await fetch(getApiUrl());
    const data = await res.json();
    STATE.settings = data.settings || {};
    STATE.routes = data.routes || [];
    STATE.donations = data.donations || {};
    STATE.tracker = data.tracker || {};
    STATE.streets = data.streets || [];
    STATE.lastApiUpdate = new Date();
    
    const paInput = document.getElementById("paInput");
    if (paInput && document.activeElement !== paInput) {
      paInput.value = STATE.settings.live_announcement || '';
    }

    const crewInput = document.getElementById("crewAlertInput");
    if (crewInput && document.activeElement !== crewInput) {
      crewInput.value = STATE.settings.crew_alert || '';
    }

    updateDashboard();
    updateCrewAlertButtonState();
    updateUserMsgState();
  } catch(e) { console.error('API:', e); }
}

async function fetchGps() {
  try {
    const res = await fetch(getApiUrl('function=proxyFirebase'));
    const data = await res.json();
    if (data && data.lat) { 
      STATE.gps = data; 
      STATE.lastGpsUpdate = new Date(); 
      if (!STATE.weather) fetchWeather();
    }
    updateGps();
  } catch(e) { console.error('GPS:', e); }
}

async function fetchViewers() {
  try {
    const res = await fetch(getApiUrl('function=getActiveViewers'));
    const data = await res.json();
    STATE.activeViewers = data.active || 0;
    STATE.totalWaves = data.waves || 0; 
    STATE.lastViewerUpdate = new Date();
    updateViewers();
  } catch(e) { console.error('Viewers:', e); }
}

function getWeatherEmoji(code) {
  if (code === 0) return '☀️ Clear';
  if (code <= 3) return '☁️ Cloudy';
  if (code <= 48) return '🌫️ Fog';
  if (code <= 67) return '🌧️ Rain';
  if (code <= 77) return '❄️ Snow';
  if (code <= 82) return '🌧️ Showers';
  if (code <= 86) return '❄️ Snow Showers';
  if (code >= 95) return '⛈️ Thunderstorm';
  return '🌡️ Unknown';
}

async function fetchWeather() {
  const lat = STATE.gps?.lat; 
  const lng = STATE.gps?.lng;
  if (!lat || !lng) return;
  try {
    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current_weather=true&windspeed_unit=mph`);
    const data = await res.json();
    if (data.current_weather) {
      STATE.weather = data.current_weather;
      updateWeather();
    }
  } catch(e) { console.error('Weather fetching failed:', e); }
}

function updateWeather() {
  const container = document.getElementById('weatherDetail');
  if (!container || !STATE.weather) return;
  const w = STATE.weather;
  const condition = getWeatherEmoji(w.weathercode);
  const conditionColor = w.weathercode > 50 ? 'color: var(--red);' : '';
  container.innerHTML = `
    <div class="gps-grid">
      <div class="gps-item" style="grid-column: span 2;"><div class="gps-label">Condition</div><div class="gps-value" style="${conditionColor}">${condition}</div></div>
      <div class="gps-item"><div class="gps-label">Temp</div><div class="gps-value">${w.temperature}°C</div></div>
      <div class="gps-item"><div class="gps-label">Wind</div><div class="gps-value">${w.windspeed} mph</div></div>
    </div>`;
}
  
function getTodayRoute() {
  const today = new Date().toISOString().slice(0, 10);
  return STATE.routes.find(r => r.date === today) || null;
}

function getNextRoute() {
  const today = new Date().toISOString().slice(0, 10);
  return STATE.routes.filter(r => r.date && r.date > today)
    .sort((a, b) => a.date.localeCompare(b.date))[0] || null;
}

function fmtDate(d) {
  if (!d) return '';
  const dt = new Date(d + 'T00:00:00');
  return isNaN(dt) ? d : dt.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
}

function fmtTime(d) {
  return d ? d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) : '--:--:--';
}

function gpsAgeText() {
  if (!STATE.gps?.ts) return 'No signal';
  const s = Math.floor((Date.now() - new Date(STATE.gps.ts).getTime()) / 1000);
  if (s < 0) return 'Just now';
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  return Math.floor(s / 3600) + 'h ago';
}

function isGpsFresh() {
  return STATE.gps?.ts && (Date.now() - new Date(STATE.gps.ts).getTime()) < 120000;
}

async function sendAnnouncement() {
  const msg = document.getElementById('paInput').value.trim();
  const btn = document.getElementById('broadcastBtn');
  const secret = sessionStorage.getItem('sleighSecret') || ''; 
  btn.innerText = "Sending...";
  try {
    const response = await fetch(API, { 
      method: "POST", 
      body: JSON.stringify({ action: "updateAnnouncement", message: msg, secret: secret }) 
    });
    const result = await response.json();
    if (result.ok) {
      STATE.settings.live_announcement = msg;
    } else {
      alert("Action Blocked: " + result.error); 
    }
    updatePaButtonState();
  } catch(e) { 
    alert('Failed to update announcement.'); 
    updatePaButtonState(); 
  }
}

async function clearAnnouncement() {
  document.getElementById('paInput').value = '';
  await sendAnnouncement();
}

function updatePaButtonState() {
  const btn = document.getElementById('broadcastBtn');
  const paInput = document.getElementById("paInput");
  const msg = STATE.settings.live_announcement || '';
  if (paInput && document.activeElement !== paInput) paInput.value = msg;
  if (msg.trim() !== '') {
    btn.innerText = "ACTIVE ON TRACKER";
    btn.className = "btn-broadcast live-active";
  } else {
    btn.innerText = "Broadcast Live";
    btn.className = "btn-broadcast";
  }
}

async function sendCrewAlert() {
  const msg = document.getElementById('crewAlertInput').value.trim();
  const btn = document.getElementById('crewAlertBtn');
  const secret = sessionStorage.getItem('sleighSecret') || '';
  btn.innerText = "Sending...";
  try {
    const response = await fetch(API, {
      method: "POST",
      body: JSON.stringify({ action: "updateCrewAlert", message: msg, secret })
    });
    const result = await response.json();
    if (result.ok) STATE.settings.crew_alert = msg;
    updateCrewAlertButtonState();
  } catch(e) { alert('Failed alert.'); updateCrewAlertButtonState(); }
}

async function clearCrewAlert() {
  document.getElementById('crewAlertInput').value = '';
  await sendCrewAlert();
}

function updateCrewAlertButtonState() {
  const btn = document.getElementById('crewAlertBtn');
  const input = document.getElementById('crewAlertInput');
  const msg = STATE.settings.crew_alert || '';
  if (!btn) return;
  if (input && document.activeElement !== input) input.value = msg;
  if (msg.trim() !== '') {
    btn.innerText = "ACTIVE ON CREW HUB";
    btn.className = "btn-crew-send crew-active";
  } else {
    btn.innerText = "Send to Crew";
    btn.className = "btn-crew-send";
  }
}

function buildDashboard() {

    presetOptionsHTML += '<option value="">Quick select preset...</option>';

    });

    <div class="top-bar-right">

  </div>

  <div class="stats-row">

      <div id="godProgressWrapper" style="margin-top: 14px; display: ${todayRoute ? 'block' : 'none'};">
        <div class="donation-bar-outer"><div id="godProgressBar" class="donation-bar-inner" style="width: 0%"></div></div>
        <div id="godProgressText" style="font-family:'DM Mono', monospace; font-size:10px; font-weight:700; margin-top:6px; color:var(--gold);">0% COMPLETE</div>
      </div>
    </div>
    <div class="stat-card"><div class="label">Live Viewers</div><div class="value green" id="statViewers">—</div><div class="sub">Current active</div></div>
    <div class="stat-card"><div class="label">Messages</div><div class="value gold" id="statWaves">0</div><div class="sub">Pending approval</div></div>
    <div class="stat-card"><div class="label">GPS Health</div><div class="value" id="statGpsStatus">—</div><div class="sub" id="statGpsAge">Waiting...</div><div class="sub" id="statGpsRate" style="color:var(--text-muted);font-size:9px;margin-top:2px;"></div></div>
    <div class="stat-card"><div class="label">Raised</div><div class="value gold" id="statRaised">${currency}0</div><div class="sub" id="statTarget">of target</div></div>
  </div>

  <div class="main-grid">
    <div class="map-panel"><div class="map-overlay-label" id="mapLabel">Live Position</div><div id="godMap"></div></div>
    <div class="sidebar">
      <div class="panel">
        <div class="panel-header"><span class="icon">📢</span><h3>Live PA System</h3></div>
        ${presetOptionsHTML}

        <div class="pa-btns">
          <button id="broadcastBtn" class="btn-broadcast" onclick="sendAnnouncement()">Broadcast</button>

      </div>

      <div class="panel crew-alert-panel">
        <div class="panel-header"><span class="icon">🔔</span><h3>Crew Alert</h3><span class="crew-alert-badge">Hub Only</span></div>
        <input type="text" id="crewAlertInput" class="pa-input" placeholder="Internal alert..." value="${s.crew_alert || ''}" />
        <div class="pa-btns">

        <div id="activeUserMsgBox" class="active-user-msg">Live: <br><span id="activeUserMsgText"></span></div>
        <div id="pendingMessagesQueue"><div class="no-route">No pending messages</div></div>
      </div>

      <div class="panel">
        <div class="panel-header"><span class="icon">🗺️</span><h3>Route Info</h3></div>
        <div id="routeDetail"></div>
        <button id="toggleHeatmapBtn" class="btn-heat" onclick="toggleHeatmap()">🔥 Heatmap Mode</button>
        <div id="heatmapControls" class="heatmap-controls">
          <select id="heatType" onchange="drawHeatmap()"><option value="subscribers">📍 Subscribers</option><option value="suggestions">✉️ Requests</option></select>
          <select id="heatYear" onchange="drawHeatmap()"><option value="All">All Time</option></select>

          <div class="gps-item"><div class="gps-label">Fix Age</div><div class="gps-value" id="gphAge">—</div></div>

      <div class="panel"><div class="panel-header"><span class="icon">❤️</span><h3>Funds</h3></div><div id="donationDetail"></div></div>

  document.getElementById('app').innerHTML = h;

function initMap() {
  const startLat = STATE.gps?.lat || 52.4708;
  const startLng = STATE.gps?.lng || -1.9206;
  STATE.map = L.map('godMap', { zoomControl: true }).setView([startLat, startLng], 15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(STATE.map);
  const iconUrl = STATE.settings.sleigh_icon_live || 'https://i.ibb.co/Qj3vDbSR/Santa-Marker-11.png';
  STATE.marker = L.marker([startLat, startLng], { icon: L.icon({ iconUrl, iconSize: [64, 64], iconAnchor: [32, 60] }) }).addTo(STATE.map);
  const route = getTodayRoute() || getNextRoute();
  if (route?.gpxUrl) loadGpxRoute(route, STATE.settings);
}

function loadGpxRoute(route, settings) {
  fetch(route.gpxUrl).then(r => r.text()).then(text => {
    const xml = new DOMParser().parseFromString(text, "text/xml");
    STATE.gpxRoute = [...xml.getElementsByTagName("trkpt")].map(p => ({ lat: parseFloat(p.getAttribute("lat")), lng: parseFloat(p.getAttribute("lon")) }));
  });
  STATE.routeGlowLayer = new L.GPX(route.gpxUrl, { async: true, polyline_options: { color: '#ffd700', weight: 7, opacity: 0.3, lineCap: 'round' }, marker_options: { startIconUrl: null, endIconUrl: null } }).addTo(STATE.map);
  STATE.routeMainLayer = new L.GPX(route.gpxUrl, { async: true, polyline_options: { color: '#d31c1c', weight: 4, opacity: 0.9, lineCap: 'round' }, marker_options: { startIcon: L.icon({ iconUrl: settings.sleigh_icon_start || 'https://i.ibb.co/PzDYmwzZ/Santa-Marker-4.png', iconSize: [48, 48], iconAnchor: [24, 48] }), endIcon: L.icon({ iconUrl: settings.sleigh_icon_end || 'https://i.ibb.co/39WF0kBd/Santa-Marker-5.png', iconSize: [48, 48], iconAnchor: [24, 48] }) } }).addTo(STATE.map);
  STATE.routeMainLayer.on('loaded', e => { STATE.gpxLoaded = true; if (!STATE.gps) STATE.map.fitBounds(e.target.getBounds()); });
}

function updateDashboard() { 
  updateRouteDetail(); 
  updateDonationDetail(); 
  updateRaisedStat(); 
  updateElfCam();
  const panel = document.getElementById('userMessagesPanel');
  if (panel) panel.style.display = String(STATE.settings?.enable_user_messages).toUpperCase() === 'TRUE' ? 'block' : 'none';
}

function updateUserMsgState() {
  const activeMsgBox = document.getElementById('activeUserMsgBox');
  const uMsg = STATE.settings?.user_announcement;
  const uTs = Number(STATE.settings?.user_announcement_ts) || 0;
  const isActive = uMsg && (Date.now() - uTs < 20000);
  if (activeMsgBox) {
    activeMsgBox.style.display = isActive ? 'block' : 'none';
    if (isActive) document.getElementById('activeUserMsgText').textContent = `"${uMsg}"`;
  }
}

function updateClock() {
  const el = document.getElementById('clock');
  if (el) el.textContent = fmtTime(new Date());
}

function updateGpsAge() {
  const fresh = isGpsFresh();
  document.getElementById('liveBadge').className = 'live-badge' + (fresh ? '' : ' stale');
  document.getElementById('liveBadgeText').textContent = fresh ? 'LIVE' : 'NO SIGNAL';
  document.getElementById('lastUpdated').textContent = `GPS ${fmtTime(STATE.lastGpsUpdate)} · Viewers ${fmtTime(STATE.lastViewerUpdate)} · API ${fmtTime(STATE.lastApiUpdate)}`;
}

function updateGps() {
  if (!STATE.gps || !STATE.marker || heatmapMode) return;
  const ll = L.latLng(STATE.gps.lat, STATE.gps.lng);
  STATE.marker.setLatLng(ll);
  if (STATE.map.getCenter().distanceTo(ll) > 50) STATE.map.panTo(ll);
  
  if (STATE.gpxRoute?.length > 1) {
    let bestIndex = 0, bestDist = Infinity;
    STATE.gpxRoute.forEach((p, i) => { const d = haversineMeters(STATE.gps, p); if (d < bestDist) { bestDist = d; bestIndex = i; } });
    const pct = Math.min(100, Math.round((bestIndex / (STATE.gpxRoute.length - 1)) * 100));
    const bar = document.getElementById("godProgressBar"), txt = document.getElementById("godProgressText");
    if (bar) bar.style.width = pct + "%";
    if (txt) txt.textContent = bestDist > 100 ? "OFF ROUTE" : pct + "% COMPLETE";
  }
}

function updateViewers() { const vEl = document.getElementById('statViewers'); if (vEl) vEl.textContent = STATE.activeViewers; }

function updateRouteDetail() {
  const c = document.getElementById('routeDetail'); if (!c) return;
  const route = getTodayRoute() || getNextRoute();
  if (!route) { c.innerHTML = '<div class="no-route">No routes scheduled</div>'; return; }
  const streets = (route.streets || '').split(',').map(s => s.trim()).filter(Boolean);
  c.innerHTML = `<div class="route-info">
    <div class="route-row"><span class="route-label">Route</span><span class="route-value">${route.routeName}</span></div>
    <div class="route-row"><span class="route-label">Schedule</span><span class="route-value gold">${fmtDate(route.date)}</span></div>
    <div class="streets-scroll">${streets.join(' · ')}</div>
  </div>`;
}

function updateDonationDetail() {
  const c = document.getElementById('donationDetail'), d = STATE.donations;
  if (!c) return;
  const pct = d.target > 0 ? Math.min(100, Math.round((d.total / d.target) * 100)) : 0;
  c.innerHTML = `<div class="donation-mini">
    <div class="donation-labels"><span style="color:var(--gold)">${d.currency}${d.total.toLocaleString()}</span><span style="color:var(--text-muted)">Goal: ${d.currency}${d.target.toLocaleString()}</span></div>
    <div class="donation-bar-outer"><div class="donation-bar-inner" style="width:${pct}%"></div></div>
  </div>`;
}

function updateRaisedStat() { const d = STATE.donations; document.getElementById('statRaised').textContent = `${d.currency}${(d.total || 0).toLocaleString()}`; document.getElementById('statTarget').textContent = `of ${d.currency}${(d.target || 0).toLocaleString()}`; }

let heatmapMode = false, heatLayer = null, allHeatData = null, allGpxLayers = [];

async function toggleHeatmap() {
  const btn = document.getElementById('toggleHeatmapBtn'), controls = document.getElementById('heatmapControls');
  if (heatmapMode) {
    heatmapMode = false; btn.innerText = "🔥 Heatmap Mode"; btn.className = "btn-heat"; controls.classList.remove('active');
    if (heatLayer) STATE.map.removeLayer(heatLayer);
    allGpxLayers.forEach(l => STATE.map.removeLayer(l));
    if (STATE.marker) STATE.marker.addTo(STATE.map);
    if (STATE.routeMainLayer) STATE.routeMainLayer.addTo(STATE.map);
  } else {
    btn.innerText = "Loading...";
    const res = await fetch(getApiUrl('function=getHeatmapData'));
    allHeatData = await res.json();
    heatmapMode = true; btn.innerText = "Exit Heatmap"; btn.className = "btn-heat active"; controls.classList.add('active');
    if (STATE.marker) STATE.map.removeLayer(STATE.marker);
    if (STATE.routeMainLayer) STATE.map.removeLayer(STATE.routeMainLayer);
    drawHeatmap();
  }
}

function drawHeatmap() {
  if (heatLayer) STATE.map.removeLayer(heatLayer);
  const type = document.getElementById('heatType').value, data = allHeatData[type] || [];
  heatLayer = L.heatLayer(data.map(d => [d.lat, d.lng, 1]), { radius: 25, blur: 15, gradient: {0.4: 'blue', 0.6: 'cyan', 0.7: 'lime', 0.8: 'yellow', 1.0: 'red'} }).addTo(STATE.map);
}

function updateElfCam() {
  const url = STATE.settings?.elf_cam_url, c = document.getElementById('elfCamPreview');
  if (!url || !c) return;
  const finalUrl = url.includes('drive.google.com') ? `https://drive.google.com/thumbnail?id=${new URL(url).searchParams.get('id')}&sz=w400` : url;
  c.innerHTML = `<img src="${finalUrl}" style="width:100%; height:120px; object-fit:cover; border-radius:8px; border:1px solid var(--border);">`;
  document.getElementById('elfCamAge').textContent = 'UPDATED: ' + fmtTime(new Date());
}

async function fetchPendingMessages() {
  const res = await fetch(getApiUrl('function=getPendingMessages'));
  const msgs = await res.json(), c = document.getElementById('pendingMessagesQueue');
  document.getElementById('statWaves').textContent = msgs.length;
  if (!msgs.length) { c.innerHTML = '<div class="no-route">No pending messages</div>'; return; }
  c.innerHTML = msgs.map(m => `<div class="msg-item"><div class="msg-text">"${m.msg}"</div><div class="msg-actions"><button class="btn-approve" onclick="handleUserMsg('${encodeURIComponent(m.msg)}', 'approveUserMessage')">Approve</button><button class="btn-reject" onclick="handleUserMsg('${encodeURIComponent(m.msg)}', 'rejectUserMessage')">Reject</button></div></div>`).join('');
}

async function handleUserMsg(encodedMsg, action) {
  await fetch(API, { method: 'POST', body: JSON.stringify({ action, message: decodeURIComponent(encodedMsg), secret: sessionStorage.getItem('sleighSecret') }) });
  fetchPendingMessages();
}

const GpsHealth = (() => {
  let fbUrl = null, fixes = [], lastRawTs = null;
  return {
    init(url) { fbUrl = url; setInterval(() => this.poll(), 2000); },
    async poll() {
      const r = await fetch(fbUrl + "/location/current.json");
      let d = await r.json();
      if (!d.lat) d = Object.values(d)[0];
      const age = Math.round((Date.now() - new Date(d.ts).getTime())/1000);
      document.getElementById("statGpsStatus").textContent = age < 15 ? "LIVE" : "STALE";
      document.getElementById("statGpsStatus").className = "value " + (age < 15 ? "green" : "red");
      document.getElementById("statGpsAge").textContent = age + "s ago";
      document.getElementById("gphAge").textContent = age + "s";
      document.getElementById("gphBadgeText").textContent = age < 15 ? "LIVE" : "STALE";
      document.getElementById("gphBadge").style.color = age < 15 ? "var(--green)" : "var(--red)";
      document.getElementById("gphDot").style.background = age < 15 ? "var(--green)" : "var(--red)";
      if (fixes.length > 40) fixes.shift(); fixes.push(age);
      document.getElementById("gphTimeline").innerHTML = fixes.map(f => `<div class="tl-bar" style="background:${f < 15 ? 'var(--green)' : 'var(--red)'}; height:${Math.min(100, (1/f)*200)}%"></div>`).join('');
    }
  };
})();

setTimeout(fetchPendingMessages, 1000);
setInterval(fetchPendingMessages, 10000);
</script>
