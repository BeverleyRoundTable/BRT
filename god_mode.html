<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>God Mode</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <style>
  :root {
    --bg: #1D1D1A;         /* Official Table Grey */
    --surface: #262622;
    --surface-2: #2f2f2a;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f0;
    --text-dim: rgba(255,255,255,0.5);
    --text-muted: rgba(255,255,255,0.3);
    --gold: #FBAF33;       /* Official Golden Yellow */
    --gold-dim: rgba(251,175,51,0.12);
    
    /* Replaced non-brand Red and Green with Brand Compliant versions */
    --red: #d31c1c;        /* Kept for emergency but subdued */
    --green: #FBAF33;      /* Swapped green for Gold  */
    --green-dim: rgba(251,175,51,0.15);
    --red-dim: rgba(211,28,28,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Open Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .loader {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px; z-index: 9999;
    transition: opacity 0.4s;
  }
  .loader.done { opacity: 0; pointer-events: none; }
  .loader-spin {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    text-align: center; padding: 80px 24px; color: #ff6b6b;
    font-size: 1.1em; max-width: 600px; margin: 0 auto;
  }
  .error-msg code {
    background: var(--surface); padding: 4px 10px; border-radius: 6px; font-size: 0.85em;
  }

  .dashboard { max-width: 1400px; margin: 0 auto; padding: 24px; }

  /* ── TOP BAR ── */
  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
  }
  .top-bar-left { display: flex; align-items: center; gap: 14px; }
  .top-bar .logo {
    width: 48px; height: 48px; border-radius: 12px;
    object-fit: contain; background: rgba(255,255,255,0.06); padding: 2px;
  }
  .top-bar .title { font-size: 1.4em; font-weight: 800; letter-spacing: -0.02em; }
  .top-bar .title span { color: var(--gold); }
  .top-bar-right { display: flex; align-items: center; gap: 16px; }

  .live-badge {
    display: flex; align-items: center; gap: 8px;
    font-size: 0.78em; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--green); background: var(--green-dim);
    padding: 6px 14px; border-radius: 100px;
  }
  .live-dot {
    width: 8px; height: 8px; background: var(--green);
    border-radius: 50%; animation: pulse 1.5s ease-in-out infinite;
  }
  .live-badge.stale { color: var(--red); background: var(--red-dim); }
  .live-badge.stale .live-dot { background: var(--red); animation: none; }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  .clock {
    font-size: 1.4em; font-weight: 700; color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }

  /* ── STAT CARDS ── */
  .stats-row {
    display: grid; 
    grid-template-columns: repeat(5, 1fr); 
    gap: 16px; margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 24px 20px; text-align: center;
    position: relative; overflow: hidden;
  }
  .stat-card .label {
    font-size: 0.7em; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 8px;
  }
  .stat-card .value {
    font-size: 2.2em; font-weight: 800; line-height: 1;
    letter-spacing: -0.03em; font-variant-numeric: tabular-nums;
  }
  .stat-card .sub { font-size: 0.75em; color: var(--text-muted); margin-top: 6px; }
  .stat-card .value.gold { color: var(--gold); }
  .stat-card .value.green { color: var(--green); }
  .stat-card .value.red { color: var(--red); }

  /* ── MAIN GRID ── */
  .main-grid { display: grid; grid-template-columns: 1fr 380px; gap: 20px; }

  .map-panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden; position: relative; min-height: 500px;
  }
  #godMap { width: 100%; height: 100%; min-height: 500px; z-index: 1; }
  .map-overlay-label {
    position: absolute; top: 12px; left: 12px;
    background: rgba(29,29,26,0.85); color: var(--text);
    font-size: 0.72em; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.08em; padding: 6px 12px; border-radius: 8px;
    z-index: 1000; pointer-events: none;
  }

  .sidebar { display: flex; flex-direction: column; gap: 16px; }
  .panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 20px;
  }
  .panel-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .panel-header .icon { font-size: 1.2em; }
  .panel-header h3 {
    font-size: 0.85em; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--text-dim);
  }

  /* ── PA SYSTEM ── */
  .pa-input {
    width: 100%; background: var(--surface-2); border: 1px solid var(--border);
    color: white; padding: 12px; border-radius: 8px; font-family: inherit; font-size: 0.9em;
    margin-bottom: 10px; outline: none; box-sizing: border-box;
  }
  .pa-input:focus { border-color: var(--gold); }
  
  select.pa-input { cursor: pointer; }
  select.pa-input option { background: var(--surface); color: var(--text); }

  .pa-btns { display: flex; gap: 8px; }
  .pa-btns button {
    flex: 1; padding: 10px; font-weight: bold; border-radius: 8px; cursor: pointer;
    border: none; transition: 0.2s; font-family: inherit; font-size: 0.85em;
  }
  .pa-btns button:active { transform: scale(0.96); }
  
  .btn-broadcast { 
    background: var(--surface-2); 
    color: var(--text-dim); 
    border: 1px solid var(--border);
  }
  
  .btn-broadcast.live-active { 
    background: var(--gold) !important; 
    color: #000000 !important; 
    font-weight: 900 !important;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border: 2px solid #ffffff !important;
    animation: pulse-broadcast 1.5s infinite; 
  }
  
  @keyframes pulse-broadcast {
    0% { box-shadow: 0 0 0 0 rgba(251, 175, 51, 0.9); transform: scale(1); }
    50% { box-shadow: 0 0 0 15px rgba(251, 175, 51, 0); transform: scale(1.02); }
    100% { box-shadow: 0 0 0 0 rgba(251, 175, 51, 0); transform: scale(1); }
  }

  .btn-clear { background: var(--surface-2); color: var(--text-dim); border: 1px solid var(--border); }

  /* ── GPS INFO ── */
  .gps-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .gps-item { background: var(--surface-2); border-radius: 10px; padding: 12px; }
  .gps-item .gps-label {
    font-size: 0.68em; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 4px;
  }
  .gps-item .gps-value { font-size: 1.05em; font-weight: 700; font-variant-numeric: tabular-nums; }

  /* ── ROUTE INFO ── */
  .route-info { display: flex; flex-direction: column; gap: 10px; }
  .route-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 14px; background: var(--surface-2); border-radius: 10px;
  }
  .route-row .route-label { font-size: 0.78em; color: var(--text-dim); font-weight: 600; }
  .route-row .route-value { font-size: 0.9em; font-weight: 700; }
  .route-row .route-value.gold { color: var(--gold); }
  .no-route { text-align: center; padding: 20px; color: var(--text-muted); font-size: 0.85em; }

  /* ⭐ NEW: HEATMAP CONTROLS UI */
  .heatmap-controls { display: none; margin-top: 15px; background: rgba(255,255,255,0.05); padding: 12px; border-radius: 10px; }
  .heatmap-controls.active { display: block; animation: slideDown 0.3s ease-out; }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  .heatmap-controls select { width: 100%; margin-bottom: 8px; padding: 10px; background: var(--surface-2); color: var(--gold); font-weight: bold; border: 1px solid var(--border); border-radius: 8px; outline: none; cursor: pointer; }
  .btn-heat { background: var(--surface-2); color: #ff6b6b; border: 1px solid var(--border); margin-top: 12px; width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; font-family: inherit;}
  .btn-heat:active { transform: scale(0.96); }
  .btn-heat.active { background: #ff6b6b; color: #000; border-color: #ff6b6b; box-shadow: 0 0 15px rgba(255, 107, 107, 0.4); }

  /* ── DONATIONS ── */
  .donation-mini { display: flex; flex-direction: column; gap: 8px; }
  .donation-labels { display: flex; justify-content: space-between; font-size: 0.8em; font-weight: 700; }
  .donation-labels .raised { color: var(--gold); }
  .donation-labels .target { color: var(--text-muted); }
  .donation-bar-outer { height: 16px; background: var(--surface-2); border-radius: 8px; overflow: hidden; }
  .donation-bar-inner {
    height: 100%; background: linear-gradient(90deg, var(--red), var(--gold));
    border-radius: 8px; transition: width 1s ease; min-width: 8px;
  }
  .donation-pct { text-align: center; font-size: 0.75em; font-weight: 700; color: var(--text-muted); }

  /* ── STREETS ── */
  .streets-scroll {
    max-height: 180px; overflow-y: auto; font-size: 0.82em;
    color: var(--text-dim); line-height: 1.8; padding-right: 8px; margin-top: 8px;
  }
  .streets-scroll::-webkit-scrollbar { width: 4px; }
  .streets-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .last-updated {
    text-align: center; font-size: 0.7em; color: var(--text-muted);
    margin-top: 20px; font-variant-numeric: tabular-nums;
  }

  /* Leaflet dark tiles filter */
  .leaflet-tile-pane { filter: brightness(0.85) saturate(0.9); }

  /* Fix Leaflet controls z-index inside panel */
  .leaflet-top, .leaflet-bottom { z-index: 500 !important; }

  @media (max-width: 900px) {
    .stats-row { grid-template-columns: repeat(3, 1fr); } 
    .main-grid { grid-template-columns: 1fr; }
    .map-panel { min-height: 400px; }
  }
  @media (max-width: 500px) {
    .stats-row { grid-template-columns: 1fr 1fr; } 
    .dashboard { padding: 16px; }
    .top-bar .title { font-size: 1.1em; }
  }
  </style>
</head>
<body>

<div class="loader" id="loader"><div class="loader-spin"></div></div>
<div id="app"></div>

<script>
const API = new URLSearchParams(location.search).get('api') || '';

const STATE = {
  settings: {}, routes: [], donations: {}, tracker: {}, streets: [],
  gps: null, activeViewers: 0, totalWaves: 0, 
  lastApiUpdate: null, lastGpsUpdate: null, lastViewerUpdate: null,
  // Leaflet state
  map: null, marker: null, routeGlowLayer: null, routeMainLayer: null, gpxLoaded: false
};

function getApiUrl(params = '') {
  const secret = sessionStorage.getItem('sleighSecret') || '';
  const base = API.includes('?') ? API : API + '?';
  const separator = base.endsWith('?') ? '' : '&';
  return `${base}${separator}secret=${encodeURIComponent(secret)}${params ? '&' + params : ''}`;
}

if (!API) {
  document.getElementById('loader').classList.add('done');
  document.getElementById('app').innerHTML =
    '<div class="error-msg">Missing <strong>?api=</strong> parameter.<br><br>Usage: <code>god_mode?api=YOUR_API_URL</code></div>';
} else {
  init();
}

async function init() {
  let secret = sessionStorage.getItem('sleighSecret');
  
  if (!secret) {
    secret = prompt("🎅 God Mode Authorization Required\n\nEnter the Master Password:");
    if (!secret) {
      document.getElementById('app').innerHTML = '<div class="error-msg">Authorization required. Refresh the page to try again.</div>';
      document.getElementById('loader').classList.add('done');
      return;
    }
    
    try {
      const sep = API.includes('?') ? '&' : '?';
      const check = await fetch(`${API}${sep}function=verifyGodMode&secret=${encodeURIComponent(secret)}`);
      const result = await check.json();
      
      if (!result.valid) {
        document.getElementById('app').innerHTML = '<div class="error-msg">❌ Access Denied. Incorrect Password.</div>';
        document.getElementById('loader').classList.add('done');
        return;
      }
      
      sessionStorage.setItem('sleighSecret', secret);
    } catch(e) {
      document.getElementById('app').innerHTML = '<div class="error-msg">❌ Failed to connect to API to verify password.</div>';
      document.getElementById('loader').classList.add('done');
      return;
    }
  }

  await fetchApiData();
  buildDashboard();
  initMap();
  document.getElementById('loader').classList.add('done');
  
  fetchGps();
  fetchViewers();
  fetchWeather();
  
  setInterval(fetchApiData, 30000);
  setInterval(fetchGps, 5000);
  setInterval(fetchViewers, 10000);
  setInterval(fetchWeather, 900000); // 15 mins
  setInterval(updateClock, 1000);
  setInterval(updateGpsAge, 1000);
}

async function fetchApiData() {
  try {
    const res = await fetch(getApiUrl());
    const data = await res.json();
    STATE.settings = data.settings || {};
    STATE.routes = data.routes || [];
    STATE.donations = data.donations || {};
    STATE.tracker = data.tracker || {};
    STATE.streets = data.streets || [];
    STATE.lastApiUpdate = new Date();
    
    const paInput = document.getElementById("paInput");
    if (paInput && document.activeElement !== paInput) {
      paInput.value = STATE.settings.live_announcement || '';
    }

    updateDashboard();
  } catch(e) { console.error('API:', e); }
}

async function fetchGps() {
  try {
    const res = await fetch(getApiUrl('function=proxyFirebase'));
    const data = await res.json();
    if (data && data.lat) { 
      STATE.gps = data; 
      STATE.lastGpsUpdate = new Date(); 
      
      if (!STATE.weather) {
        fetchWeather();
      }
    }
    updateGps();
  } catch(e) { console.error('GPS:', e); }
}

async function fetchViewers() {
  try {
    const res = await fetch(getApiUrl('function=getActiveViewers'));
    const data = await res.json();
    STATE.activeViewers = data.active || 0;
    STATE.totalWaves = data.waves || 0; 
    STATE.lastViewerUpdate = new Date();
    updateViewers();
  } catch(e) { console.error('Viewers:', e); }
}

function getWeatherEmoji(code) {
  if (code === 0) return '☀️ Clear';
  if (code <= 3) return '☁️ Cloudy';
  if (code <= 48) return '🌫️ Fog';
  if (code <= 67) return '🌧️ Rain';
  if (code <= 77) return '❄️ Snow';
  if (code <= 82) return '🌧️ Showers';
  if (code <= 86) return '❄️ Snow Showers';
  if (code >= 95) return '⛈️ Thunderstorm';
  return '🌡️ Unknown';
}

async function fetchWeather() {
  const lat = STATE.gps?.lat; 
  const lng = STATE.gps?.lng;

  if (!lat || !lng) {
    const container = document.getElementById('weatherDetail');
    if (container) {
      container.innerHTML = '<div class="no-route">Waiting for location data...</div>';
    }
    return;
  }

  try {
    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current_weather=true&windspeed_unit=mph`);
    const data = await res.json();
    if (data.current_weather) {
      STATE.weather = data.current_weather;
      updateWeather();
    }
  } catch(e) { console.error('Weather fetching failed:', e); }
}

function updateWeather() {
  const container = document.getElementById('weatherDetail');
  if (!container || !STATE.weather) return;
  
  const w = STATE.weather;
  const condition = getWeatherEmoji(w.weathercode);
  const conditionColor = w.weathercode > 50 ? 'color: var(--red);' : '';
  
  container.innerHTML = `
    <div class="gps-grid">
      <div class="gps-item" style="grid-column: span 2;">
        <div class="gps-label">Condition</div>
        <div class="gps-value" style="${conditionColor}">${condition}</div>
      </div>
      <div class="gps-item">
        <div class="gps-label">Temp</div>
        <div class="gps-value">${w.temperature}°C</div>
      </div>
      <div class="gps-item">
        <div class="gps-label">Wind</div>
        <div class="gps-value">${w.windspeed} mph</div>
      </div>
    </div>`;
}
  
function getTodayRoute() {
  const today = new Date().toISOString().slice(0, 10);
  return STATE.routes.find(r => r.date === today) || null;
}

function getNextRoute() {
  const today = new Date().toISOString().slice(0, 10);
  return STATE.routes.filter(r => r.date && r.date > today)
    .sort((a, b) => a.date.localeCompare(b.date))[0] || null;
}

function fmtDate(d) {
  if (!d) return '';
  const dt = new Date(d + 'T00:00:00');
  return isNaN(dt) ? d : dt.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
}

function fmtTime(d) {
  return d ? d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) : '--:--:--';
}

function gpsAgeText() {
  if (!STATE.gps?.ts) return 'No signal';
  const s = Math.floor((Date.now() - new Date(STATE.gps.ts).getTime()) / 1000);
  if (s < 0) return 'Just now';
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  return Math.floor(s / 3600) + 'h ago';
}

function isGpsFresh() {
  return STATE.gps?.ts && (Date.now() - new Date(STATE.gps.ts).getTime()) < 120000;
}

async function sendAnnouncement() {
  const msg = document.getElementById('paInput').value.trim();
  const btn = document.getElementById('broadcastBtn');
  const secret = sessionStorage.getItem('sleighSecret') || ''; 
  
  btn.innerText = "Sending...";
  btn.style.background = "var(--surface-2)";
  btn.style.color = "var(--text-dim)";
  
  try {
    const response = await fetch(API, { 
      method: "POST", 
      body: JSON.stringify({ 
        action: "updateAnnouncement", 
        message: msg,
        secret: secret 
      }) 
    });
    
    const result = await response.json();
    
    if (result.ok) {
      STATE.settings.live_announcement = msg;
    } else {
      alert("Action Blocked: " + result.error); 
    }
    
    updatePaButtonState();
    
  } catch(e) { 
    alert('Failed to update announcement. Check connection.'); 
    updatePaButtonState(); 
  }
}

async function clearAnnouncement() {
  document.getElementById('paInput').value = '';
  await sendAnnouncement();
}

function updatePaButtonState() {
  const btn = document.getElementById('broadcastBtn');
  const paInput = document.getElementById("paInput");
  const msg = STATE.settings.live_announcement || '';
  
  if (paInput && document.activeElement !== paInput) {
    paInput.value = msg;
  }

  if (msg.trim() !== '') {
    btn.innerText = "ACTIVE ON TRACKER";
    btn.className = "btn-broadcast live-active";
  } else {
    btn.innerText = "Broadcast Live";
    btn.className = "btn-broadcast";
  }
}

function buildDashboard() {
  const s = STATE.settings;
  const logo = s.logo_overlay_url || '';
  const currency = STATE.donations.currency || '£';
  const todayRoute = getTodayRoute();

  const presetList = Array.isArray(s.presets) ? s.presets : [];
  let presetOptionsHTML = '<select class="pa-input" id="paSelect" onchange="if(this.value){ document.getElementById(\'paInput\').value = this.value; this.value=\'\'; }">';
  
  if (presetList.length > 0) {
    presetOptionsHTML += '<option value="">-- Quick select a preset message --</option>';
    presetList.forEach(p => {
      if (p && String(p).trim() !== '') {
        const cleanStr = String(p).trim();
        const safeVal = cleanStr.replace(/"/g, '&quot;');
        presetOptionsHTML += `<option value="${safeVal}" title="${safeVal}">${cleanStr}</option>`;
      }
    });
  }
  else {
    presetOptionsHTML += '<option value="" disabled selected>No presets loaded from settings</option>';
  }
  presetOptionsHTML += '</select>';

  let h = '<div class="dashboard">';

  h += `<div class="top-bar">
    <div class="top-bar-left">
      ${logo ? `<img class="logo" src="${logo}">` : ''}
      <div class="title"><span>God</span> Mode</div>
    </div>
    <div class="top-bar-right">
      <div class="live-badge" id="liveBadge"><div class="live-dot"></div><span id="liveBadgeText">CONNECTING</span></div>
      <div class="clock" id="clock">${fmtTime(new Date())}</div>
    </div>
  </div>`;

  h += `<div class="stats-row">
    <div class="stat-card">
      <div class="label">Active Route</div>
      <div class="value gold" id="statRoute" style="font-size:1.6em">${todayRoute?.routeName || '—'}</div>
      <div class="sub" id="statRouteDate">${todayRoute ? 'Tonight' : 'No route today'}</div>
    </div>
    <div class="stat-card">
      <div class="label">Live Viewers</div>
      <div class="value green" id="statViewers">—</div>
      <div class="sub">Last 5 minutes</div>
    </div>
    
    <div class="stat-card">
      <div class="label">Waves Received</div>
      <div class="value gold" id="statWaves">—</div>
      <div class="sub">Tonight</div>
    </div>

    <div class="stat-card">
      <div class="label">GPS Signal</div>
      <div class="value" id="statGpsStatus">—</div>
      <div class="sub" id="statGpsAge">Waiting...</div>
    </div>
    <div class="stat-card">
      <div class="label">Raised So Far</div>
      <div class="value gold" id="statRaised">${currency}${(STATE.donations.total || 0).toLocaleString()}</div>
      <div class="sub" id="statTarget">of ${currency}${(STATE.donations.target || 0).toLocaleString()}</div>
    </div>
  </div>`;

  h += `<div class="main-grid">
    <div class="map-panel">
      <div class="map-overlay-label" id="mapLabel">Live Position</div>
      <div id="godMap"></div>
    </div>
    <div class="sidebar">

      <div class="panel">
        <div class="panel-header"><span class="icon">📢</span><h3>Live PA System</h3></div>
        
        ${presetOptionsHTML}
        
        <input type="text" id="paInput" class="pa-input" placeholder="Type a custom alert or select above..." value="${s.live_announcement || ''}" />
        <div class="pa-btns">
          <button id="broadcastBtn" class="btn-broadcast" onclick="sendAnnouncement()">Broadcast Live</button>
          <button class="btn-clear" onclick="clearAnnouncement()">Clear</button>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header"><span class="icon">🗺️</span><h3>Route & Planning</h3></div>
        <div id="routeDetail"></div>
        <button id="toggleHeatmapBtn" class="btn-heat" onclick="toggleHeatmap()">🔥Heatmap Mode</button>
        <div id="heatmapControls" class="heatmap-controls">
          <select id="heatType" onchange="drawHeatmap()">
            <option value="subscribers">📍 Live Subscribers (Waited)</option>
            <option value="suggestions">✉️ Route Requests (Asked)</option>
          </select>
          <select id="heatYear" onchange="drawHeatmap()">
            <option value="All">All Time</option>
          </select>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header"><span class="icon">☁️</span><h3>Live Weather</h3></div>
        <div id="weatherDetail">
          <div class="no-route">Fetching atmosphere data...</div>
        </div>
      </div>

      <div class="panel">
  <div class="panel-header"><span class="icon">📸</span><h3>Elf Cam</h3></div>
  <div id="elfCamPreview">
    <div class="no-route">Waiting for first image...</div>
  </div>
  <div style="font-size:0.7em; color:var(--text-muted); margin-top:8px; text-align:center;" id="elfCamAge">No image received</div>
</div>

      <div class="panel">
        <div class="panel-header"><span class="icon">📡</span><h3>GPS Data</h3></div>
        <div class="gps-grid">
          <div class="gps-item"><div class="gps-label">Latitude</div><div class="gps-value" id="gpsLat">${STATE.gps?.lat || '—'}</div></div>
          <div class="gps-item"><div class="gps-label">Longitude</div><div class="gps-value" id="gpsLng">${STATE.gps?.lng || '—'}</div></div>
          <div class="gps-item"><div class="gps-label">Last Fix</div><div class="gps-value" id="gpsTime">—</div></div>
          <div class="gps-item"><div class="gps-label">Signal Age</div><div class="gps-value" id="gpsAgeLive">${gpsAgeText()}</div></div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-header"><span class="icon">❤️</span><h3>Donations</h3></div>
        <div id="donationDetail"></div>
      </div>
    </div>
  </div>`;

  h += '<div class="last-updated" id="lastUpdated">Connecting...</div>';
  h += '</div>';

  if (document.getElementById('app').innerHTML === "") {
    document.getElementById('app').innerHTML = h;
  }
  
  updateDashboard();
  updatePaButtonState(); 
}

function initMap() {
  const s = STATE.settings;
  
  const startLat = STATE.gps?.lat || 52.47080954243374;
  const startLng = STATE.gps?.lng || -1.9206740193920633;
  const startZoom = 15;

  // Added preferCanvas: true right here 👇
  STATE.map = L.map('godMap', { zoomControl: true }).setView([startLat, startLng], startZoom);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '© OpenStreetMap'
  }).addTo(STATE.map);

  const iconUrl = s.sleigh_icon_live || 'https://i.ibb.co/Qj3vDbSR/Santa-Marker-11.png';
  STATE.marker = L.marker([startLat, startLng], {
    icon: L.icon({ iconUrl, iconSize: [64, 64], iconAnchor: [32, 60] })
  }).addTo(STATE.map);

  const todayRoute = getTodayRoute();
  const nextRoute = getNextRoute();
  const route = todayRoute || nextRoute;

  if (route && route.gpxUrl) {
    loadGpxRoute(route, s);
  }
}

function loadGpxRoute(route, settings) {
  const startIconUrl = settings.sleigh_icon_start || 'https://i.ibb.co/PzDYmwzZ/Santa-Marker-4.png';
  const endIconUrl = settings.sleigh_icon_end || 'https://i.ibb.co/39WF0kBd/Santa-Marker-5.png';

  STATE.routeGlowLayer = new L.GPX(route.gpxUrl, {
    async: true,
    // Fix: Added lineCap and lineJoin to prevent massive SVG rendering spikes
    polyline_options: { color: '#ffd700', weight: 7, opacity: 0.45, lineCap: 'round', lineJoin: 'round' },
    marker_options: { startIconUrl: null, endIconUrl: null, shadowUrl: null }
  }).addTo(STATE.map);

  STATE.routeMainLayer = new L.GPX(route.gpxUrl, {
    async: true,
    // Fix: Added lineCap and lineJoin here as well
    polyline_options: { color: '#d31c1c', weight: 4, opacity: 0.95, lineCap: 'round', lineJoin: 'round' },
    marker_options: {
      startIcon: L.icon({ iconUrl: startIconUrl, iconSize: [48, 48], iconAnchor: [24, 48], shadowUrl: null }),
      endIcon: L.icon({ iconUrl: endIconUrl, iconSize: [48, 48], iconAnchor: [24, 48], shadowUrl: null }),
      shadowUrl: null
    }
  }).addTo(STATE.map);

  STATE.routeMainLayer.on('loaded', (e) => {
    STATE.gpxLoaded = true;
    if (!STATE.gps && !heatmapMode) {
      STATE.map.fitBounds(e.target.getBounds(), { padding: [30, 30] });
    }
  });
}

function updateDashboard() { 
  updateRouteDetail(); 
  updateDonationDetail(); 
  updateRaisedStat(); 
  updateElfCam();
}

function updateClock() {
  const el = document.getElementById('clock');
  if (el) el.textContent = fmtTime(new Date());
}

function updateGpsAge() {
  const fresh = isGpsFresh();
  const age = gpsAgeText();

  const el = (id, fn) => { const e = document.getElementById(id); if (e) fn(e); };

  el('gpsAgeLive', e => e.textContent = age);
  el('statGpsAge', e => e.textContent = age);
  el('statGpsStatus', e => { e.textContent = fresh ? 'LIVE' : 'STALE'; e.className = 'value ' + (fresh ? 'green' : 'red'); });
  el('liveBadge', e => e.className = 'live-badge' + (fresh ? '' : ' stale'));
  el('liveBadgeText', e => e.textContent = fresh ? 'LIVE' : 'NO SIGNAL');
  
  if (!heatmapMode) {
    el('mapLabel', e => e.textContent = fresh ? 'Live Position' : 'Last Known Position');
  }

  el('lastUpdated', e => {
    const p = [];
    if (STATE.lastGpsUpdate) p.push('GPS ' + fmtTime(STATE.lastGpsUpdate));
    if (STATE.lastViewerUpdate) p.push('Viewers ' + fmtTime(STATE.lastViewerUpdate));
    if (STATE.lastApiUpdate) p.push('API ' + fmtTime(STATE.lastApiUpdate));
    e.textContent = p.join('  ·  ');
  });
}

function updateGps() {
  if (!STATE.gps) return;
  const el = (id, v) => { const e = document.getElementById(id); if (e) e.textContent = v; };

  el('gpsLat', parseFloat(STATE.gps.lat).toFixed(6));
  el('gpsLng', parseFloat(STATE.gps.lng).toFixed(6));
  if (STATE.gps.ts) el('gpsTime', fmtTime(new Date(STATE.gps.ts)));

  if (STATE.map && STATE.marker && !heatmapMode) {
    const ll = L.latLng(STATE.gps.lat, STATE.gps.lng);
    STATE.marker.setLatLng(ll);
    
    // Check how far the map center is from the live sleigh
    const distance = STATE.map.getCenter().distanceTo(ll);

    // If we are more than 5km away (e.g. sitting at HQ), do the big cloaked flight!
    if (distance > 5000) {
      if (STATE.routeGlowLayer) STATE.map.removeLayer(STATE.routeGlowLayer);
      if (STATE.routeMainLayer) STATE.map.removeLayer(STATE.routeMainLayer);
      
      STATE.map.flyTo(ll, 15, { animate: true, duration: 2.0 });
      
      STATE.map.once('moveend', () => {
        if (!heatmapMode && STATE.routeGlowLayer) STATE.routeGlowLayer.addTo(STATE.map);
        if (!heatmapMode && STATE.routeMainLayer) STATE.routeMainLayer.addTo(STATE.map);
      });
      
    // ONLY pan the camera if Santa has moved more than 10 meters from the center
    } else if (distance > 10) {
      STATE.map.panTo(ll, { animate: true, duration: 0.8 });
    }
  }

  updateGpsAge();
}

function updateViewers() {
  const vEl = document.getElementById('statViewers');
  const wEl = document.getElementById('statWaves'); 
  
  if (vEl) vEl.textContent = STATE.activeViewers;
  if (wEl) wEl.textContent = (STATE.totalWaves !== undefined) ? STATE.totalWaves : '—';
}

function updateRouteDetail() {
  const c = document.getElementById('routeDetail');
  if (!c) return;

  const today = getTodayRoute();
  const next = getNextRoute();
  const route = today || next;
  const isToday = !!today;

  if (!route) { c.innerHTML = '<div class="no-route">No routes scheduled</div>'; return; }

  const streets = (route.streets || '').split(',').map(s => s.trim()).filter(Boolean);

  c.innerHTML = `<div class="route-info">
    <div class="route-row"><span class="route-label">Route</span><span class="route-value">${route.routeName || '—'}</span></div>
    <div class="route-row"><span class="route-label">${isToday ? 'Tonight' : 'Next'}</span><span class="route-value gold">${fmtDate(route.date)}</span></div>
    <div class="route-row"><span class="route-label">Streets</span><span class="route-value">${streets.length}</span></div>
    ${streets.length ? `<div class="streets-scroll">${streets.join(' · ')}</div>` : ''}
  </div>`;

  const el = (id, v) => { const e = document.getElementById(id); if (e) e.textContent = v; };
  el('statRoute', route.routeName || '—');
  el('statRouteDate', isToday ? 'Tonight' : fmtDate(route.date));
}

function updateDonationDetail() {
  const c = document.getElementById('donationDetail');
  if (!c) return;
  const d = STATE.donations;
  const cur = d.currency || '£';
  const total = d.total || 0;
  const target = d.target || 0;
  const pct = target > 0 ? Math.min(100, Math.round((total / target) * 100)) : 0;

  c.innerHTML = `<div class="donation-mini">
    <div class="donation-labels"><span class="raised">${cur}${total.toLocaleString()}</span><span class="target">${cur}${target.toLocaleString()}</span></div>
    <div class="donation-bar-outer"><div class="donation-bar-inner" style="width:${pct}%"></div></div>
    <div class="donation-pct">${pct}% of target</div>
  </div>`;
}

function updateRaisedStat() {
  const d = STATE.donations;
  const cur = d.currency || '£';
  const el = (id, v) => { const e = document.getElementById(id); if (e) e.textContent = v; };
  el('statRaised', `${cur}${(d.total || 0).toLocaleString()}`);
  el('statTarget', `of ${cur}${(d.target || 0).toLocaleString()}`);
}

// ⭐ NEW: HEATMAP LOGIC
let heatmapMode = false;
let heatLayer = null;
let allHeatData = null;
let allGpxLayers = [];

async function toggleHeatmap() {
  const btn = document.getElementById('toggleHeatmapBtn');
  const controls = document.getElementById('heatmapControls');

  if (heatmapMode) {
    heatmapMode = false;
    btn.innerText = "🔥Heatmap Mode"; 
    btn.className = "btn-heat";
    controls.classList.remove('active');
    document.getElementById('mapLabel').textContent = isGpsFresh() ? 'Live Position' : 'Last Known Position';
    
    if (heatLayer) STATE.map.removeLayer(heatLayer);
    allGpxLayers.forEach(layer => STATE.map.removeLayer(layer));
    allGpxLayers = [];
    
    if (STATE.marker && STATE.gps) {
      STATE.marker.addTo(STATE.map);
      STATE.map.panTo([STATE.gps.lat, STATE.gps.lng]);
    }
    
    if (STATE.routeGlowLayer) STATE.routeGlowLayer.addTo(STATE.map);
    if (STATE.routeMainLayer) STATE.routeMainLayer.addTo(STATE.map);
    
  } else {
    btn.innerText = "Loading Data...";
    try {
      const res = await fetch(getApiUrl('function=getHeatmapData'));
      allHeatData = await res.json();
      
      if (allHeatData.error) throw new Error(allHeatData.error);
      
      heatmapMode = true;
      btn.innerText = "Exit Heatmap Mode";
      btn.className = "btn-heat active";
      controls.classList.add('active');
      document.getElementById('mapLabel').textContent = 'Planning Map';

      if (STATE.marker) STATE.map.removeLayer(STATE.marker);
      if (STATE.routeGlowLayer) STATE.map.removeLayer(STATE.routeGlowLayer);
      if (STATE.routeMainLayer) STATE.map.removeLayer(STATE.routeMainLayer);
      
      STATE.routes.forEach(route => {
        if (route.gpxUrl) {
          const l = new L.GPX(route.gpxUrl, {
            async: true,
            // Fix: Also added to the ghost routes just in case!
            polyline_options: { color: "#1D1D1A", weight: 4, opacity: 0.35, lineCap: 'round', lineJoin: 'round' }, 
            marker_options: { startIconUrl: null, endIconUrl: null, shadowUrl: null }
          }).addTo(STATE.map);
          allGpxLayers.push(l);
        }
      });

      const allYears = [...(allHeatData.subscribers||[]).map(d=>d.year), ...(allHeatData.suggestions||[]).map(d=>d.year)];
      const uniqueYears = [...new Set(allYears)].filter(y => y !== "Unknown").sort().reverse();
      const yearSelect = document.getElementById('heatYear');
      yearSelect.innerHTML = '<option value="All">All Time</option>';
      uniqueYears.forEach(y => {
        yearSelect.innerHTML += `<option value="${y}">${y}</option>`;
      });
      if (uniqueYears.length > 0) yearSelect.value = uniqueYears[0];

      drawHeatmap();

    } catch (e) {
      alert("Failed to load Heatmap data. " + e.message);
      btn.innerText = "🔥Heatmap Mode";
    }
  }
}

function drawHeatmap() {
  if (!heatmapMode || !allHeatData) return;
  if (heatLayer) STATE.map.removeLayer(heatLayer);
  
  const type = document.getElementById('heatType').value; 
  const year = document.getElementById('heatYear').value;
  
  const activeDataset = allHeatData[type] || [];
  const filtered = activeDataset.filter(d => year === "All" || d.year === year);
  const leafletFormat = filtered.map(d => [d.lat, d.lng, 1]);

  if (leafletFormat.length === 0) return; 

  heatLayer = L.heatLayer(leafletFormat, {
    radius: 25, blur: 15, maxZoom: 15,
    gradient: {0.4: 'blue', 0.6: 'cyan', 0.7: 'lime', 0.8: 'yellow', 1.0: 'red'}
  }).addTo(STATE.map);
}

  function updateElfCam() {
  const url = STATE.settings?.elf_cam_url;
  const container = document.getElementById('elfCamPreview');
  const ageEl = document.getElementById('elfCamAge');
  if (!container) return;

  if (!url) {
    container.innerHTML = '<div class="no-route">No elf_cam_url in settings</div>';
    return;
  }

  // Convert to thumbnail URL the same way the tracker does
  let finalUrl = url;
  if (url.includes('drive.google.com')) {
    try {
      const urlObj = new URL(url);
      const fileId = urlObj.searchParams.get('id');
      if (fileId) finalUrl = `https://drive.google.com/thumbnail?id=${fileId}&sz=w400`;
    } catch(e) {}
  }

  container.innerHTML = `
  <img src="${finalUrl}" 
    style="width:100%; max-height:120px; object-fit:cover; object-position:center top; border-radius:8px; border:2px solid var(--border); background:#111;"
    onerror="this.style.border='2px solid var(--red)'; this.alt='⚠️ Image failed to load — check Drive sharing';"
    alt="Elf Cam">`;
  
  if (ageEl) ageEl.textContent = 'Last updated: ' + fmtTime(new Date());
}
  
</script>
