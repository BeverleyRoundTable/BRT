<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>God Mode</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <style>
  :root {
    --bg: #1D1D1A;         /* Official Table Grey */
    --surface: #262622;
    --surface-2: #2f2f2a;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f0;
    --text-dim: rgba(255,255,255,0.5);
    --text-muted: rgba(255,255,255,0.3);
    --gold: #FBAF33;       /* Official Golden Yellow */
    --gold-dim: rgba(251,175,51,0.12);
    --red: #d31c1c;
    --green: #FBAF33;
    --green-dim: rgba(251,175,51,0.15);
    --red-dim: rgba(211,28,28,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Open Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .loader {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px; z-index: 9999;
    transition: opacity 0.4s;
  }
  .loader.done { opacity: 0; pointer-events: none; }
  .loader-spin {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    text-align: center; padding: 80px 24px; color: #ff6b6b;
    font-size: 1.1em; max-width: 600px; margin: 0 auto;
  }
  .error-msg code {
    background: var(--surface); padding: 4px 10px; border-radius: 6px; font-size: 0.85em;
  }

  .dashboard { max-width: 1400px; margin: 0 auto; padding: 24px; }

  /* \u2500\u2500 TOP BAR \u2500\u2500 */
  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
  }
  .top-bar-left { display: flex; align-items: center; gap: 14px; }
  .top-bar .logo {
    width: 48px; height: 48px; border-radius: 12px;
    object-fit: contain; background: rgba(255,255,255,0.06); padding: 2px;
  }
  .top-bar .title { font-size: 1.4em; font-weight: 800; letter-spacing: -0.02em; }
  .top-bar .title span { color: var(--gold); }
  .top-bar-right { display: flex; align-items: center; gap: 16px; }

  .live-badge {
    display: flex; align-items: center; gap: 8px;
    font-size: 0.78em; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--green); background: var(--green-dim);
    padding: 6px 14px; border-radius: 100px;
  }
  .live-dot {
    width: 8px; height: 8px; background: var(--green);
    border-radius: 50%; animation: pulse 1.5s ease-in-out infinite;
  }
  .live-badge.stale { color: var(--red); background: var(--red-dim); }
  .live-badge.stale .live-dot { background: var(--red); animation: none; }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  .clock {
    font-size: 1.4em; font-weight: 700; color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }

  /* \u2500\u2500 STAT CARDS \u2500\u2500 */
  .stats-row {
    display: grid; 
    grid-template-columns: repeat(5, 1fr); 
    gap: 16px; margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 24px 20px; text-align: center;
    position: relative; overflow: hidden;
  }
  .stat-card .label {
    font-size: 0.7em; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 8px;
  }
  .stat-card .value {
    font-size: 2.2em; font-weight: 800; line-height: 1;
    letter-spacing: -0.03em; font-variant-numeric: tabular-nums;
  }
  .stat-card .sub { font-size: 0.75em; color: var(--text-muted); margin-top: 6px; }
  .stat-card .value.gold { color: var(--gold); }
  .stat-card .value.green { color: var(--green); }
  .stat-card .value.red { color: var(--red); }

  /* \u2500\u2500 MAIN GRID \u2500\u2500 */
  .main-grid { display: grid; grid-template-columns: 1fr 380px; gap: 20px; }

  .map-panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden; position: relative; min-height: 500px;
  }
  #godMap { width: 100%; height: 100%; min-height: 500px; z-index: 1; }
  .map-overlay-label {
    position: absolute; top: 12px; left: 12px;
    background: rgba(29,29,26,0.85); color: var(--text);
    font-size: 0.72em; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.08em; padding: 6px 12px; border-radius: 8px;
    z-index: 1000; pointer-events: none;
  }

  .sidebar { display: flex; flex-direction: column; gap: 16px; }
  .panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 20px;
  }
  .panel-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .panel-header .icon { font-size: 1.2em; }
  .panel-header h3 {
    font-size: 0.85em; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--text-dim);
  }

  /* \u2500\u2500 PA SYSTEM \u2500\u2500 */
  .pa-input {
    width: 100%; background: var(--surface-2); border: 1px solid var(--border);
    color: white; padding: 12px; border-radius: 8px; font-family: inherit; font-size: 0.9em;
    margin-bottom: 10px; outline: none; box-sizing: border-box;
  }
  .pa-input:focus { border-color: var(--gold); }
  
  select.pa-input { cursor: pointer; }
  select.pa-input option { background: var(--surface); color: var(--text); }

  .pa-btns { display: flex; gap: 8px; }
  .pa-btns button {
    flex: 1; padding: 10px; font-weight: bold; border-radius: 8px; cursor: pointer;
    border: none; transition: 0.2s; font-family: inherit; font-size: 0.85em;
  }
  .pa-btns button:active { transform: scale(0.96); }
  
  .btn-broadcast { 
    background: var(--surface-2); 
    color: var(--text-dim); 
    border: 1px solid var(--border);
  }
  
  .btn-broadcast.live-active { 
    background: var(--gold) !important; 
    color: #000000 !important; 
    font-weight: 900 !important;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border: 2px solid #ffffff !important;
    animation: pulse-broadcast 1.5s infinite; 
  }
  
  @keyframes pulse-broadcast {
    0% { box-shadow: 0 0 0 0 rgba(251, 175, 51, 0.9); transform: scale(1); }
    50% { box-shadow: 0 0 0 15px rgba(251, 175, 51, 0); transform: scale(1.02); }
    100% { box-shadow: 0 0 0 0 rgba(251, 175, 51, 0); transform: scale(1); }
  }

  .btn-clear { background: var(--surface-2); color: var(--text-dim); border: 1px solid var(--border); }

  /* \u2500\u2500 CREW ALERT PANEL \u2500\u2500 */
  .crew-alert-panel {
    border-color: rgba(211,28,28,0.25) !important;
  }
  .crew-alert-panel .panel-header h3 {
    color: var(--red) !important;
  }
  .crew-alert-badge {
    font-size: 0.65em; font-weight: 800; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--text-muted);
    background: var(--surface-2); border: 1px solid var(--border);
    padding: 3px 8px; border-radius: 4px; margin-left: auto;
  }

  .btn-crew-send {
    background: var(--surface-2);
    color: var(--text-dim);
    border: 1px solid var(--border);
  }

  .btn-crew-send.crew-active {
    background: var(--red) !important;
    color: #ffffff !important;
    font-weight: 900 !important;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border: 2px solid rgba(255,255,255,0.3) !important;
    animation: pulse-crew 1.5s infinite;
  }

  @keyframes pulse-crew {
    0% { box-shadow: 0 0 0 0 rgba(211,28,28,0.8); transform: scale(1); }
    50% { box-shadow: 0 0 0 12px rgba(211,28,28,0); transform: scale(1.02); }
    100% { box-shadow: 0 0 0 0 rgba(211,28,28,0); transform: scale(1); }
  }

  /* \u2500\u2500 GPS INFO \u2500\u2500 */
  .gps-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .gps-item { background: var(--surface-2); border-radius: 10px; padding: 12px; }
  .gps-item .gps-label {
    font-size: 0.68em; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 4px;
  }
  .gps-item .gps-value { font-size: 1.05em; font-weight: 700; font-variant-numeric: tabular-nums; }

  /* \u2500\u2500 ROUTE INFO \u2500\u2500 */
  .route-info { display: flex; flex-direction: column; gap: 10px; }
  .route-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 14px; background: var(--surface-2); border-radius: 10px;
  }
  .route-row .route-label { font-size: 0.78em; color: var(--text-dim); font-weight: 600; }
  .route-row .route-value { font-size: 0.9em; font-weight: 700; }
  .route-row .route-value.gold { color: var(--gold); }
  .no-route { text-align: center; padding: 20px; color: var(--text-muted); font-size: 0.85em; }

  /* \u2500\u2500 HEATMAP CONTROLS \u2500\u2500 */
  .heatmap-controls { display: none; margin-top: 15px; background: rgba(255,255,255,0.05); padding: 12px; border-radius: 10px; }
  .heatmap-controls.active { display: block; animation: slideDown 0.3s ease-out; }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  .heatmap-controls select { width: 100%; margin-bottom: 8px; padding: 10px; background: var(--surface-2); color: var(--gold); font-weight: bold; border: 1px solid var(--border); border-radius: 8px; outline: none; cursor: pointer; }
  .btn-heat { background: var(--surface-2); color: #ff6b6b; border: 1px solid var(--border); margin-top: 12px; width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; font-family: inherit;}
  .btn-heat:active { transform: scale(0.96); }
  .btn-heat.active { background: #ff6b6b; color: #000; border-color: #ff6b6b; box-shadow: 0 0 15px rgba(255, 107, 107, 0.4); }

  /* \u2500\u2500 DONATIONS \u2500\u2500 */
  .donation-mini { display: flex; flex-direction: column; gap: 8px; }
  .donation-labels { display: flex; justify-content: space-between; font-size: 0.8em; font-weight: 700; }
  .donation-labels .raised { color: var(--gold); }
  .donation-labels .target { color: var(--text-muted); }
  .donation-bar-outer { height: 16px; background: var(--surface-2); border-radius: 8px; overflow: hidden; }
  .donation-bar-inner {
    height: 100%; background: linear-gradient(90deg, var(--red), var(--gold));
    border-radius: 8px; transition: width 1s ease; min-width: 8px;
  }
  .donation-pct { text-align: center; font-size: 0.75em; font-weight: 700; color: var(--text-muted); }

  /* \u2500\u2500 STREETS \u2500\u2500 */
  .streets-scroll {
    max-height: 180px; overflow-y: auto; font-size: 0.82em;
    color: var(--text-dim); line-height: 1.8; padding-right: 8px; margin-top: 8px;
  }
  .streets-scroll::-webkit-scrollbar { width: 4px; }
  .streets-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .last-updated {
    text-align: center; font-size: 0.7em; color: var(--text-muted);
    margin-top: 20px; font-variant-numeric: tabular-nums;
  }

  /* Leaflet dark tiles filter */
  .leaflet-tile-pane { filter: brightness(0.85) saturate(0.9); }
  .leaflet-top, .leaflet-bottom { z-index: 500 !important; }

  @media (max-width: 900px) {
    .stats-row { grid-template-columns: repeat(3, 1fr); } 
    .main-grid { grid-template-columns: 1fr; }
    .map-panel { min-height: 400px; }
  }
  @media (max-width: 500px) {
    .stats-row { grid-template-columns: 1fr 1fr; } 
    .dashboard { padding: 16px; }
    .top-bar .title { font-size: 1.1em; }
  }
  </style>
</head>
<body>

<div class="loader" id="loader"><div class="loader-spin"></div></div>
<div id="app"></div>

<script>
const API = new URLSearchParams(location.search).get('api') || '';

const STATE = {
  settings: {}, routes: [], donations: {}, tracker: {}, streets: [],
  gps: null, activeViewers: 0, totalWaves: 0, 
  lastApiUpdate: null, lastGpsUpdate: null, lastViewerUpdate: null,
  map: null, marker: null, routeGlowLayer: null, routeMainLayer: null, gpxLoaded: false
};

function getApiUrl(params = '') {
  const secret = sessionStorage.getItem('sleighSecret') || '';
  const base = API.includes('?') ? API : API + '?';
  const separator = base.endsWith('?') ? '' : '&';
  return `${base}${separator}secret=${encodeURIComponent(secret)}${params ? '&' + params : ''}`;
}

if (!API) {
  document.getElementById('loader').classList.add('done');
  document.getElementById('app').innerHTML =
    '<div class="error-msg">Missing <strong>?api=</strong> parameter.<br><br>Usage: <code>god_mode?api=YOUR_API_URL</code></div>';
} else {
  init();
}

async function init() {
  let secret = sessionStorage.getItem('sleighSecret');
  
  if (!secret) {
    secret = prompt("\ud83c\udf85 God Mode Authorization Required\n\nEnter the Master Password:");
    if (!secret) {
      document.getElementById('app').innerHTML = '<div class="error-msg">Authorization required. Refresh the page to try again.</div>';
      document.getElementById('loader').classList.add('done');
      return;
    }
    
    try {
      const sep = API.includes('?') ? '&' : '?';
      const check = await fetch(`${API}${sep}function=verifyGodMode&secret=${encodeURIComponent(secret)}`);
      const result = await check.json();
      
      if (!result.valid) {
        document.getElementById('app').innerHTML = '<div class="error-msg">\u274c Access Denied. Incorrect Password.</div>';
        document.getElementById('loader').classList.add('done');
        return;
      }
      
      sessionStorage.setItem('sleighSecret', secret);
    } catch(e) {
      document.getElementById('app').innerHTML = '<div class="error-msg">\u274c Failed to connect to API to verify password.</div>';
      document.getElementById('loader').classList.add('done');
      return;
    }
  }

  await fetchApiData();
  buildDashboard();
  initMap();
  document.getElementById('loader').classList.add('done');
  
  fetchGps();
  fetchViewers();
  fetchWeather();
  
  setInterval(fetchApiData, 30000);
  setInterval(fetchGps, 5000);
  setInterval(fetchViewers, 10000);
  setInterval(fetchWeather, 900000);
  setInterval(updateClock, 1000);
  setInterval(updateGpsAge, 1000);
}

async function fetchApiData() {
  try {
    const res = await fetch(getApiUrl());
    const data = await res.json();
    STATE.settings = data.settings || {};
    STATE.routes = data.routes || [];
    STATE.donations = data.donations || {};
    STATE.tracker = data.tracker || {};
    STATE.streets = data.streets || [];
    STATE.lastApiUpdate = new Date();
    
    const paInput = document.getElementById("paInput");
    if (paInput && document.activeElement !== paInput) {
      paInput.value = STATE.settings.live_announcement || '';
    }

    const crewInput = document.getElementById("crewAlertInput");
    if (crewInput && document.activeElement !== crewInput) {
      crewInput.value = STATE.settings.crew_alert || '';
    }

    updateDashboard();
    updatePaButtonState();
    updateCrewAlertButtonState();
  } catch(e) { console.error('API:', e); }
}

async function fetchGps() {
  try {
    const res = await fetch(getApiUrl('function=proxyFirebase'));
    const data = await res.json();
    if (data && data.lat) { 
      STATE.gps = data; 
      STATE.lastGpsUpdate = new Date(); 
      if (!STATE.weather) fetchWeather();
    }
    updateGps();
  } catch(e) { console.error('GPS:', e); }
}

async function fetchViewers() {
  try {
    const res = await fetch(getApiUrl('function=getActiveViewers'));
    const data = await res.json();
    STATE.activeViewers = data.active || 0;
    STATE.totalWaves = data.waves || 0; 
    STATE.lastViewerUpdate = new Date();
    updateViewers();
  } catch(e) { console.error('Viewers:', e); }
}

function getWeatherEmoji(code) {
  if (code === 0) return '\u2600\ufe0f Clear';
  if (code <= 3) return '\u2601\ufe0f Cloudy';
  if (code <= 48) return '\ud83c\udf2b\ufe0f Fog';
  if (code <= 67) return '\ud83c\udf27\ufe0f Rain';
  if (code <= 77) return '\u2744\ufe0f Snow';
  if (code <= 82) return '\ud83c\udf27\ufe0f Showers';
  if (code <= 86) return '\u2744\ufe0f Snow Showers';
  if (code >= 95) return '\u26c8\ufe0f Thunderstorm';
  return '\ud83c\udf21\ufe0f Unknown';
}

async function fetchWeather() {
  const lat = STATE.gps?.lat; 
  const lng = STATE.gps?.lng;
  if (!lat || !lng) {
    const container = document.getElementById('weatherDetail');
    if (container) container.innerHTML = '<div class="no-route">Waiting for location data...</div>';
    return;
  }
  try {
    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current_weather=true&windspeed_unit=mph`);
    const data = await res.json();
    if (data.current_weather) { STATE.weather = data.current_weather; updateWeather(); }
  } catch(e) { console.error('Weather fetching failed:', e); }
}

function updateWeather() {
  const container = document.getElementById('weatherDetail');
  if (!container || !STATE.weather) return;
  const w = STATE.weather;
  const condition = getWeatherEmoji(w.weathercode);
  const conditionColor = w.weathercode > 50 ? 'color: var(--red);' : '';
  container.innerHTML = `
    <div class="gps-grid">
      <div class="gps-item" style="grid-column: span 2;">
        <div class="gps-label">Condition</div>
        <div class="gps-value" style="${conditionColor}">${condition}</div>
      </div>
      <div class="gps-item">
        <div class="gps-label">Temp</div>
        <div class="gps-value">${w.temperature}\u00b0C</div>
      </div>
      <div class="gps-item">
        <div class="gps-label">Wind</div>
        <div class="gps-value">${w.windspeed} mph</div>
      </div>
    </div>`;
}
  
function getTodayRoute() {
  const today = new Date().toISOString().slice(0, 10);
  return STATE.routes.find(r => r.date === today) || null;
}

function getNextRoute() {
  const today = new Date().toISOString().slice(0, 10);
  return STATE.routes.filter(r => r.date && r.date > today)
    .sort((a, b) => a.date.localeCompare(b.date))[0] || null;
}

function fmtDate(d) {
  if (!d) return '';
  const dt = new Date(d + 'T00:00:00');
  return isNaN(dt) ? d : dt.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
}

function fmtTime(d) {
  return d ? d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) : '--:--:--';
}

function gpsAgeText() {
  if (!STATE.gps?.ts) return 'No signal';
  const s = Math.floor((Date.now() - new Date(STATE.gps.ts).getTime()) / 1000);
  if (s < 0) return 'Just now';
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  return Math.floor(s / 3600) + 'h ago';
}

function isGpsFresh() {
  return STATE.gps?.ts && (Date.now() - new Date(STATE.gps.ts).getTime()) < 120000;
}

// \u2500\u2500 PA SYSTEM \u2500\u2500

async function sendAnnouncement() {
  const msg = document.getElementById('paInput').value.trim();
  const btn = document.getElementById('broadcastBtn');
  const secret = sessionStorage.getItem('sleighSecret') || ''; 
  
  btn.innerText = "Sending...";
  btn.style.background = "var(--surface-2)";
  btn.style.color = "var(--text-dim)";
  
  try {
    const response = await fetch(API, { 
      method: "POST", 
      body: JSON.stringify({ action: "updateAnnouncement", message: msg, secret }) 
    });
    const result = await response.json();
    if (result.ok) {
      STATE.settings.live_announcement = msg;
    } else {
      alert("Action Blocked: " + result.error); 
    }
    updatePaButtonState();
  } catch(e) { 
    alert('Failed to update announcement. Check connection.'); 
    updatePaButtonState(); 
  }
}

async function clearAnnouncement() {
  document.getElementById('paInput').value = '';
  await sendAnnouncement();
}

function updatePaButtonState() {
  const btn = document.getElementById('broadcastBtn');
  const paInput = document.getElementById("paInput");
  const msg = STATE.settings.live_announcement || '';
  if (!btn) return;
  
  if (paInput && document.activeElement !== paInput) paInput.value = msg;

  if (msg.trim() !== '') {
    btn.innerText = "ACTIVE ON TRACKER";
    btn.className = "btn-broadcast live-active";
  } else {
    btn.innerText = "Broadcast Live";
    btn.className = "btn-broadcast";
  }
}

// \u2500\u2500 CREW ALERT \u2500\u2500

async function sendCrewAlert() {
  const msg = document.getElementById('crewAlertInput').value.trim();
  const btn = document.getElementById('crewAlertBtn');
  const secret = sessionStorage.getItem('sleighSecret') || '';

  btn.innerText = "Sending...";
  btn.style.background = "var(--surface-2)";
  btn.style.color = "var(--text-dim)";

  try {
    const response = await fetch(API, {
      method: "POST",
      body: JSON.stringify({ action: "updateCrewAlert", message: msg, secret })
    });
    const result = await response.json();
    if (result.ok) {
      STATE.settings.crew_alert = msg;
    } else {
      alert("Action Blocked: " + result.error);
    }
    updateCrewAlertButtonState();
  } catch(e) {
    alert('Failed to send crew alert. Check connection.');
    updateCrewAlertButtonState();
  }
}

async function clearCrewAlert() {
  document.getElementById('crewAlertInput').value = '';
  await sendCrewAlert();
}

function updateCrewAlertButtonState() {
  const btn = document.getElementById('crewAlertBtn');
  const input = document.getElementById('crewAlertInput');
  const msg = STATE.settings.crew_alert || '';
  if (!btn) return;

  if (input && document.activeElement !== input) input.value = msg;

  if (msg.trim() !== '') {
    btn.innerText = "ACTIVE ON CREW HUB";
    btn.className = "btn-crew-send crew-active";
  } else {
    btn.innerText = "Send to Crew";
    btn.className = "btn-crew-send";
  }
}
