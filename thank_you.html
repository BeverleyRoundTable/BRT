<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You Card Generator — TurboSanta</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  /* ── NATIONAL BRAND VARIABLES ── */
  :root {
    --gold: #FBAF33;
    --gold-dim: rgba(251,175,51,0.12);
    --gold-glow: rgba(251,175,51,0.25);
    --dark: #0d0d0b;
    --surface: #161614;
    --surface-2: #1e1e1b;
    --surface-3: #252522;
    --border: rgba(255,255,255,0.08);
    --border-gold: rgba(251,175,51,0.2);
    --red: #D31C1C;
    --red-dim: rgba(211,28,28,0.15);
    --green: #2ecc71;
    --green-dim: rgba(46,204,113,0.12);
    --blue: #4a9eff;
    --text: #eaeae5;
    --text-dim: rgba(255,255,255,0.55);
    --text-muted: rgba(255,255,255,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .app { max-width: 900px; margin: 0 auto; padding: 48px 24px 64px; }

  /* ── HERO HEADER ── */
  header { text-align: center; margin-bottom: 40px; position: relative; }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: var(--gold-dim);
    color: var(--gold);
    border: 1px solid var(--border-gold);
    margin-bottom: 16px;
  }

  header h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(40px, 6vw, 64px);
    letter-spacing: 3px;
    line-height: 0.9;
    color: #fff;
    margin: 0 0 12px 0;
  }

  header h2 span { color: var(--gold); }

  header p {
    color: var(--text-dim);
    margin: 0;
    font-size: 16px;
  }

  /* ── CONTROLS / PANELS ── */
  .panel {
    background: var(--surface); 
    border: 1px solid var(--border);
    border-radius: 14px; 
    padding: 24px; 
    margin-bottom: 24px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.4);
  }

  .panel h3 {
    font-size: 11px; 
    font-weight: 700; 
    text-transform: uppercase;
    letter-spacing: 1.5px; 
    color: var(--text-muted); 
    margin-bottom: 20px;
  }

  .field { margin-bottom: 20px; }

  .field label {
    display: block; 
    font-size: 10px; 
    font-weight: 700;
    color: var(--text-muted); 
    text-transform: uppercase;
    letter-spacing: 1px; 
    margin-bottom: 8px;
  }

  .field input, .field textarea, .field select {
    width: 100%; 
    background: var(--surface-2); 
    border: 1px solid var(--border);
    border-radius: 8px; 
    padding: 14px 16px; 
    color: var(--text);
    font-family: 'DM Sans', sans-serif; 
    font-size: 14px; 
    outline: none;
    transition: 0.2s;
  }

  .field input:focus, .field textarea:focus { 
    border-color: var(--gold); 
    box-shadow: 0 0 0 3px var(--gold-glow);
  }

  .field textarea { resize: vertical; min-height: 80px; }

  /* ── STATS PREVIEW ── */
  .stat-preview {
    display: grid; 
    grid-template-columns: repeat(4, 1fr);
    gap: 12px; 
    margin-bottom: 8px;
  }

  .stat-mini {
    background: var(--surface-2); 
    border-radius: 12px;
    padding: 16px 8px; 
    text-align: center;
    border: 1px solid var(--border);
  }

  .stat-mini .val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px; 
    color: var(--gold);
    line-height: 1;
    letter-spacing: 1px;
  }

  .stat-mini .lbl {
    font-size: 10px; 
    color: var(--text-muted); 
    font-weight: 700;
    text-transform: uppercase; 
    letter-spacing: 1px; 
    margin-top: 6px;
  }

  /* ── BUTTONS ── */
  .format-row {
    display: flex; gap: 8px; margin-bottom: 24px; justify-content: center; flex-wrap: wrap;
  }

  .format-btn {
    font-family: 'DM Sans', sans-serif; 
    font-size: 13px; 
    font-weight: 700;
    padding: 12px 20px; 
    border-radius: 8px; 
    border: 1px solid var(--border);
    background: var(--surface-2); 
    color: var(--text-dim); 
    cursor: pointer;
    transition: 0.2s; 
    flex: 1; 
    text-align: center; 
    max-width: 250px;
  }

  .format-btn:hover { border-color: var(--gold); color: var(--text); }
  .format-btn.active { border-color: var(--gold); background: var(--gold-dim); color: var(--gold); }

  .btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 16px; }

  .btn {
    font-family: 'DM Sans', sans-serif; 
    font-weight: 700; 
    font-size: 14px;
    border: none; 
    border-radius: 8px; 
    padding: 0 32px; 
    height: 48px;
    cursor: pointer;
    transition: all 0.2s ease; 
    white-space: nowrap;
    text-transform: uppercase;
    letter-spacing: 1px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  .btn:hover { transform: translateY(-2px); }
  .btn:active { transform: translateY(0); }

  .btn-gold { background: var(--gold); color: #000; }
  .btn-gold:hover { background: #e59d28; }

  /* ── PREVIEW ── */
  .preview-area {
    text-align: center; margin-top: 24px;
  }

  .preview-area img {
    max-width: 100%; border-radius: 12px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    border: 1px solid var(--border);
  }

  .preview-label {
    font-size: 11px; color: var(--text-muted); margin-bottom: 16px;
    font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
  }

  /* ── LOADING & ERRORS ── */
  .status { text-align: center; padding: 60px; color: var(--text-dim); }

  .spinner {
    width: 40px; height: 40px; border: 3px solid var(--border);
    border-top-color: var(--gold); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg { text-align: center; padding: 60px 24px; color: var(--red); background: var(--surface); border: 1px solid var(--border); border-radius: 16px; }
  .error-msg code { background: var(--surface-2); padding: 6px 12px; border-radius: 6px; font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text); display: inline-block; margin-top: 12px;}

  /* ── OFFSCREEN RENDER ── */
  .card-render-area { position: fixed; left: -9999px; top: 0; }

  /* ═══════════════════════════
     CARD DESIGNS (Rendered Image CSS)
     We use hardcoded values here because html2canvas handles them better than css vars
     ═══════════════════════════ */
  .ty-card {
    position: relative; overflow: hidden;
    font-family: 'DM Sans', sans-serif; color: white;
    background: #161614; /* Matches var(--surface) */
  }

  .ty-card.square { width: 1080px; height: 1080px; }
  .ty-card.landscape { width: 1920px; height: 1080px; }
  .ty-card.story { width: 1080px; height: 1920px; }

  .ty-bg-img {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; object-position: center;
  }

  .ty-overlay {
    position: absolute; inset: 0;
    background: rgba(22, 22, 20, 0.75);
  }

  .ty-no-bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(211,28,28,0.15) 0%, transparent 55%),
      radial-gradient(ellipse at 70% 80%, rgba(251,175,51,0.08) 0%, transparent 45%),
      #161614;
  }

  .ty-inner {
    position: relative; z-index: 2;
    height: 100%; display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    text-align: center; padding: 48px;
    gap: 0;
  }

  .ty-logo {
    width: 100px; height: 100px; border-radius: 24px;
    object-fit: contain; background: rgba(255,255,255,0.08);
    padding: 6px; margin-bottom: 24px;
  }

  .ty-thank {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 110px; font-weight: 400; color: #FBAF33;
    line-height: 0.9; margin-bottom: 12px; letter-spacing: 4px;
    text-shadow: 0 4px 20px rgba(0,0,0,0.8), 0 2px 6px rgba(0,0,0,0.5);
  }

  .ty-town {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 60px; font-weight: 400; color: rgba(255,255,255,0.95);
    margin-bottom: 40px; letter-spacing: 2px;
    text-shadow: 0 3px 14px rgba(0,0,0,0.7), 0 1px 4px rgba(0,0,0,0.5);
  }

  .ty-stats-row {
    display: flex; gap: 16px; margin-bottom: 40px;
    flex-wrap: wrap; justify-content: center;
  }

  .ty-stat {
    background: rgba(29,29,26,0.65);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px; padding: 28px 32px;
    text-align: center; min-width: 160px;
  }

  .ty-stat .num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 64px; line-height: 1;
    margin-bottom: 6px; letter-spacing: 2px;
  }

  .ty-stat .num.gold { color: #FBAF33; }
  .ty-stat .num.red { color: #D31C1C; }
  .ty-stat .num.white { color: rgba(255,255,255,0.9); }

  .ty-stat .lab {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 700;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase; letter-spacing: 2px;
  }

  .ty-message {
    font-size: 24px; font-weight: 500;
    color: rgba(255,255,255,0.85);
    max-width: 700px; line-height: 1.6;
    margin-bottom: 32px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.7), 0 1px 4px rgba(0,0,0,0.4);
  }

  .ty-accent-bar {
    width: 80px; height: 4px;
    background: linear-gradient(90deg, #D31C1C, #FBAF33);
    border-radius: 2px; margin-bottom: 24px;
  }

  .ty-footer {
    display: flex; align-items: center; gap: 14px;
    margin-top: auto; padding-top: 16px;
  }

  .ty-footer img {
    width: 44px; height: 44px; border-radius: 12px;
    object-fit: contain; background: rgba(255,255,255,0.08); padding: 2px;
  }

  .ty-footer .name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px; letter-spacing: 1px;
    color: rgba(255,255,255,0.7);
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
  }

  /* Story adjustments */
  .ty-card.story .ty-inner { padding: 80px 64px; }
  .ty-card.story .ty-logo { width: 120px; height: 120px; border-radius: 28px; margin-bottom: 32px; }
  .ty-card.story .ty-thank { font-size: 140px; }
  .ty-card.story .ty-town { font-size: 80px; margin-bottom: 48px; }
  .ty-card.story .ty-stats-row { gap: 20px; margin-bottom: 48px; }
  .ty-card.story .ty-stat { padding: 36px 40px; min-width: 200px; border-radius: 20px; }
  .ty-card.story .ty-stat .num { font-size: 80px; }
  .ty-card.story .ty-stat .lab { font-size: 16px; }
  .ty-card.story .ty-message { font-size: 32px; margin-bottom: 40px; }
  .ty-card.story .ty-accent-bar { width: 100px; height: 5px; margin-bottom: 32px; }
  .ty-card.story .ty-footer img { width: 52px; height: 52px; }
  .ty-card.story .ty-footer .name { font-size: 28px; }

  /* Landscape adjustments (1920×1080) */
  .ty-card.landscape .ty-inner { padding: 48px 80px; }
  .ty-card.landscape .ty-logo { width: 80px; height: 80px; border-radius: 20px; margin-bottom: 20px; }
  .ty-card.landscape .ty-thank { font-size: 100px; }
  .ty-card.landscape .ty-town { font-size: 50px; margin-bottom: 28px; }
  .ty-card.landscape .ty-stats-row { gap: 16px; margin-bottom: 28px; }
  .ty-card.landscape .ty-stat { padding: 24px 28px; min-width: 150px; }
  .ty-card.landscape .ty-stat .num { font-size: 56px; }
  .ty-card.landscape .ty-stat .lab { font-size: 13px; }
  .ty-card.landscape .ty-message { font-size: 22px; margin-bottom: 24px; }
  .ty-card.landscape .ty-footer .name { font-size: 22px; }

  @media (max-width: 700px) {
    header h2 { font-size: 36px; }
    .stat-preview { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="hero-badge">💌 Shareable</div>
    <h2>THANK YOU <span>CARD</span></h2>
    <p>Generate a custom post-season graphic with your sleigh's statistics</p>
  </header>

  <div id="content">
    <div class="status"><div class="spinner"></div>Loading data…</div>
  </div>
</div>

<div class="card-render-area" id="renderArea"></div>

<script>
const API = new URLSearchParams(location.search).get('api') || '';

const STATE = {
  settings: {}, routes: [], donations: {}, streets: [],
  currentCard: null, currentSlug: ''
};

if (!API) {
  document.getElementById('content').innerHTML =
    `<div class="error-msg">
      <h3>Missing Parameter</h3>
      <p>Please provide your API link in the URL.</p>
      <code>?api=YOUR_API_URL</code>
    </div>`;
} else {
  init();
}

async function init() {
  try {
    const res = await fetch(API);
    const data = await res.json();
    STATE.settings = data.settings || {};
    STATE.routes = data.routes || [];
    STATE.donations = data.donations || {};
    STATE.streets = data.streets || [];
    renderUI();
  } catch(e) {
    document.getElementById('content').innerHTML =
      `<div class="error-msg">Failed to load data: ${e.message}</div>`;
  }
}

function getStats() {
  const today = new Date().toISOString().slice(0, 10);
  const completed = STATE.routes.filter(r => r.date && r.date <= today);
  const routeNames = new Set(completed.map(r => r.routeName));
  const completedStreets = STATE.streets.filter(s => routeNames.has(s.routeName));
  const uniqueStreets = [...new Set(completedStreets.map(s => s.street))].length;
  const currency = STATE.donations.currency || '£';
  const total = STATE.donations.total || 0;
  const volunteers = STATE.settings.wrap_volunteers || '—';

  return {
    routes: completed.length,
    streets: uniqueStreets,
    raised: `${currency}${total.toLocaleString()}`,
    volunteers
  };
}

function renderUI() {
  const s = STATE.settings;
  const stats = getStats();
  const sleighName = s.sleigh_display_name || s.sleigh_name || 'Santa Sleigh';
  const year = s.wrap_year || new Date().getFullYear();

  // Guess town from sleigh name
  const townGuess = sleighName.replace(/round\s*table/i, '').replace(/santa\s*sleigh/i, '').trim() || '';

  document.getElementById('content').innerHTML = `
    <div class="panel">
      <h3>Season Stats (Auto-Populated)</h3>
      <div class="stat-preview">
        <div class="stat-mini"><div class="val">${stats.routes}</div><div class="lbl">Routes</div></div>
        <div class="stat-mini"><div class="val">${stats.streets}</div><div class="lbl">Streets</div></div>
        <div class="stat-mini"><div class="val">${stats.raised}</div><div class="lbl">Raised</div></div>
        <div class="stat-mini"><div class="val">${stats.volunteers}</div><div class="lbl">Volunteers</div></div>
      </div>
    </div>

    <div class="panel">
      <h3>Customise Your Card</h3>
      <div class="field">
        <label>Town / Area Name</label>
        <input type="text" id="townName" value="${townGuess}" placeholder="E.g. Beverley">
      </div>
      <div class="field">
        <label>Thank You Message</label>
        <textarea id="message">Thank you for your incredible generosity this Christmas. Every donation makes a real difference to our community.</textarea>
      </div>
      <div class="field">
        <label>Background Image URL (Optional)</label>
        <input type="text" id="bgUrl" value="${s.bgImageUrl || ''}" placeholder="https://...">
      </div>
    </div>

    <div class="panel">
      <h3>Output Format</h3>
      <div class="format-row">
        <button class="format-btn active" data-fmt="square" onclick="selectFmt(this)">Square (1080×1080)</button>
        <button class="format-btn" data-fmt="landscape" onclick="selectFmt(this)">Landscape (1920×1080)</button>
        <button class="format-btn" data-fmt="story" onclick="selectFmt(this)">Story (1080×1920)</button>
      </div>
      <div class="btn-row">
        <button class="btn btn-gold" onclick="generate()">Generate Image</button>
      </div>
    </div>

    <div class="preview-area" id="previewArea"></div>
  `;
}

function selectFmt(btn) {
  document.querySelectorAll('.format-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function getFormat() {
  const active = document.querySelector('.format-btn.active');
  return active ? active.dataset.fmt : 'square';
}

async function generate() {
  const s = STATE.settings;
  const stats = getStats();
  const format = getFormat();
  const logo = s.logo_overlay_url || '';
  const sleighName = s.sleigh_display_name || s.sleigh_name || 'Santa Sleigh';
  const year = s.wrap_year || new Date().getFullYear();
  const town = document.getElementById('townName').value.trim() || '';
  const message = document.getElementById('message').value.trim();
  const bgUrl = document.getElementById('bgUrl').value.trim();
  const hasBg = !!bgUrl;

  const bgHtml = hasBg
    ? `<img class="ty-bg-img" src="${bgUrl}" crossorigin="anonymous">`
    : '';

  const overlayHtml = hasBg
    ? '<div class="ty-overlay"></div>'
    : '<div class="ty-no-bg"></div>';

  const cardHtml = `
    ${bgHtml}
    ${overlayHtml}
    <div class="ty-inner">
      ${logo ? `<img class="ty-logo" src="${logo}" crossorigin="anonymous">` : ''}
      <div class="ty-thank">THANK YOU${town ? ',' : '!'}</div>
      ${town ? `<div class="ty-town">${town}!</div>` : ''}
      <div class="ty-stats-row">
        <div class="ty-stat"><div class="num gold">${stats.routes}</div><div class="lab">Routes</div></div>
        <div class="ty-stat"><div class="num white">${stats.streets}</div><div class="lab">Streets</div></div>
        <div class="ty-stat"><div class="num red">${stats.raised}</div><div class="lab">Raised</div></div>
        <div class="ty-stat"><div class="num gold">${stats.volunteers}</div><div class="lab">Volunteers</div></div>
      </div>
      ${message ? `<div class="ty-message">${message}</div>` : ''}
      <div class="ty-accent-bar"></div>
      <div class="ty-footer">
        ${logo ? `<img src="${logo}" crossorigin="anonymous">` : ''}
        <span class="name">${sleighName} · ${year}</span>
      </div>
    </div>
  `;

  const renderArea = document.getElementById('renderArea');
  renderArea.innerHTML = `<div class="ty-card ${format}" id="tyCapture">${cardHtml}</div>`;

  // Wait for images
  const imgs = renderArea.querySelectorAll('img');
  await Promise.all([...imgs].map(img => new Promise(resolve => {
    if (img.complete) return resolve();
    img.onload = resolve;
    img.onerror = resolve;
    setTimeout(resolve, 4000);
  })));

  // Ensures Google Fonts (Bebas Neue) load before html2canvas triggers
  await document.fonts.ready;
  await new Promise(r => setTimeout(r, 400));

  const el = document.getElementById('tyCapture');

  try {
    const canvas = await html2canvas(el, {
      scale: 1, useCORS: true, allowTaint: true,
      backgroundColor: '#161614', logging: false,
      width: el.offsetWidth, height: el.offsetHeight
    });

    STATE.currentCard = canvas;
    STATE.currentSlug = `thank_you_${format}`;

    const maxW = Math.min(window.innerWidth * 0.85, 700);
    const ratio = el.offsetHeight / el.offsetWidth;

    const preview = document.getElementById('previewArea');
    preview.innerHTML = `
      <div class="preview-label">Your Graphic Preview</div>
      <img src="${canvas.toDataURL('image/png')}" style="width:${maxW}px; height:${maxW * ratio}px;">
      <div class="btn-row" style="margin-top:24px;">
        <button class="btn btn-gold" onclick="download()">⬇ Download PNG</button>
      </div>
    `;
  } catch(e) {
    alert('Error generating image: ' + e.message);
  }
}

function download() {
  if (!STATE.currentCard) return;
  const link = document.createElement('a');
  link.download = `${STATE.currentSlug}.png`;
  link.href = STATE.currentCard.toDataURL('image/png');
  link.click();
}
</script>
</body>
</html>
