<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Santa Sleigh Tracker</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1D1D1A">
  <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/BeverleyRoundTable/BRT/main/icons/RTBI_Santa.png">
  
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>

  <style>
    /* ── ROUND TABLE BRAND VARIABLES ── */
    :root {
      --rt-grey: #1D1D1A;
      --rt-gold: #FBAF33;
      --surface: #262622;
      --surface-2: #2f2f2a;
      --border: rgba(255,255,255,0.08);
      --text: #f0f0f0;
      --text-dim: rgba(255,255,255,0.8);
      
      --ui-bottom-safe: 72px;
      --donate-bottom: calc(var(--ui-bottom-safe) + 120px);
      --info-bottom: var(--ui-bottom-safe);
    }
    @supports(padding:env(safe-area-inset-bottom)){ 
      :root{
        --ui-bottom-safe: calc(88px + env(safe-area-inset-bottom));
        --donate-bottom: calc(var(--ui-bottom-safe) + 120px);
        --info-bottom: var(--ui-bottom-safe);
      } 
    }

    /* ── BASE STYLES ── */
    html, body { 
      margin: 0; padding: 0; height: 100%; 
      background: var(--rt-grey); 
      color: var(--text); 
      font-family: 'Open Sans', sans-serif; 
      overflow: hidden; 
      -webkit-text-size-adjust: 100%; text-size-adjust: 100%;
    }
    #map { position: absolute; inset: 0; z-index: 100; }
    body.dim-ui #map { filter: brightness(0.85); transition: filter 600ms ease; }

    /* ── SNOW EFFECTS ── */
    #snow { position:fixed; inset:0; pointer-events:none; z-index:1500; opacity:0; transition:opacity 800ms ease; }
    body.snowing #snow { opacity:1; filter:drop-shadow(0 0 4px white); }
    body::after { content:''; position:fixed; inset:0; background:radial-gradient(circle,transparent 40%,rgba(0,0,0,0.6) 100%); pointer-events:none; opacity:0; transition:opacity 1.5s ease; z-index:1400; }
    body.snowing::after { opacity:1; }

    /* ── DYNAMIC STATUS BOX ── */
    .status-popup { 
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%); 
      background: rgba(29, 29, 26, 0.95); border: 1px solid var(--border);
      color: var(--text); padding: 14px 20px; font-size: 1.05em; font-weight: 800; 
      border-radius: 16px; max-width: 90%; box-shadow: 0 4px 24px rgba(0,0,0,0.6); 
      z-index: 4000; text-align: center; transition: all 0.4s ease; line-height: 1.4;
    }
    .status-popup.is-announcement {
      background: rgba(29, 29, 26, 0.95) !important; color: var(--rt-gold) !important; 
      border: 1px solid var(--rt-gold) !important; font-weight: 900 !important;
      text-transform: uppercase; letter-spacing: 0.05em; animation: alertPulse 1.5s infinite; 
    }
    @keyframes alertPulse {
      0% { box-shadow: 0 0 0 0 rgba(251, 175, 51, 0.5); transform: translateX(-50%) scale(1); }
      50% { box-shadow: 0 0 0 15px rgba(251, 175, 51, 0); transform: translateX(-50%) scale(1.02); }
      100% { box-shadow: 0 0 0 0 rgba(251, 175, 51, 0); transform: translateX(-50%) scale(1); }
    }

    /* ── BOTTOM CONTROLS ── */
    .info-popup { 
      position: fixed; bottom: var(--info-bottom); left: 50%; transform: translateX(-50%); 
      background: rgba(29, 29, 26, 0.95); border: 1px solid var(--border);
      padding: 10px 14px; border-radius: 14px; display: flex; align-items: center; gap: 12px; 
      font-size: .85em; font-weight: 800; z-index: 2000; max-width: calc(100vw - 32px); 
      box-sizing: border-box; box-shadow: 0 4px 24px rgba(0,0,0,0.5); transition: opacity 600ms ease;
    }
    .btn { 
      background: var(--surface-2); color: var(--text-dim); border: 1px solid var(--border); 
      border-radius: 10px; padding: 7px 12px; cursor: pointer; font-weight: 800; 
      font-family: inherit; transition: all 0.2s ease; 
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }
    @media (hover: hover) {
      .btn:hover { background: var(--surface); color: var(--text); }
    }
    .btn:active { transform: scale(0.96); border-color: var(--rt-gold); color: var(--rt-gold); }
    .btn.locked { opacity: 0.4; pointer-events: none; filter: grayscale(1); }

    /* ── DONATE BUTTON & INSTALL OVERLAY ── */
    .donate-box { 
      position: fixed; bottom: var(--donate-bottom); left: 50%; transform: translateX(-50%); 
      width: 70%; max-width: 420px; z-index: 2000; transition: opacity 600ms ease; 
    }
    .donate-btn { 
      background: var(--rt-gold); color: #000000; border: 2px solid var(--rt-gold); 
      padding: 14px 0; display: block; text-align: center; border-radius: 16px; 
      font-weight: 900; text-decoration: none; box-shadow: 0 4px 16px rgba(0,0,0,.4); 
      transition: background 0.5s ease; position: relative; z-index: 1; 
    }

    /* PWA overlay covers the donate box, then fades out */
    .install-overlay {
      position: fixed; bottom: var(--donate-bottom); left: 50%; transform: translateX(-50%); 
      width: 70%; max-width: 420px; z-index: 2005; /* Sits right on top */
      opacity: 0; pointer-events: none; transition: opacity 0.8s ease;
    }
    .install-overlay.visible { opacity: 1; pointer-events: auto; }

    /* ── WAVE ANIMATION ── */
    .wave-emoji {
      position: fixed; font-size: 3.5em; pointer-events: none; z-index: 9999;
      animation: floatWave 1.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    }
    @keyframes floatWave {
      0% { opacity: 1; transform: translateY(0) scale(0.8) rotate(0deg); }
      30% { transform: translateY(-40px) scale(1.2) rotate(20deg); }
      60% { transform: translateY(-70px) scale(1.2) rotate(-15deg); }
      100% { opacity: 0; transform: translateY(-120px) scale(1) rotate(10deg); }
    }

    /* ── UI UTILITIES ── */
    body.dim-ui .donate-box, body.dim-ui .info-popup, body.dim-ui .status-popup { opacity: 0.45; filter: saturate(0.85); }
    body.dim-ui .donate-box:hover, body.dim-ui .info-popup:hover, body.dim-ui .status-popup:hover { opacity: 0.75; }
    .status-dot { width: 12px; aspect-ratio: 1/1; border-radius: 50%; flex-shrink: 0; display: none; }
    .dot-moving { background: #2cff4e; animation: pulse 1.4s infinite; }
    .dot-stopped { background: var(--rt-gold); }
    @keyframes pulse { 
      0% { box-shadow: 0 0 0 0 rgba(44,255,78,.6); } 
      70% { box-shadow: 0 0 0 10px rgba(44,255,78,0); } 
      100% { box-shadow: 0 0 0 0 rgba(44,255,78,0); } 
    }
    .logo-overlay { position: relative; width: 48px; max-width: 18vw; pointer-events: none; opacity: .9; filter: drop-shadow(0 2px 6px rgba(0,0,0,.5)); }
    
    #loadingCover { position: fixed; inset: 0; background: var(--rt-grey); display: flex; align-items: center; justify-content: center; z-index: 6000; }
    #loadingSpinner { width: 52px; height: 52px; border-radius: 50%; border: 4px solid var(--border); border-top-color: var(--rt-gold); animation: spin .9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── EMAIL MODAL ── */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 5000; align-items: center; justify-content: center; backdrop-filter: blur(4px); padding: 20px; }
    .modal-box { background: var(--surface); padding: 24px; border-radius: 20px; width: 100%; max-width: 340px; text-align: center; border: 1px solid var(--border); box-shadow: 0 10px 40px rgba(0,0,0,0.6); animation: slideUp 0.3s cubic-bezier(0.16,1,0.3,1); }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-title { font-size: 1.2em; font-weight: 800; margin: 0 0 8px 0; color: var(--rt-gold); }
    .modal-desc { font-size: 0.9em; color: var(--text-dim); margin-bottom: 20px; line-height: 1.4; }
    .modal-input { width: 100%; padding: 14px; margin-bottom: 20px; background: var(--surface-2); border: 2px solid var(--border); border-radius: 12px; color: var(--text); font-size: 16px; box-sizing: border-box; text-align: center; font-family: inherit; }
    .modal-input:focus { outline: none; border-color: var(--rt-gold); }
    .modal-btns { display: flex; gap: 12px; }
    .btn-full { flex: 1; padding: 12px; border-radius: 12px; font-weight: 800; font-size: 0.95em; cursor: pointer; border: none; transition: transform 0.1s; font-family: inherit; }
    .btn-full:active { transform: scale(0.96); }
    .btn-cancel { background: var(--surface-2); color: var(--text-dim); border: 1px solid var(--border); }
    .btn-confirm { background: var(--rt-gold); color: #000; box-shadow: 0 4px 12px rgba(251,175,51,0.3); }

    /* ── TOAST MESSAGES ── */
    .toast-box { display: none; position: fixed; left: 50%; bottom: calc(var(--donate-bottom) + 80px); transform: translateX(-50%); background: rgba(251, 175, 51, 0.95); color: #000; padding: 14px 20px; font-weight: 800; border-radius: 22px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); z-index: 6000; pointer-events: none; max-width: min(90vw,420px); text-align: center; line-height: 1.3; }
    .toast-visible { display: block; }

    /* ── KIOSK MODE ── */
    body.kiosk { --kiosk-bottom: 56px; cursor: none; }
    body.kiosk .kiosk-sponsor { bottom: var(--kiosk-bottom); }
    body.kiosk .kiosk-banner { bottom: calc(var(--kiosk-bottom) + 64px); }
    body.kiosk .toast-box, body.kiosk .status-popup:not(.is-announcement), body.kiosk #statusDot, body.kiosk .leaflet-control-zoom, body.kiosk .info-popup { display: none !important; }
    body.kiosk .leaflet-container { -webkit-tap-highlight-color: transparent; }
    body.kiosk .leaflet-container *, body.kiosk .leaflet-interactive:focus, body.kiosk .leaflet-interactive { outline: none !important; pointer-events: none; }
    .kiosk-banner { position: fixed; bottom: calc(var(--kiosk-bottom) + 64px); left: 50%; transform: translateX(-50%) translateY(-6px); background: rgba(29, 29, 26, 0.96); border: 1px solid var(--border); color: var(--text); padding: 16px 36px; border-radius: 999px; font-size: 1.25em; font-weight: 900; letter-spacing: 0.4px; box-shadow: 0 8px 28px rgba(0,0,0,0.55); z-index: 4500; pointer-events: none; opacity: 0; transition: opacity 0.6s ease, transform 0.6s ease; text-align: center; display: none; }
    body.kiosk .kiosk-banner { display: block; }
    .kiosk-banner.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
    .kiosk-banner.live { animation: kioskPulse 2.8s ease-in-out infinite; }
    .kiosk-subtitle { font-size: 0.75em; opacity: 0.85; margin-top: 4px; text-align: center; color: var(--rt-gold); }
    @keyframes kioskPulse { 0%,100%{box-shadow:0 8px 28px rgba(0,0,0,0.55)} 50%{box-shadow:0 8px 34px rgba(251, 175, 51, 0.4)} }
    
    .kiosk-sponsor { position: fixed; bottom: var(--kiosk-bottom); left: 50%; transform: translateX(-50%) translateY(6px); background: rgba(29, 29, 26, 0.95); border: 1px solid var(--border); padding: 10px 18px; border-radius: 14px; display: flex; align-items: center; gap: 12px; z-index: 4400; box-shadow: 0 6px 22px rgba(0,0,0,0.55); opacity: 0; pointer-events: none; transition: opacity 0.6s ease, transform 0.6s ease; }
    .kiosk-sponsor.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
    .kiosk-sponsor span { font-size: 0.75em; font-weight: 700; color: var(--text-dim); white-space: nowrap; }
    .kiosk-sponsor img { max-height: 34px; max-width: 160px; object-fit: contain; }
    
    @media(max-height:700px){ 
      :root{ --ui-bottom-safe: calc(64px + env(safe-area-inset-bottom)); }
      .donate-box{ width: 85%; max-width: 360px; }
      .info-popup{ font-size: .8em; padding: 8px 12px; }
      .status-popup{ font-size: .95em; padding: 12px 16px; } 
    }
    @media(max-width:480px){ 
      .toast-box{ font-size: 0.9em; padding: 12px 16px; bottom: calc(var(--donate-bottom) + 64px); } 
    }

    /* FIX 2: ── iOS INSTALL TOOLTIP ── */
    .ios-install-prompt {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(29, 29, 26, 0.95);
      border: 1px solid var(--rt-gold);
      color: #fff;
      padding: 16px;
      border-radius: 16px;
      font-size: 0.9em;
      font-weight: 700;
      text-align: center;
      z-index: 9999;
      width: 85%;
      max-width: 340px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      opacity: 0;
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      pointer-events: none;
    }
    .ios-install-prompt.visible {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
      pointer-events: auto;
    }
    .ios-install-prompt .close-btn {
      position: absolute;
      top: 4px;
      right: 10px;
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 1.5em;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div id="loadingCover"><div id="loadingSpinner"></div></div>
  <div class="status-popup" id="statusBox">🔍 Searching for Santa…</div>
  
  <div class="donate-box" id="donateBox"><a id="donateLink" class="donate-btn" target="_blank">🎁 DONATE & SUPPORT US</a></div>
  
  <div class="install-overlay" id="installOverlayBox">
    <button id="installAppBtn" class="donate-btn" style="width: 100%; border: 2px solid #fff; cursor: pointer; font-family: inherit; font-size: 1.05em;">📲 Add App to Home Screen</button>
  </div>

  <div id="iosPrompt" class="ios-install-prompt">
    <button class="close-btn" id="iosCloseBtn">&times;</button>
    To install this tracker, tap the <strong>Share</strong> icon below <br>
    (the square with an arrow) and select <br>
    <span style="color: var(--rt-gold);">"Add to Home Screen"</span>
  </div>

  <div class="info-popup">
    <div id="statusDot" class="status-dot"></div>
    <button class="btn" id="followBtn">Follow: ON</button>
    <button class="btn" id="recenterBtn">Re-centre</button>
    <button class="btn" id="notifyBtn">🔔 Notify Me</button>
    <button class="btn" id="waveBtn">👋 Wave</button>
    <div id="toast" class="toast-box"></div>
  </div>

  <div id="emailModal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-title">🔔 Get Notified</div>
      <div class="modal-desc">Want to know when Santa is nearby? Enter your email below (optional).</div>
      <input type="email" id="subEmail" class="modal-input" placeholder="santa@example.com">
      <div class="modal-btns">
        <button class="btn-full btn-cancel" id="modalCancelBtn">Cancel</button>
        <button class="btn-full btn-confirm" id="modalConfirmBtn">Notify Me</button>
      </div>
    </div>
  </div>
  <div id="kioskBanner" class="kiosk-banner"></div>
  <div id="kioskSponsor" class="kiosk-sponsor"></div>
  <div id="map"></div>
  <canvas id="snow"></canvas>

  <script>
    document.addEventListener("DOMContentLoaded", () => {

      // FIX 4: Detect iOS and show the new installation prompt
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
      const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;

      if (isIOS && !isStandalone) {
        const iosPrompt = document.getElementById('iosPrompt');
        setTimeout(() => {
          if(iosPrompt) iosPrompt.classList.add('visible');
        }, 3000);

        document.getElementById('iosCloseBtn').addEventListener('click', () => {
          iosPrompt.classList.remove('visible');
        });
      }

      // Register Service Worker for PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').catch(() => {});
        });
      }

      // ⭐ Crossfade Install Prompt Logic
      let deferredPrompt;
      let installTimeout;
      window.addEventListener('beforeinstallprompt', (e) => {
        // Prevent default infobar
        e.preventDefault();
        deferredPrompt = e;
        
        // Show the install overlay (which covers the donate button perfectly)
        const overlay = document.getElementById('installOverlayBox');
        overlay.classList.add('visible');
        
        // Auto-fadeout after 10 seconds to reveal the Donate link beneath it
        installTimeout = setTimeout(() => {
          overlay.classList.remove('visible');
        }, 10000);
      });

      document.getElementById('installAppBtn').addEventListener('click', async () => {
        const overlay = document.getElementById('installOverlayBox');
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          // Hide our custom UI immediately after they make a choice
          overlay.classList.remove('visible');
          deferredPrompt = null;
          clearTimeout(installTimeout);
        }
      });

      const AppConfig = {
        API: {
          REFRESH_MS: 6000,
          STALE_MS: 5 * 60 * 1000,
          MOTION_WINDOW_MS: 60 * 1000,
          MOVE_THRESHOLD_METERS: 8,
          MIN_FIXES_FOR_ETA: 3,
          MIN_ETA_WINDOW_MS: 15 * 1000,
        },
        NOTIFICATIONS: {
          NEAR_DISTANCE_METERS: 250,
          PASSED_DISTANCE_OFFSET: 150
        },
        GPX: { 
          AHEAD: 80, 
          BACK: 5, 
          EARLY_EXIT_METERS: 25 
        },
        SNOW: {
          ETA_MINUTES_MAX: 15,
          LEVELS: { LIGHT: 1, HEAVY: 2, BLIZZARD: 3 },
          MOBILE_BASE_COUNT: 30,
          DESKTOP_BASE_COUNT: 60,
          MULTIPLIERS: [0, 1, 2.5, 5]
        },
        BATTERY: {
          LOW: 0.4,
          CRITICAL: 0.2,
          FRAME_SKIP: { LOW: 2, CRITICAL: 3 }
        },
        LOCATIONS: {
          LAPLAND: [66.5436, 25.8473]
        },
        ICONS: {
          PREVIEW: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-grey.png",
          CONFIRMED: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png",
          FALLBACK_LIVE: "https://i.ibb.co/Qj3vDbSR/Santa-Marker-11.png",
          FALLBACK_START: "https://i.ibb.co/PzDYmwzZ/Santa-Marker-4.png",
          FALLBACK_END: "https://i.ibb.co/39WF0kBd/Santa-Marker-5.png",
          BROWSER_ICON: "https://i.ibb.co/6cZwpb07/Santa-Marker.png"
        }
      };

      const AppState = {
        map: null,
        marker: null,
        notifyMarker: null,
        gpxRoute: null,
        lastFix: null,
        recentFixes: [],
        routeFixes: [],
        flags: {
          follow: true,
          firstFix: true,
          isKiosk: false,
          gpxLoaded: false,
          snowActive: false,
          pageVisible: !document.hidden,
          awaitingPin: false,
          browserNotified: sessionStorage.getItem("SANTA_BROWSER_NOTIFIED") === "1",
          hasPassedSticky: sessionStorage.getItem("SANTA_HAS_PASSED") === "1"
        },
        vars: {
          apiUrl: null,
          sleighName: "Santa Sleigh",
          staleSince: null,
          lastSnapIndex: 0,
          snowflakes: [],
          animRaf: null,
          pendingSubscription: null,
          notifyLatLng: null,
          lastVisualPos: null,
          escapeListener: null
        },
        dom: {
          loading: document.getElementById("loadingCover"),
          statusBox: document.getElementById("statusBox"),
          followBtn: document.getElementById("followBtn"),
          recenterBtn: document.getElementById("recenterBtn"),
          notifyBtn: document.getElementById("notifyBtn"),
          waveBtn: document.getElementById("waveBtn"), 
          statusDot: document.getElementById("statusDot"),
          donateLink: document.getElementById("donat
