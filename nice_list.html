<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TurboSanta — Santa’s Nice List</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500;700&family=Mountains+of+Christmas:wght@400;700&display=swap" rel="stylesheet">

  <style>
    /* ═══════════════════════════════════════ */
    /* TURBOSANTA DESIGN SYSTEM */
    /* ═══════════════════════════════════════ */
    :root {
      --gold: #FBAF33;
      --gold-dim: rgba(251,175,51,0.12);
      --gold-glow: rgba(251,175,51,0.25);
      --dark: #0d0d0b;
      --surface: #161614;
      --surface-2: #1e1e1b;
      --surface-3: #252522;
      --border: rgba(255,255,255,0.08);
      --text: #eaeae5;
      --text-dim: rgba(255,255,255,0.55);
      --text-muted: rgba(255,255,255,0.3);
    }
  
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    /* 🔧 IMPORTANT: prevent iframe forcing viewport height */
    html, body {
      height: auto;
      min-height: 0;
    }

    body {
      margin: 0;
      padding: 16px 12px;
      background: transparent; /* Keep transparent for iframe embedding */
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .santa-checker {
      max-width: 720px;
      margin: 0 auto;
      padding: 32px 24px 40px;
      text-align: center;
      background: var(--surface);
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: 0 16px 40px rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
    }

    h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 42px;
      letter-spacing: 2px;
      color: #fff;
      margin: 0 0 24px 0;
      line-height: 1;
    }
    
    h2 span {
      color: var(--gold);
    }

    input {
      width: 100%;
      max-width: 420px;
      padding: 16px 20px;
      border-radius: 8px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: #fff;
      font-family: 'DM Mono', monospace;
      font-size: 16px;
      display: block;
      margin: 0 auto;
      transition: all 0.2s ease;
      text-align: center;
    }

    input::placeholder { 
      color: var(--text-muted); 
      font-family: 'DM Sans', sans-serif;
    }
    
    input:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px var(--gold-glow);
    }

    button {
      margin-top: 20px;
      padding: 16px 32px;
      border-radius: 8px;
      border: none;
      background: var(--gold);
      color: #000;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      cursor: pointer;
      display: block;
      margin-left: auto;
      margin-right: auto;
      transition: transform 0.1s, background 0.2s;
    }

    button:hover {
      background: #e59d28;
    }

    button:active {
      transform: scale(0.97);
    }

    #status {
      margin: 24px 0 16px;
      min-height: 1.5em;
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    a#download {
      display: none;
      margin: 16px auto 0;
      padding: 14px 28px;
      border-radius: 8px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      transition: all 0.2s ease;
      width: fit-content;
    }
    
    a#download:hover {
      background: var(--surface-3);
    }
    
    a#download:active {
      transform: scale(0.97);
    }
    
    @media (max-width: 600px) {
      .santa-checker { padding: 32px 20px; }
      h2 { font-size: 36px; }
    }
  </style>

</head>

<body>

<div class="santa-checker" id="niceRoot">

  <h2>🎅 NAUGHTY OR <span>NICE?</span></h2>

  <input id="childName" placeholder="Enter a name..." autocomplete="off" />
  
  <button onclick="startCheck()">Check Santa’s List</button>

  <p id="status"></p>

  <canvas id="canvas" width="1600" height="1131" style="display:none;"></canvas>

  <a id="download" download="Santa_Nice_List_Certificate.pdf">
    ⬇ Download PDF Certificate
  </a>
</div>

<script>
  
/* ---------- ASSETS ---------- */
const bgImage = new Image();
bgImage.crossOrigin = "anonymous";
bgImage.src = "https://raw.githubusercontent.com/BeverleyRoundTable/BRT/main/nice_list.png";

/* ---------- MAIN FLOW ---------- */
function startCheck(){
  const name = document.getElementById("childName").value.trim();
  if(!name) return alert("Please enter a name");

  const status = document.getElementById("status");
  const download = document.getElementById("download");

  download.style.display = "none";
  status.innerText = "Checking Santa’s list… 🤔";
  sendHeight(20);

  const phases = ["Naughty…", "Nice…", "Naughty…", "Nice…"];
  let i = 0;

  const interval = setInterval(() => {
    status.innerText = phases[i % phases.length];
    sendHeight(20);
    i++;
  }, 400);

  setTimeout(() => {
    clearInterval(interval);
    status.innerText = "✅ NICE LIST CONFIRMED!";
    generatePDF(name);
  }, 2200);
}

/* ---------- CERTIFICATE RENDER ---------- */
function generatePDF(name){
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  const link = document.getElementById("download");

  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);

  // We use Mountains of Christmas if it's loaded, otherwise fallback to DM Sans
  ctx.fillStyle = "#000";
  ctx.font = "bold 80px 'Mountains of Christmas', 'DM Sans', sans-serif";
  ctx.textAlign = "center";
  ctx.fillText(name, canvas.width / 2, 620);

  // Canvas → PDF
  const imgData = canvas.toDataURL("image/png");

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({
    orientation: "landscape",
    unit: "pt",
    format: "a4"
  });

  const pageWidth = pdf.internal.pageSize.getWidth();
  const pageHeight = pdf.internal.pageSize.getHeight();

  pdf.addImage(imgData, "PNG", 0, 0, pageWidth, pageHeight);

  const blob = pdf.output("blob");
  if (link.href) URL.revokeObjectURL(link.href);
  link.href = URL.createObjectURL(blob);
  link.style.display = "inline-block";

  sendHeight(20);
}

/* ---------- AUTO-HEIGHT (parity with address lookup) ---------- */
function sendHeight(extra = 0){
  const root = document.getElementById("niceRoot");
  if (!root) return;

  const h = root.offsetHeight + extra;
  parent.postMessage({ niceListHeight: h }, "*");
}

// Fire multiple times to catch font + layout settling
window.addEventListener("load", () => {
  sendHeight(20);
  setTimeout(() => sendHeight(20), 100);
  setTimeout(() => sendHeight(20), 300);
  setTimeout(() => sendHeight(20), 600);
});

window.addEventListener("resize", () => sendHeight(20));

const observer = new MutationObserver(() => sendHeight(20));
observer.observe(document.body, { childList:true, subtree:true });
</script>

</body>
</html>
