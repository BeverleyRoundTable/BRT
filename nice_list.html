<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Santa’s Nice List</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
  
  *,
*::before,
*::after {
  box-sizing: border-box;
}

  /* 🔧 IMPORTANT: prevent iframe forcing viewport height */
  html, body {
    height: auto;
    min-height: 0;
  }

  body {
    margin: 0;
    padding: 16px 12px;
    background: transparent;
    color: #FFFFFF;
    font-family: 'Open Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .santa-checker {
    max-width: 720px;
    margin: 0 auto;
    padding: 24px 20px 28px;
    text-align: center;
    background: rgba(29, 29, 26, 0.95); /* Brand Table Grey */
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-radius: 22px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow:
      0 6px 20px rgba(0,0,0,0.35),
      inset 0 1px 0 rgba(255,255,255,0.05);
  }

  h2 {
    margin: 0 0 16px 0;
    font-weight: 800;
    letter-spacing: -0.02em;
  }

  input {
    width: 100%;
    max-width: 420px;
    padding: 14px 18px;
    border-radius: 999px; /* Pill shape to match buttons */
    background: #2f2f2a; /* God Mode Surface-2 */
    border: 1px solid rgba(255, 255, 255, 0.08);
    color: #FFFFFF;
    font-size: 1rem;
    font-family: inherit;
    display: block;
    margin: 0 auto;
    transition: all 0.2s ease;
  }

  input::placeholder { color: rgba(255, 255, 255, 0.5); }
  
  input:focus {
    outline: none;
    border-color: #FBAF33; /* Brand Golden Yellow */
    box-shadow: 0 0 0 3px rgba(251, 175, 51, 0.2);
  }

  button {
    margin-top: 16px;
    padding: 14px 28px;
    border-radius: 999px;
    border: none;
    background: #FBAF33; /* Brand Golden Yellow */
    color: #000000;
    font-weight: 800;
    font-family: inherit;
    font-size: 1rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    cursor: pointer;
    display: block;
    margin-left: auto;
    margin-right: auto;
    transition: all 0.2s ease;
  }

  button:active {
    transform: scale(0.96);
  }

  #status {
    margin: 18px 0 10px;
    min-height: 1.4em;
    font-weight: 600;
    color: #FBAF33;
  }

  a#download {
    display: none;
    margin: 10px auto 0;
    padding: 12px 24px;
    border-radius: 999px;
    background: #2f2f2a;
    border: 1px solid rgba(255, 255, 255, 0.08);
    color: #FFFFFF;
    text-decoration: none;
    font-weight: 700;
    font-size: 0.9em;
    transition: all 0.2s ease;
    width: fit-content;
  }
  
  a#download:active {
    transform: scale(0.96);
  }
</style>

</head>

<body>

<div class="santa-checker" id="niceRoot">

  <h2>🎅 Naughty or Nice?</h2>

  <input id="childName" placeholder="Enter name" />
  <br>
  <button onclick="startCheck()">Check Santa’s List</button>

  <p id="status"></p>

  <canvas id="canvas" width="1600" height="1131" style="display:none;"></canvas>

  <a id="download" download="Santa_Nice_List_Certificate.pdf">
    🎄 Download Certificate (PDF)
  </a>
</div>

<script>
  
/* ---------- ASSETS ---------- */
const bgImage = new Image();
bgImage.crossOrigin = "anonymous";
bgImage.src = "https://raw.githubusercontent.com/BeverleyRoundTable/BRT/main/nice_list.png";

/* ---------- MAIN FLOW ---------- */
function startCheck(){
  const name = document.getElementById("childName").value.trim();
  if(!name) return alert("Please enter a name");

  const status = document.getElementById("status");
  const download = document.getElementById("download");

  download.style.display = "none";
  status.innerText = "Checking Santa’s list… 🤔";
  sendHeight(20);

  const phases = ["Naughty…", "Nice…", "Naughty…", "Nice…"];
  let i = 0;

  const interval = setInterval(() => {
  status.innerText = phases[i % phases.length];
  sendHeight(20);
  i++;
}, 400);

  setTimeout(() => {
    clearInterval(interval);
    status.innerText = "✅ Nice list confirmed! 🎄";
    generatePDF(name);
  }, 2200);
}

/* ---------- CERTIFICATE RENDER ---------- */
function generatePDF(name){
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  const link = document.getElementById("download");

  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);

  // Script name only
  ctx.fillStyle = "#000";
  ctx.font = "bold 64px 'Open Sans', sans-serif";
  ctx.textAlign = "center";
  ctx.fillText(name, canvas.width / 2, 620);

  // Canvas → PDF
  const imgData = canvas.toDataURL("image/png");

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({
    orientation: "landscape",
    unit: "pt",
    format: "a4"
  });

  const pageWidth = pdf.internal.pageSize.getWidth();
  const pageHeight = pdf.internal.pageSize.getHeight();

  pdf.addImage(imgData, "PNG", 0, 0, pageWidth, pageHeight);

  const blob = pdf.output("blob");
  if (link.href) URL.revokeObjectURL(link.href);
  link.href = URL.createObjectURL(blob);
  link.style.display = "inline-block";

  sendHeight(20);
}

/* ---------- AUTO-HEIGHT (parity with address lookup) ---------- */
function sendHeight(extra = 0){
  const root = document.getElementById("niceRoot");
  if (!root) return;

  const h = root.offsetHeight + extra;
  parent.postMessage({ niceListHeight: h }, "*");
}

// Fire multiple times to catch font + layout settling
window.addEventListener("load", () => {
  sendHeight(20);
  setTimeout(() => sendHeight(20), 100);
  setTimeout(() => sendHeight(20), 300);
  setTimeout(() => sendHeight(20), 600);
});

window.addEventListener("resize", () => sendHeight(20));

const observer = new MutationObserver(() => sendHeight(20));
observer.observe(document.body, { childList:true, subtree:true });
</script>

</body>
</html>
