<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Letter to Santa — TurboSanta</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  
  <style>
    /* ═══════════════════════════════════════ */
    /* TURBOSANTA DESIGN SYSTEM */
    /* ═══════════════════════════════════════ */
    :root {
      --gold: #FBAF33;
      --gold-dim: rgba(251,175,51,0.12);
      --gold-glow: rgba(251,175,51,0.25);
      --dark: #0d0d0b;
      --surface: #161614;
      --surface-2: #1e1e1b;
      --surface-3: #252522;
      --border: rgba(255,255,255,0.08);
      --text: #eaeae5;
      --text-dim: rgba(255,255,255,0.55);
      --text-muted: rgba(255,255,255,0.3);
      --red: #D31C1C;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: transparent; /* Keep transparent for easy iframe embedding */
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      width: 100%;
      max-width: 540px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 32px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.4);
      position: relative;
      overflow: hidden;
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 48px;
      letter-spacing: 2px;
      color: #fff;
      margin-bottom: 8px;
      line-height: 1;
    }
    
    .header h1 span {
      color: var(--gold);
    }

    .header p {
      font-size: 15px;
      color: var(--text-dim);
      line-height: 1.5;
      font-weight: 500;
    }

    /* ── FORM FIELDS ── */
    .field {
      margin-bottom: 20px;
    }

    .field label {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .field input, 
    .field textarea {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: #fff;
      padding: 14px 16px;
      border-radius: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      outline: none;
      transition: all 0.2s;
    }

    .field input::placeholder, 
    .field textarea::placeholder {
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
    }

    .field input:focus, 
    .field textarea:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px var(--gold-glow);
    }

    .field textarea {
      resize: vertical;
      min-height: 120px;
      line-height: 1.5;
    }

    /* ── BUTTONS ── */
    .btn-submit {
      width: 100%;
      background: var(--gold);
      color: #000;
      border: none;
      padding: 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 800;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 12px;
      transition: transform 0.1s, background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-submit:hover:not(:disabled) {
      background: #e59d28;
    }

    .btn-submit:active {
      transform: scale(0.97);
    }

    .btn-submit:disabled {
      background: var(--surface-3);
      color: var(--text-muted);
      cursor: not-allowed;
    }

    /* ── SUCCESS STATE ── */
    .success-panel {
      display: none;
      text-align: center;
      padding: 24px 0 16px;
    }

    .success-icon {
      font-size: 64px;
      margin-bottom: 20px;
      animation: bounce 2s infinite;
      line-height: 1;
    }

    .success-panel h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 42px;
      letter-spacing: 2px;
      color: var(--gold);
      margin-bottom: 16px;
      line-height: 1;
    }

    .success-panel p {
      color: var(--text-dim);
      font-size: 15px;
      line-height: 1.6;
    }

    .success-panel p strong {
      color: #fff;
    }

    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-20px); }
      60% { transform: translateY(-10px); }
    }
    
    @media (max-width: 600px) {
      .panel { padding: 32px 24px; }
      .header h1 { font-size: 40px; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="panel" id="letterPanel">
    <div class="header">
      <h1>✉️ WRITE TO <span>SANTA</span></h1>
      <p>Send your Christmas wishlist straight to Lapland! Santa will reply to your parents' email.</p>
    </div>

    <form id="santaForm" onsubmit="submitLetter(event)">
      <div class="field">
        <label>Child's First Name</label>
        <input type="text" id="childName" placeholder="e.g. Leo" required>
      </div>

      <div class="field">
        <label>Parent's Email</label>
        <input type="email" id="parentEmail" placeholder="To receive Santa's reply..." required>
      </div>

      <div class="field">
        <label>Your Wishlist</label>
        <textarea id="wishlist" placeholder="Dear Santa, this year I would love..." required></textarea>
      </div>

      <button type="submit" id="submitBtn" class="btn-submit">
        Send to Lapland 🚀
      </button>
    </form>
  </div>

  <div class="panel success-panel" id="successPanel">
    <div class="success-icon">🛷✨</div>
    <h2>WHOOSH! IT'S GONE!</h2>
    <p>Your letter is flying through the snowy skies to Lapland right now.</p>
    <br>
    <p><strong>Parents:</strong> Check your inbox shortly for a magical reply from Santa Claus himself!</p>
  </div>
</div>

<script>
  // Automatically grab the API URL from the browser's address bar
  const API = new URLSearchParams(location.search).get('api') || '';

  async function submitLetter(event) {
    event.preventDefault(); // Stop page from refreshing

    if (!API) {
      alert("Missing ?api= URL parameter! The letter doesn't know where to fly.");
      return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = "Flying to Lapland... 🦌💨";

    const payload = {
      action: "sendLetterToSanta",
      childName: document.getElementById('childName').value.trim(),
      parentEmail: document.getElementById('parentEmail').value.trim(),
      wishlist: document.getElementById('wishlist').value.trim()
    };

    try {
      const response = await fetch(API, {
        method: "POST",
        body: JSON.stringify(payload)
      });

      const result = await response.json();

      if (result.ok) {
        // Hide the form, show the success message!
        document.getElementById('letterPanel').style.display = 'none';
        document.getElementById('successPanel').style.display = 'block';
      } else {
        alert("Oh no! The elves dropped the letter: " + result.error);
        btn.disabled = false;
        btn.innerHTML = "Try Again 🚀";
      }
    } catch (error) {
      alert("Connection error to Lapland! Please check your internet.");
      btn.disabled = false;
      btn.innerHTML = "Try Again 🚀";
    }
  }

  // Send height to parent window so the iframe can resize
  function sendHeight() {
    const height = document.body.scrollHeight;
    window.parent.postMessage({ letterHeight: height }, "*");
  }

  // Send height on load and whenever the success message shows
  window.addEventListener("load", sendHeight);
  
  // Create an observer to watch for the success panel showing up
  const observer = new MutationObserver(sendHeight);
  observer.observe(document.body, { attributes: true, childList: true, subtree: true });
</script>

</body>
</html>
