<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>TurboSanta — GPX Animation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.css" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  /* ═══════════════════════════════════════ */
  /* TURBOSANTA DESIGN SYSTEM */
  /* ═══════════════════════════════════════ */
  :root {
    --gold: #FBAF33;
    --dark: #0d0d0b;
    --red: #D31C1C;
  }

  html, body { 
    margin: 0; height: 100%; overflow: hidden; 
    background: var(--dark); 
    font-family: 'DM Sans', sans-serif;
  }
  
  #map { position: absolute; inset: 0; }
  #overlay { position: absolute; inset: 0; pointer-events: none; }
  
  #debug {
    display: none; position: absolute; top: 10px; left: 10px; z-index: 999;
    background: rgba(13, 13, 11, 0.85); color: var(--gold); 
    font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 700;
    padding: 8px 12px; border-radius: 6px; pointer-events: none;
    border: 1px solid rgba(251, 175, 51, 0.3);
  }
</style>
</head>

<body>
<div id="map"></div>
<canvas id="overlay"></canvas>
<div id="debug"></div>

<script>
  /* ── Render-mode handshake (Puppeteer sets these externally) ── */
  window.__GPX_READY__ = false;
  window.__GPX_DONE__  = false;
  window.__RENDER_FRAME__ = 0;
</script>

<script src="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.js"></script>
<script>
/* ═══════════════════════════════════════════════════════════════
   TURBOSANTA GPX ANIMATION  —  v2.0 REBUILD
   ═══════════════════════════════════════════════════════════════
   URL params:
     ?api=<master-json-url>     (required)
     &route=<route-name>        (required)
     &render                    (enables frame-by-frame render mode)
     &debug                     (shows bearing/direction overlay)
     &nosnow                    (disables snow particles)
   ═══════════════════════════════════════════════════════════════ */

const PARAMS    = new URLSearchParams(location.search);
const IS_RENDER = PARAMS.has("render");
const IS_DEBUG  = PARAMS.has("debug");
const NO_SNOW   = PARAMS.has("nosnow");
const API_URL   = PARAMS.get("api");
const ROUTE_KEY = PARAMS.get("route");

if (!API_URL)   throw new Error("Missing ?api= parameter");
if (!ROUTE_KEY) throw new Error("Missing ?route= parameter");

if (IS_DEBUG) document.getElementById("debug").style.display = "block";

/* ── Canvas setup ── */
const cvs = document.getElementById("overlay");
const ctx = cvs.getContext("2d");
let VIEW_W = 0, VIEW_H = 0;

/* ── Map tile style ── */
const MAP_STYLE = {
  version: 8,
  sources: {
    raster: {
      type: "raster",
      tiles: ["https://basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}@2x.png"],
      tileSize: 256
    }
  },
  layers: [{ id: "base", type: "raster", source: "raster" }]
};


/* ═══════════════════════════════════════════════════════════════
   1. MATH UTILITIES
   ═══════════════════════════════════════════════════════════════ */

const DEG = Math.PI / 180;

/** Haversine distance in metres */
function haversine(a, b) {
  const dLat = (b.lat - a.lat) * DEG;
  const dLng = (b.lng - a.lng) * DEG;
  const s = Math.sin(dLat / 2) ** 2 +
    Math.cos(a.lat * DEG) * Math.cos(b.lat * DEG) * Math.sin(dLng / 2) ** 2;
  return 2 * 6371000 * Math.asin(Math.sqrt(s));
}

/** Bearing from a→b in degrees [0, 360) */
function calcBearing(a, b) {
  const dLng = (b.lng - a.lng) * DEG;
  const y = Math.sin(dLng) * Math.cos(b.lat * DEG);
  const x = Math.cos(a.lat * DEG) * Math.sin(b.lat * DEG) -
            Math.sin(a.lat * DEG) * Math.cos(b.lat * DEG) * Math.cos(dLng);
  return (Math.atan2(y, x) / DEG + 360) % 360;
}

/** Normalise bearing to [0, 360) */
const normB = b => ((b % 360) + 360) % 360;

/** Shortest angular distance between two bearings */
const angDist = (a, b) => Math.abs(((a - b + 540) % 360) - 180);

/** Interpolate between two angles along shortest arc */
function lerpAngle(a, b, t) {
  return a + (((b - a + 540) % 360) - 180) * t;
}

/** Ease in-out cubic */
const easeInOutCubic = t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;


/* ═══════════════════════════════════════════════════════════════
   2. DIRECTION SYSTEM  (8-direction → 5 rows + horizontal flip)
   ═══════════════════════════════════════════════════════════════

   Sprite sheet layout (5 rows × N frames):
     Row 0: North      (walking away from camera)
     Row 1: NW         (diagonal away-left)       — flip H → NE
     Row 2: West       (side view, facing left)   — flip H → East
     Row 3: SW         (diagonal toward-left)     — flip H → SE
     Row 4: South      (walking toward camera)

   Mirror directions (horizontal flip of the sprite):
     NE = flip of Row 1 (NW)
     E  = flip of Row 2 (W)
     SE = flip of Row 3 (SW)
   ═══════════════════════════════════════════════════════════════ */

const DIRS = [
  { name: "N",  center:   0, row: 0, flip: false }, // Native North (Up)
  { name: "NE", center:  45, row: 1, flip: false }, // Native North-East (Up-Right)
  { name: "E",  center:  90, row: 2, flip: false }, // Native East (Right)
  { name: "SE", center: 135, row: 3, flip: false }, // Native South-East (Down-Right)
  { name: "S",  center: 180, row: 4, flip: false }, // Native South (Down)
  { name: "SW", center: 225, row: 3, flip: true  }, // Flips Row 3 to face South-West (Down-Left)
  { name: "W",  center: 270, row: 2, flip: true  }, // Flips Row 2 to face West (Left)
  { name: "NW", center: 315, row: 1, flip: true  }, // Flips Row 1 to face North-West (Up-Left)
];

const DIR_HYSTERESIS = 15; // degrees beyond sector boundary before switching

/**
 * Get direction index [0-7] with hysteresis to prevent jitter.
 * Only switches away from currentIdx when bearing moves significantly.
 */
function getDirectionIdx(bearing, currentIdx) {
  bearing = normB(bearing);
  const distToCurrent = angDist(bearing, DIRS[currentIdx].center);

  // Sector half-width is 22.5°; stay if within sector + hysteresis margin
  if (distToCurrent < 22.5 + DIR_HYSTERESIS) return currentIdx;

  // Otherwise snap to closest direction
  let best = 0, bestDist = 360;
  for (let i = 0; i < 8; i++) {
    const d = angDist(bearing, DIRS[i].center);
    if (d < bestDist) { bestDist = d; best = i; }
  }
  return best;
}


/* ═══════════════════════════════════════════════════════════════
   3. SNOW PARTICLES
   ═══════════════════════════════════════════════════════════════ */

const SNOW_COUNT = 70;
let snowflakes = [];

function initSnow() {
  snowflakes = [];
  for (let i = 0; i < SNOW_COUNT; i++) {
    snowflakes.push({
      x: Math.random() * VIEW_W,
      y: Math.random() * VIEW_H,
      r: 1 + Math.random() * 2,
      speed: 12 + Math.random() * 20,
      wobble: Math.random() * Math.PI * 2,
      wobbleSpeed: 0.5 + Math.random() * 1.5,
      opacity: 0.25 + Math.random() * 0.4,
    });
  }
}

function updateAndDrawSnow(dt) {
  if (NO_SNOW || VIEW_W === 0) return;
  ctx.save();
  for (const s of snowflakes) {
    s.wobble += s.wobbleSpeed * dt;
    s.x += Math.sin(s.wobble) * 8 * dt;
    s.y += s.speed * dt;
    if (s.y > VIEW_H + 5) { s.y = -5; s.x = Math.random() * VIEW_W; }
    if (s.x < -5) s.x = VIEW_W + 5;
    if (s.x > VIEW_W + 5) s.x = -5;

    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${s.opacity})`;
    ctx.fill();
  }
  ctx.restore();
}


/* ═══════════════════════════════════════════════════════════════
   4. ASSET LOADING
   ═══════════════════════════════════════════════════════════════ */

const loadImg = src => new Promise(res => {
  if (!src) return res(null);
  const img = new Image();
  img.crossOrigin = "anonymous";
  img.onload  = () => res(img);
  img.onerror = () => { console.warn("Failed to load:", src); res(null); };
  img.src = src;
});

function parseGPX(xmlText) {
  const doc = new DOMParser().parseFromString(xmlText, "text/xml");
  return [...doc.getElementsByTagName("trkpt")].map(p => ({
    lat: +p.getAttribute("lat"),
    lng: +p.getAttribute("lon"),
  }));
}

/** Build cumulative distance array from point list */
function buildCumulative(pts) {
  const cum = [0];
  for (let i = 1; i < pts.length; i++) {
    cum[i] = cum[i - 1] + haversine(pts[i - 1], pts[i]);
  }
  return cum;
}


/* ═══════════════════════════════════════════════════════════════
   5. MAIN BOOT
   ═══════════════════════════════════════════════════════════════ */

let map = null;

(async () => {
  const master   = await fetch(API_URL, { cache: "no-store" }).then(r => r.json());
  const settings = master.settings || {};
  const routeObj = (master.routes || []).find(
    r => String(r.routeName || "").toLowerCase() === ROUTE_KEY.toLowerCase()
  );
  if (!routeObj) throw new Error(`Route "${ROUTE_KEY}" not found in API`);

  const [pts, sprite, logo, sponsor] = await Promise.all([
    fetch(routeObj.gpxUrl).then(r => r.text()).then(parseGPX),
    loadImg(settings.travelboast_sprite),
    loadImg(settings.logo_overlay_url),
    loadImg(routeObj.sponsorUrl),
  ]);

  if (pts.length < 2) throw new Error("GPX has fewer than 2 points");

  initAnimation(pts, sprite, logo, sponsor, settings);
})();


/* ═══════════════════════════════════════════════════════════════
   6. ANIMATION ENGINE
   ═══════════════════════════════════════════════════════════════ */

function initAnimation(pts, sprite, logo, sponsor, s) {

  /* ── Configuration from settings ── */
  const SPRITE_FRAMES  = Math.max(1, +s.travelboast_sprite_frames || 5);
  const SPRITE_SIZE    = +s.travelboast_sprite_size || 72;
  const TRAVEL_SECS    = Math.max(1, +s.travelboast_speed || 45);
  const PRIMARY_COLOR  = s.primary_color || "#D31C1C";
  const INIT_ZOOM      = +s.default_map_zoom || 16;

  const FOLLOW_ZOOM    = IS_RENDER ? 18.3 : 18.1;
  const FOLLOW_PITCH   = IS_RENDER ? 46 : 50;
  const PAN_OUT_SECS   = IS_RENDER ? 10 : 8;
  const RENDER_FPS     = 24;

  /* ── Bearing smoothing (frame-rate independent) ── */
  const BEARING_SMOOTH = 0.12;  // base factor at 60fps

  /* ── Sprite sheet dimensions ── */
  const FRAME_W = sprite ? sprite.width  / SPRITE_FRAMES : 0;
  const FRAME_H = sprite ? sprite.height / 5 : 0;

  /* ── Walk animation cadence ── */
  const STRIDE_M = 1.6;
  const MIN_CADENCE = 8, MAX_CADENCE = 14;

  /* ── Route geometry ── */
  const cum   = buildCumulative(pts);
  const total = cum[cum.length - 1];

  /* ── Animation state ── */
  let simTime      = 0;
  let lastTs       = performance.now();
  let smoothedB    = calcBearing(pts[0], pts[1]);
  let dirIdx       = 0; // current 8-direction index
  let spriteFrame  = 0;
  let spriteAccum  = 0; // accumulated time for sprite stepping

  /* ── Phase tracking ── */
  let phase        = "travel"; // "travel" | "panout" | "done"
  let panOutStart  = 0;        // simTime when pan-out began
  let panFromCenter = null;
  let panFromZoom   = FOLLOW_ZOOM;
  let panFromPitch  = FOLLOW_PITCH;
  let panFromBearing = 0;

  /* ── Map idle tracking ── */
  let mapIdle       = false;
  let readyFlagged  = false;

  /* ── Logo / sponsor positioning ── */
  const LOGO_POS    = (s.logo_overlay_position || "bottom-right").toLowerCase();
  const SPONSOR_POS = LOGO_POS
    .replace("left", "_L_").replace("right", "left").replace("_L_", "right")
    .replace("top", "_T_").replace("bottom", "top").replace("_T_", "bottom");


  /* ── Create map ── */
  map = new maplibregl.Map({
    container: "map",
    style: MAP_STYLE,
    center: [pts[0].lng, pts[0].lat],
    zoom: INIT_ZOOM,
    pitch: IS_RENDER ? 48 : 52,
    fadeDuration: 0,
  });

  window._map = map;

  function resize() {
    if (!map) return;
    const mc = map.getCanvas();
    const dpr = IS_RENDER ? 1 : (devicePixelRatio || 1);
    VIEW_W = mc.clientWidth;
    VIEW_H = mc.clientHeight;
    cvs.width  = VIEW_W * dpr;
    cvs.height = VIEW_H * dpr;
    cvs.style.width  = VIEW_W + "px";
    cvs.style.height = VIEW_H + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    if (snowflakes.length === 0) initSnow();
  }


  /* ── Map load & route layers ── */
  map.on("load", () => {
    resize();
    window.addEventListener("resize", resize);
    map.on("resize", resize);
    map.once("idle", () => { mapIdle = true; });

    // Route glow (wider, semi-transparent)
    map.addSource("route", {
      type: "geojson",
      data: { type: "Feature", geometry: { type: "LineString", coordinates: [] } }
    });
    map.addLayer({
      id: "route-glow", type: "line", source: "route",
      paint: { "line-color": PRIMARY_COLOR, "line-width": 14, "line-opacity": 0.2, "line-blur": 6 }
    });
    map.addLayer({
      id: "route-line", type: "line", source: "route",
      paint: { "line-color": PRIMARY_COLOR, "line-width": 5, "line-opacity": 0.9 }
    });

    requestAnimationFrame(tick);
  });


  /* ══════════════ MAIN TICK ══════════════ */

  function tick() {
    /* ── Time ── */
    let dt;
    if (IS_RENDER) {
      const newSim = (window.__RENDER_FRAME__ || 0) / RENDER_FPS;
      dt = Math.max(0, newSim - simTime);
      simTime = newSim;
    } else {
      const now = performance.now();
      dt = Math.min((now - lastTs) / 1000, 1 / 15); // cap at ~15fps minimum
      simTime += dt;
      lastTs = now;
    }

    ctx.clearRect(0, 0, VIEW_W, VIEW_H);

    /* ── PHASE: TRAVEL ── */
    if (phase === "travel") {
      const travelT = Math.min(1, simTime / TRAVEL_SECS);
      const m = travelT * total;

      // Find segment
      let seg = 1;
      while (seg < cum.length - 1 && cum[seg] < m) seg++;
      const segLen = cum[seg] - cum[seg - 1] || 1;
      const t = (m - cum[seg - 1]) / segLen;

      const a = pts[seg - 1], b = pts[seg];
      const pos = {
        lat: a.lat + (b.lat - a.lat) * t,
        lng: a.lng + (b.lng - a.lng) * t,
      };

      // Bearing (skip if points are identical)
      const segDist = haversine(a, b);
      if (segDist > 0.5) {
        const targetB = calcBearing(a, b);
        const alpha = 1 - Math.pow(1 - BEARING_SMOOTH, dt * 60);
        smoothedB = lerpAngle(smoothedB, targetB, alpha);
      }
      smoothedB = normB(smoothedB);

      // Direction with hysteresis
      dirIdx = getDirectionIdx(smoothedB, dirIdx);
      const dir = DIRS[dirIdx];

      // Sprite frame stepping (frame-rate independent)
      const speed = total / TRAVEL_SECS; // m/s
      const cadence = Math.max(MIN_CADENCE, Math.min(MAX_CADENCE, (speed / STRIDE_M) * SPRITE_FRAMES));
      if (IS_RENDER) {
        const framesPerSprite = Math.max(1, Math.round(RENDER_FPS / cadence));
        spriteFrame = Math.floor((window.__RENDER_FRAME__ || 0) / framesPerSprite) % SPRITE_FRAMES;
      } else {
        spriteAccum += dt;
        const interval = 1 / cadence;
        if (spriteAccum >= interval) {
          spriteAccum -= interval;
          spriteFrame = (spriteFrame + 1) % SPRITE_FRAMES;
        }
      }

      // Update route trail
      const coords = [];
      for (let j = 0; j < seg; j++) coords.push([pts[j].lng, pts[j].lat]);
      coords.push([pos.lng, pos.lat]);
      map.getSource("route")?.setData({
        type: "Feature",
        geometry: { type: "LineString", coordinates: coords }
      });

      // Camera follow
      map.jumpTo({ center: [pos.lng, pos.lat], zoom: FOLLOW_ZOOM, pitch: FOLLOW_PITCH, bearing: 0 });

      // Draw sprite (or fallback)
      const screen = map.project([pos.lng, pos.lat]);
      const size = SPRITE_SIZE * (0.9 + Math.min(0.4, (FOLLOW_ZOOM - 15) * 0.25));

      if (sprite) {
        ctx.save();
        ctx.translate(screen.x, screen.y);
        if (dir.flip) ctx.scale(-1, 1);
        ctx.drawImage(
          sprite,
          spriteFrame * FRAME_W, dir.row * FRAME_H, FRAME_W, FRAME_H,
          -size / 2, -size * 0.85, size, size
        );
        ctx.restore();
      } else {
        drawFallbackCharacter(screen.x, screen.y, size, smoothedB);
      }

      // Signal ready on first drawn frame
      if (!readyFlagged && (IS_RENDER || mapIdle)) {
        readyFlagged = true;
        window.__GPX_READY__ = true;
      }

      // Check for completion
      if (travelT >= 1) {
        phase = "panout";
        panOutStart = simTime;
        panFromCenter = map.getCenter();
        panFromZoom = FOLLOW_ZOOM;
        panFromPitch = FOLLOW_PITCH;
        panFromBearing = 0;
      }

      // Debug overlay
      if (IS_DEBUG) {
        document.getElementById("debug").innerHTML =
          `B: ${smoothedB.toFixed(1)}° | Dir: ${dir.name} (row ${dir.row}${dir.flip ? " flip" : ""}) | ` +
          `Frame: ${spriteFrame}/${SPRITE_FRAMES} | T: ${(travelT * 100).toFixed(1)}%`;
      }
    }

    /* ── PHASE: PAN OUT ── */
    else if (phase === "panout") {
      const elapsed = simTime - panOutStart;
      const rawT = Math.min(1, elapsed / PAN_OUT_SECS);
      const t = easeInOutCubic(rawT);

      // Target: fit entire route in view
      const bounds = new maplibregl.LngLatBounds();
      for (const p of pts) bounds.extend([p.lng, p.lat]);
      const targetCenter = bounds.getCenter();

      // Calculate target zoom to fit bounds (approximate)
      const targetZoom = IS_RENDER ? 13.5 : 14;
      const targetPitch = 0;

      map.jumpTo({
        center: [
          panFromCenter.lng + (targetCenter.lng - panFromCenter.lng) * t,
          panFromCenter.lat + (targetCenter.lat - panFromCenter.lat) * t,
        ],
        zoom: panFromZoom + (targetZoom - panFromZoom) * t,
        pitch: panFromPitch * (1 - t),
        bearing: 0,
      });

      if (rawT >= 1) {
        phase = "done";
        window.__GPX_DONE__ = true;
      }

      if (IS_DEBUG) {
        document.getElementById("debug").innerHTML = `Pan-out: ${(rawT * 100).toFixed(1)}%`;
      }
    }

    /* ── Overlays (drawn every frame regardless of phase) ── */
    drawOverlay(logo, LOGO_POS);
    drawOverlay(sponsor, SPONSOR_POS);
    updateAndDrawSnow(dt);

    /* ── Continue loop (unless done in render mode) ── */
    if (phase !== "done" || !IS_RENDER) {
      requestAnimationFrame(tick);
    }
  }


  /* ══════════════ DRAWING HELPERS ══════════════ */

  /** Draw logo/sponsor overlay in a corner */
  function drawOverlay(img, position) {
    if (!img) return;
    const size = 64, pad = 20;
    let x = pad, y = pad;
    if (position.includes("right"))  x = VIEW_W - size - pad;
    if (position.includes("bottom")) y = VIEW_H - size - pad;
    ctx.drawImage(img, x, y, size, size);
  }

  /** Fallback when no sprite sheet is loaded — red circle with direction arrow */
  function drawFallbackCharacter(x, y, size, bearing) {
    const r = size * 0.3;
    ctx.save();
    ctx.translate(x, y - r);

    // Red circle body
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fillStyle = "#D31C1C";
    ctx.fill();
    ctx.strokeStyle = "#fff";
    ctx.lineWidth = 2;
    ctx.stroke();

    // White hat triangle
    ctx.beginPath();
    ctx.moveTo(0, -r - 6);
    ctx.lineTo(-6, -r + 4);
    ctx.lineTo(6, -r + 4);
    ctx.closePath();
    ctx.fillStyle = "#fff";
    ctx.fill();

    // Direction arrow
    const angle = (bearing - 90) * DEG; // CSS-style: 0=right, rotate
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.moveTo(r + 4, 0);
    ctx.lineTo(r - 4, -5);
    ctx.lineTo(r - 4, 5);
    ctx.closePath();
    ctx.fillStyle = "#FBAF33";
    ctx.fill();

    ctx.restore();
  }
}
</script>
</body>
</html>
