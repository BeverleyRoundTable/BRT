<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Santa Colouring Pages</title>
<meta name="theme-color" content="#1D1D1A">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800;900&family=Mountains+of+Christmas:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#1D1D1A;--surface:#262622;--surface-2:#2f2f2a;
    --border:rgba(255,255,255,0.08);
    --gold:#FBAF33;--gold-dim:rgba(251,175,51,0.12);--gold-glow:rgba(251,175,51,0.25);
    --red:#D31C1C;--text:#f0f0f0;--dim:rgba(255,255,255,0.5);--muted:rgba(255,255,255,0.3);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Open Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

  .controls{max-width:540px;margin:0 auto;padding:32px 24px}
  .ctrl-header{text-align:center;margin-bottom:28px}
  .ctrl-header h1{font-size:1.6em;font-weight:900;letter-spacing:-0.02em;margin-bottom:6px}
  .ctrl-header h1 span{color:var(--gold)}
  .ctrl-header p{font-size:.82em;color:var(--dim);line-height:1.5}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:.68em;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);margin-bottom:6px}
  .field input{width:100%;padding:14px 16px;background:var(--surface);border:1px solid var(--border);
    border-radius:12px;color:var(--text);font-family:inherit;font-size:.95em;outline:none;transition:border-color .2s}
  .field input:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-dim)}
  .field input::placeholder{color:rgba(255,255,255,0.2)}

  .scene-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0}
  .scene-card{
    background:var(--surface);border:2px solid var(--border);border-radius:12px;
    padding:14px 10px;cursor:pointer;text-align:center;transition:all .2s;position:relative;
  }
  .scene-card:hover{border-color:rgba(251,175,51,0.3);background:var(--surface-2)}
  .scene-card.active{border-color:var(--gold);background:var(--gold-dim);box-shadow:0 0 0 3px var(--gold-dim)}
  .scene-card .sc-icon{font-size:32px;display:block;margin-bottom:6px;line-height:1}
  .scene-card .sc-name{font-size:.7em;font-weight:700;color:var(--dim);letter-spacing:.3px}
  .scene-card.active .sc-name{color:var(--gold)}
  .scene-card .sc-src{position:absolute;top:4px;right:6px;font-size:8px;font-weight:700;letter-spacing:.5px;
    text-transform:uppercase;padding:1px 5px;border-radius:4px}
  .sc-src.custom{background:rgba(46,204,113,0.15);color:#2ecc71;border:1px solid rgba(46,204,113,0.3)}
  .sc-src.builtin{background:rgba(255,255,255,0.05);color:var(--muted);border:1px solid var(--border)}

  .btn-row{display:flex;gap:10px;margin-top:24px}
  .btn{flex:1;padding:16px;border-radius:12px;font-weight:900;font-size:.92em;font-family:inherit;
    cursor:pointer;border:none;transition:transform .1s;letter-spacing:.3px}
  .btn:active{transform:scale(.96)}
  .btn-gold{background:var(--gold);color:#000;box-shadow:0 4px 20px var(--gold-glow)}
  .btn-dim{background:var(--surface);color:var(--dim);border:1px solid var(--border)}
  .info-text{font-size:.72em;color:var(--muted);text-align:center;margin-top:14px;line-height:1.6}

  .loader{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;
    flex-direction:column;gap:16px;z-index:9999;transition:opacity .4s}
  .loader.done{opacity:0;pointer-events:none}
  .loader-spin{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--gold);
    border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ── COLOURING PAGE ── */
  .page-wrap{display:flex;justify-content:center;padding:24px;background:rgba(255,255,255,0.02);border-top:1px solid var(--border)}

  .colouring-page{
    width:595px;height:842px;
    background:#fff;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,0.4);
    display:flex;flex-direction:column;align-items:center;padding:0;
    overflow:hidden;position:relative;
  }

  .cp-header{
    width:100%;padding:20px 24px 16px;text-align:center;
    border-bottom:3px solid #1D1D1A;position:relative;flex-shrink:0;
  }
  .cp-title{
    font-family:'Mountains of Christmas',cursive;font-size:36px;font-weight:700;
    color:#1D1D1A;line-height:1.1;margin-bottom:2px;
  }
  .cp-name{font-size:22px;font-weight:900;color:#D31C1C;margin:4px 0 0;letter-spacing:.5px}
  .cp-name.empty{color:#ccc;font-size:16px;font-weight:600}

  .cp-scene{
    flex:1;width:100%;display:flex;align-items:center;justify-content:center;
    padding:20px 32px;overflow:hidden;
  }
  .cp-scene svg{max-width:100%;max-height:100%;width:auto;height:auto}
  .cp-scene img{max-width:100%;max-height:100%;object-fit:contain}

  .cp-footer{
    width:100%;padding:10px 20px;border-top:2px solid #eee;
    display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
  }
  .cp-footer-left{display:flex;align-items:center;gap:8px}
  .cp-footer-logo{height:22px;width:auto;object-fit:contain}
  .cp-footer-brand{font-size:9px;font-weight:700;color:#999}
  .cp-footer-right{font-size:7px;color:#ccc;font-weight:600;letter-spacing:.5px}

  .cp-corner{position:absolute;font-size:20px;opacity:.12;pointer-events:none;color:#1D1D1A}
  .cp-corner.tl{top:8px;left:12px}.cp-corner.tr{top:8px;right:12px}
  .cp-corner.bl{bottom:8px;left:12px}.cp-corner.br{bottom:8px;right:12px}

  /* Loading indicator inside scene area */
  .scene-loading{color:#ccc;font-size:13px;font-weight:600}

  @media print{
    body{background:#fff !important}
    .controls,.loader,.info-text{display:none !important}
    .page-wrap{padding:0;background:none !important;border:none !important}
    .colouring-page{
      box-shadow:none !important;border-radius:0;
      width:100%;height:auto;min-height:100vh;
      -webkit-print-color-adjust:exact;print-color-adjust:exact;
    }
    @page{margin:8mm;size:A4 portrait}
  }

  @media(max-width:640px){
    .colouring-page{width:100%;height:auto;aspect-ratio:595/842;min-height:0}
    .cp-title{font-size:28px}
    .cp-name{font-size:18px}
    .scene-grid{grid-template-columns:repeat(2,1fr)}
  }
</style>
</head>
<body>

<div class="loader" id="loader"><div class="loader-spin"></div></div>

<div class="controls" id="controls">
  <div class="ctrl-header">
    <h1>🖍️ Colouring <span>Page</span> Generator</h1>
    <p>Pick a festive scene, add a child's name, and print a personalised colouring page!</p>
  </div>

  <div class="field">
    <label>Child's Name</label>
    <input type="text" id="childName" placeholder="e.g. Sophie" maxlength="30">
  </div>

  <div class="field">
    <label>Choose a Scene</label>
    <div class="scene-grid" id="sceneGrid"></div>
  </div>

  <div class="btn-row">
    <button class="btn btn-gold" onclick="generate()">Generate Page</button>
    <button class="btn btn-dim" onclick="window.print()">🖨 Print</button>
  </div>

  <div class="info-text">Prints perfectly on A4 paper. Grab some crayons and let the magic happen!</div>
</div>

<div class="page-wrap" id="pageWrap"></div>

<script>
const API = new URLSearchParams(location.search).get('api') || '';
let CFG = { logo:'', sleighName:'Santa Sleigh' };

/* ══════════════════════════════════════════════════════════════
   SCENE CONFIG — Edit this array to add/remove/customise scenes

   Each scene has:
     id    — unique key
     icon  — emoji for the picker card
     name  — display label
     url   — (optional) URL to custom artwork (PNG, JPG, SVG, or WebP)
             If set, loads from this URL (e.g. GitHub raw)
             If empty/null, uses the built-in fallback SVG

   To add your own artwork:
   1. Design in Canva at 2000×2500px — black outlines, no fills, white bg
   2. Export as PNG (most reliable) or SVG
   3. Upload to your GitHub repo, e.g.:
      https://raw.githubusercontent.com/BeverleyRoundTable/BRT/main/colouring/sleigh.png
   4. Paste the raw URL into the 'url' field below
   5. Deploy — the generator loads your custom art automatically

   Supports: .png, .jpg, .jpeg, .webp, .svg
   Recommended canvas size: 2000×2500px (4:5 portrait)
   Subject should fill ~60-65% of canvas, leaving space for kids to doodle
   ══════════════════════════════════════════════════════════════ */

const SCENES = [
  {
    id: 'sleigh',
    icon: '🛷',
    name: "Santa's Sleigh",
    url: ''  // ← Paste your custom image URL here, e.g.: https://raw.githubusercontent.com/BeverleyRoundTable/BRT/main/colouring/sleigh.png
  },
  {
    id: 'tree',
    icon: '🎄',
    name: 'Christmas Tree',
    url: ''
  },
  {
    id: 'snowman',
    icon: '⛄',
    name: 'Snowman',
    url: ''
  },
  {
    id: 'house',
    icon: '🏠',
    name: 'Cosy House',
    url: ''
  },
  {
    id: 'presents',
    icon: '🎁',
    name: 'Present Stack',
    url: ''
  },
  {
    id: 'reindeer',
    icon: '🦌',
    name: 'Reindeer',
    url: ''
  }
];

let selectedScene = 'sleigh';

async function init() {
  if (API) {
    try {
      const res = await fetch(API);
      const data = await res.json();
      const s = data.settings || {};
      CFG.logo = s.logo_overlay_url || '';
      CFG.sleighName = s.sleigh_display_name || 'Santa Sleigh';
    } catch(e) {}
  }

  const grid = document.getElementById('sceneGrid');
  grid.innerHTML = SCENES.map(s => {
    const srcLabel = s.url
      ? '<span class="sc-src custom">Custom</span>'
      : '<span class="sc-src builtin">Built-in</span>';
    return `<div class="scene-card ${s.id===selectedScene?'active':''}" data-scene="${s.id}" onclick="pickScene('${s.id}')">
      ${srcLabel}
      <span class="sc-icon">${s.icon}</span>
      <span class="sc-name">${s.name}</span>
    </div>`;
  }).join('');

  document.getElementById('loader').classList.add('done');
  generate();
}

function pickScene(id) {
  selectedScene = id;
  document.querySelectorAll('.scene-card').forEach(c => c.classList.toggle('active', c.dataset.scene === id));
  generate();
}

async function generate() {
  const name = document.getElementById('childName').value.trim();
  const scene = SCENES.find(s => s.id === selectedScene);
  const logoHtml = CFG.logo ? `<img class="cp-footer-logo" src="${CFG.logo}" alt="">` : '';
  const nameHtml = name
    ? `<div class="cp-name">${name}'s Colouring Page</div>`
    : `<div class="cp-name empty">My Colouring Page</div>`;

  document.getElementById('pageWrap').innerHTML = `
    <div class="colouring-page">
      <span class="cp-corner tl">❄</span><span class="cp-corner tr">⭐</span>
      <span class="cp-corner bl">🎄</span><span class="cp-corner br">❄</span>
      <div class="cp-header">
        <div class="cp-title">Merry Christmas!</div>
        ${nameHtml}
      </div>
      <div class="cp-scene" id="sceneArea"><span class="scene-loading">Loading scene…</span></div>
      <div class="cp-footer">
        <div class="cp-footer-right">COLOUR ME IN!</div>
        <div class="cp-footer-left">
          ${logoHtml}
          <span class="cp-footer-brand">${CFG.sleighName}</span>
        </div>
      </div>
    </div>
  `;

  const area = document.getElementById('sceneArea');

  if (scene.url) {
    // Custom artwork — use <img> which handles PNG, JPG, SVG, WebP, etc
    area.innerHTML = `<img src="${scene.url}" alt="${scene.name}" style="max-width:100%;max-height:100%;object-fit:contain;">`;
    return;
  }

  // Built-in fallback
  const fallback = FALLBACKS[scene.id];
  area.innerHTML = fallback ? fallback() : '<span class="scene-loading">No artwork available</span>';
}

document.getElementById('childName').addEventListener('input', generate);
