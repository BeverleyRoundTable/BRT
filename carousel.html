<div class="carousel-container" style="width:100%; height:450px; overflow:hidden; border-radius:12px; position:relative; background:#161614;">
  <div class="carousel-track" id="santa-carousel-track" style="display:flex; height:100%; transition:transform 0.6s ease;">
    </div>
</div>

<style>
  .carousel-slide {
    min-width: 100%;
    height: 100%;
    position: relative;
  }
  .carousel-slide img.bg {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 12px;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  .carousel-slide img.bg.loaded {
    opacity: 1;
  }
  /* Overlay (Logo) */
  .carousel-overlay {
    position: absolute;
    z-index: 20;
    pointer-events: none;
    opacity: 0.95;
  }
  .pos-top-left { top: 12px; left: 12px; }
  .pos-top-right { top: 12px; right: 12px; }
  .pos-bottom-left { bottom: 12px; left: 12px; }
  .pos-bottom-right { bottom: 12px; right: 12px; }
  .pos-center { top: 50%; left: 50%; transform: translate(-50%, -50%); }
</style>

<script>
  // 👇 PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE 👇
  const SANTA_API_URL = "https://script.google.com/macros/s/AKfycbwl88G_1QGwp6uN1JEGV2Abd7FAwQg7Id3_ufSNW_n1e7rsPAw-ZUor5vlqL8_GBfCK/exec";

  async function loadTurboSantaCarousel() {
    try {
      // 1. Ask the Google Sheet for the images and settings
      const res = await fetch(SANTA_API_URL + "?function=getCarouselData");
      const data = await res.json();
      
      // Stop if there are no images in the folder
      if (!data.images || data.images.length === 0) return;

      const track = document.getElementById("santa-carousel-track");
      let html = "";

      // 2. Build the slides
      data.images.forEach((imgUrl, i) => {
        let logoHtml = "";
        
        // Add the logo overlay if you turned it on in the Settings tab
        if (String(data.logo_overlay_enabled).toLowerCase() === "true" && data.logo_overlay_url) {
          logoHtml = `<img class="carousel-overlay ${data.logo_overlay_position}" src="${data.logo_overlay_url}" style="width: ${data.logo_overlay_size}px;">`;
        }

        html += `
          <div class="carousel-slide">
            <img class="bg" src="${imgUrl}" alt="Santa Slide ${i+1}" onload="this.classList.add('loaded')">
            ${logoHtml}
          </div>
        `;
      });

      // Inject the HTML into the page
      track.innerHTML = html;

      // 3. Start the auto-rotation (every 3.5 seconds)
      let index = 0;
      const totalSlides = data.images.length;
      
      if (totalSlides > 1) {
        setInterval(() => {
          index = (index + 1) % totalSlides;
          track.style.transform = `translateX(-${index * 100}%)`;
        }, 3500);
      }

    } catch (e) {
      console.error("TurboSanta Carousel failed to load:", e);
    }
  }

  // Trigger the script as soon as the page loads
  document.addEventListener("DOMContentLoaded", loadTurboSantaCarousel);
</script>
