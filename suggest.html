<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Help Santa Plan Next Year!</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>

  <style>
    :root { --rt-grey: #1D1D1A; --rt-gold: #FBAF33; --text: #f0f0f0; --surface: rgba(29, 29, 26, 0.95); }
    html, body { margin: 0; padding: 0; height: 100%; background: var(--rt-grey); font-family: 'Open Sans', sans-serif; overflow: hidden; }
    #map { position: absolute; inset: 0; z-index: 100; cursor: crosshair; }
    
    #loading { position: absolute; inset: 0; background: var(--rt-grey); color: var(--rt-gold); display: flex; align-items: center; justify-content: center; z-index: 5000; font-size: 1.2rem; font-weight: 800; }
    
    #public-ui { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); background: var(--surface); color: var(--text); padding: 16px 20px; border-radius: 14px; border: 2px solid var(--rt-gold); z-index: 4000; width: 90%; max-width: 420px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
    #public-ui h2 { margin: 0 0 6px 0; font-size: 1.2rem; color: var(--rt-gold); }
    #public-ui p { margin: 0; font-size: 0.85rem; line-height: 1.4; color: #ccc; }

    .leaflet-popup-content-wrapper { background: var(--surface); color: var(--text); border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
    .leaflet-popup-tip { background: var(--surface); }
    .pin-confirm-btn { background: #d31c1c; color: white; border: none; padding: 10px 16px; margin-top: 10px; border-radius: 8px; font-weight: 800; width: 100%; cursor: pointer; }
  </style>
</head>
<body>

  <div id="loading">🗺️ Loading Map...</div>

  <div id="public-ui">
    <h2>Help Santa Plan Next Year! 🎅</h2>
    <p>Tap anywhere on the map to suggest a new area. We can't visit every street, but this helps our Elves see where the demand is!</p>
  </div>

  <div id="map"></div>

  <script>
    const params = new URLSearchParams(location.search);
    const apiUrl = params.get("api");
    let map, activePin = null;

    document.addEventListener("DOMContentLoaded", async () => {
      if (!apiUrl) { document.getElementById("loading").innerHTML = "❌ Missing ?api=URL parameter."; return; }

      map = L.map("map", { zoomControl: false }).setView([53.84, -0.42], 13);
      L.control.zoom({ position: 'bottomright' }).addTo(map);
      L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png").addTo(map);

      try {
        const res = await fetch(apiUrl + "?function=getRoutes");
        const data = await res.json();
        const routes = data.routes || [];

        routes.forEach(route => {
          if (route.gpxUrl) {
            new L.GPX(route.gpxUrl, {
              async: true,
              polyline_options: { color: "#ffffff", weight: 3, opacity: 0.35 },
              marker_options: { startIconUrl: null, endIconUrl: null, shadowUrl: null }
            }).addTo(map);
          }
        });
        setTimeout(() => document.getElementById("loading").style.display = "none", 1000);
      } catch (err) {
        document.getElementById("loading").innerHTML = "❌ Failed to load routes.";
      }

      map.on('click', function(e) {
        const lat = e.latlng.lat;
        const lng = e.latlng.lng;

        if (activePin) map.removeLayer(activePin);

        const pinIcon = L.icon({
          iconUrl: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-gold.png",
          shadowUrl: "https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png",
          iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
        });

        activePin = L.marker([lat, lng], { icon: pinIcon }).addTo(map);
        
        const popupContent = document.createElement('div');
        popupContent.innerHTML = `
          <div style="text-align: center; font-size: 1.1em; margin-bottom: 5px;">📍 Suggest this area?</div>
          <button class="pin-confirm-btn" id="confirmPinBtn">Drop Pin for Santa</button>
        `;

        activePin.bindPopup(popupContent).openPopup();

        popupContent.querySelector('#confirmPinBtn').addEventListener('click', async (btn) => {
          btn.target.innerText = "Sending...";
          btn.target.style.opacity = "0.5";
          try {
            await fetch(apiUrl, {
              method: "POST",
              body: JSON.stringify({ action: "suggestRoute", lat: lat, lng: lng })
            });
            activePin.setPopupContent("<div style='text-align:center; padding: 10px;'>✅ Pin dropped! Thanks!</div>");
            setTimeout(() => { map.removeLayer(activePin); activePin = null; }, 3000);
          } catch (err) {
            btn.target.innerText = "Error. Try again?";
            btn.target.style.opacity = "1";
          }
        });
      });
    });
  </script>
</body>
</html>
