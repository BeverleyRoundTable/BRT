<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Help Santa Plan Next Year!</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>

  <style>
    /* ── ROUND TABLE BRAND VARIABLES ── */
    :root {
      --rt-grey: #1D1D1A;
      --rt-gold: #FBAF33;
      --surface: #262622;
      --surface-2: #2f2f2a;
      --border: rgba(255,255,255,0.08);
      --text: #f0f0f0;
      --text-dim: rgba(255,255,255,0.8);
      --red: #d31c1c;
    }
    
    html, body { 
      margin: 0; padding: 0; height: 100%; 
      background: var(--rt-grey); 
      color: var(--text); 
      font-family: 'Open Sans', sans-serif; 
      overflow: hidden; 
    }
    
    /* ── THE MAP ── */
    #map { position: absolute; inset: 0; z-index: 100; cursor: crosshair; }

    /* ── LOADING SPINNER (From Tracker) ── */
    #loadingCover { position: fixed; inset: 0; background: var(--rt-grey); display: flex; align-items: center; justify-content: center; z-index: 6000; transition: opacity 0.4s; }
    #loadingCover.done { opacity: 0; pointer-events: none; }
    #loadingSpinner { width: 52px; height: 52px; border-radius: 50%; border: 4px solid var(--border); border-top-color: var(--rt-gold); animation: spin .9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* ── PUBLIC UI HEADER (Matches Tracker Status Box) ── */
    #public-ui { 
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%); 
      background: rgba(29, 29, 26, 0.95); border: 1px solid var(--border);
      color: var(--text); padding: 18px 24px; border-radius: 16px; 
      width: 90%; max-width: 450px; text-align: center; 
      box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 4000; line-height: 1.4;
    }
    #public-ui h2 { margin: 0 0 6px 0; font-size: 1.15em; color: var(--rt-gold); font-weight: 800; }
    #public-ui p { margin: 0; font-size: 0.9em; color: var(--text-dim); }

    /* ── LEAFLET POPUP STYLING (Matches Tracker Modal) ── */
    .leaflet-popup-content-wrapper { background: var(--surface); color: var(--text); border-radius: 14px; border: 1px solid var(--border); padding: 4px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
    .leaflet-popup-tip { background: var(--surface); }
    .leaflet-container a.leaflet-popup-close-button { color: var(--text-dim); top: 6px; right: 6px; }

    /* ── CONFIRM BUTTON (Matches Tracker Buttons) ── */
    .pin-confirm-btn { 
      background: var(--red); color: white; border: none; padding: 12px 16px; 
      margin-top: 12px; border-radius: 10px; font-weight: 800; font-size: 0.95em;
      width: 100%; cursor: pointer; transition: transform 0.1s; font-family: inherit;
    }
    .pin-confirm-btn:active { transform: scale(0.96); }
    .pin-confirm-btn.loading { opacity: 0.6; pointer-events: none; background: var(--surface-2); color: var(--text-dim); border: 1px solid var(--border); }
  </style>
</head>
<body>

  <div id="loadingCover"><div id="loadingSpinner"></div></div>

  <div id="public-ui">
    <h2>Help Santa Plan Next Year! 🎅</h2>
    <p>Tap the map to suggest a new area. We can't visit every street, but this helps our Elves see where the highest demand is!</p>
  </div>

  <div id="map"></div>

  <script>
    const params = new URLSearchParams(location.search);
    const apiUrl = params.get("api");
    let map, activePin = null;

    document.addEventListener("DOMContentLoaded", async () => {
      const loader = document.getElementById("loadingCover");
      
      if (!apiUrl) { 
        loader.innerHTML = "<div style='color: #ff6b6b; font-weight: bold;'>❌ Missing ?api=URL parameter</div>"; 
        return; 
      }

      // Initialize Map (Same view and tiles as your tracker)
      map = L.map("map", { zoomControl: false }).setView([53.84, -0.42], 13);
      L.control.zoom({ position: 'bottomright' }).addTo(map);
      
      // Using standard OpenStreetMap tiles to match your tracker exactly
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: '© OpenStreetMap'
      }).addTo(map);

      try {
        const res = await fetch(apiUrl + "?function=getRoutes");
        const data = await res.json();
        const routes = data.routes || [];

        // Load all existing GPX tracks so users can see where we already go
        routes.forEach(route => {
          if (route.gpxUrl) {
            new L.GPX(route.gpxUrl, {
              async: true,
              // Faint red line so it stands out against the standard map
              polyline_options: { color: "#d31c1c", weight: 4, opacity: 0.4 },
              marker_options: { startIconUrl: null, endIconUrl: null, shadowUrl: null }
            }).addTo(map);
          }
        });
        setTimeout(() => loader.classList.add("done"), 800);
      } catch (err) {
        loader.innerHTML = "<div style='color: #ff6b6b; font-weight: bold;'>❌ Failed to load existing routes.</div>";
      }

      // Handle map clicks to drop the suggestion pin
      map.on('click', function(e) {
        const lat = e.latlng.lat;
        const lng = e.latlng.lng;

        if (activePin) map.removeLayer(activePin);

        // Using your exact gold marker icon
        const pinIcon = L.icon({
          iconUrl: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-gold.png",
          shadowUrl: "https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png",
          iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
        });

        activePin = L.marker([lat, lng], { icon: pinIcon }).addTo(map);
        
        const popupContent = document.createElement('div');
        popupContent.innerHTML = `
          <div style="text-align: center; font-weight: 800; font-size: 1.05em; color: var(--rt-gold); margin-bottom: 4px;">📍 Suggest this area?</div>
          <div style="text-align: center; font-size: 0.85em; color: var(--text-dim);">Tap the button to send to the North Pole.</div>
          <button class="pin-confirm-btn" id="confirmPinBtn">Drop Pin for Santa</button>
        `;

        activePin.bindPopup(popupContent).openPopup();

        // Submit the pin to your Google Sheet via API
        popupContent.querySelector('#confirmPinBtn').addEventListener('click', async (btn) => {
          const target = btn.target;
          target.classList.add("loading");
          target.innerText = "Sending...";
          
          try {
            const response = await fetch(apiUrl, {
              method: "POST",
              body: JSON.stringify({ action: "suggestRoute", lat: lat, lng: lng })
            });
            const result = await response.json();

            if (result.ok) {
              activePin.setPopupContent("<div style='text-align:center; padding: 14px; font-weight: bold; color: #2cff4e;'>✅ Pin dropped! Thanks!</div>");
              setTimeout(() => { map.removeLayer(activePin); activePin = null; }, 3000);
            } else {
              throw new Error("API rejected request.");
            }
          } catch (err) {
            target.classList.remove("loading");
            target.innerText = "Error. Try again?";
          }
        });
      });
    });
  </script>
</body>
</html>
