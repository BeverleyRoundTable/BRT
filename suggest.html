<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Help Santa Plan Next Year! — TurboSanta</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>

  <style>
    /* ── NATIONAL BRAND VARIABLES ── */
    :root {
      --gold: #FBAF33;
      --gold-dim: rgba(251,175,51,0.12);
      --gold-glow: rgba(251,175,51,0.25);
      --dark: #0d0d0b;
      --surface: #161614;
      --surface-2: #1e1e1b;
      --surface-3: #252522;
      --border: rgba(255,255,255,0.08);
      --border-gold: rgba(251,175,51,0.2);
      --red: #D31C1C;
      --red-dim: rgba(211,28,28,0.15);
      --green: #2ecc71;
      --green-dim: rgba(46,204,113,0.12);
      --blue: #4a9eff;
      --text: #eaeae5;
      --text-dim: rgba(255,255,255,0.55);
      --text-muted: rgba(255,255,255,0.3);
    }
    
    html, body { 
      margin: 0; padding: 0; height: 100%; 
      background: var(--dark); 
      color: var(--text); 
      font-family: 'DM Sans', sans-serif; 
      overflow: hidden; 
      -webkit-font-smoothing: antialiased;
    }
    
    * { box-sizing: border-box; }

    /* ── THE MAP ── */
    #map { position: absolute; inset: 0; z-index: 100; cursor: crosshair; }

    /* ── LOADING SPINNER ── */
    #loadingCover { position: fixed; inset: 0; background: var(--dark); display: flex; align-items: center; justify-content: center; z-index: 6000; transition: opacity 0.4s; }
    #loadingCover.done { opacity: 0; pointer-events: none; }
    #loadingSpinner { width: 52px; height: 52px; border-radius: 50%; border: 4px solid var(--border); border-top-color: var(--gold); animation: spin .9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* ── PUBLIC UI HEADER (Overlay Card) ── */
    #public-ui { 
      position: absolute; top: 24px; left: 50%; transform: translateX(-50%); 
      background: rgba(22, 22, 20, 0.95); /* var(--surface) with slight transparency */
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      color: var(--text); padding: 24px 28px; border-radius: 16px; 
      width: 90%; max-width: 480px; text-align: center; 
      box-shadow: 0 20px 40px rgba(0,0,0,0.6); z-index: 4000;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: var(--gold-dim);
      color: var(--gold);
      border: 1px solid var(--border-gold);
      margin-bottom: 12px;
    }

    #public-ui h2 { 
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(28px, 6vw, 36px);
      letter-spacing: 2px;
      line-height: 1;
      margin: 0 0 12px 0; 
      color: #fff; 
    }

    #public-ui h2 span { color: var(--gold); }

    #public-ui p { 
      margin: 0; 
      font-size: 14px; 
      color: var(--text-dim); 
      line-height: 1.5;
    }

    /* ── LEAFLET POPUP STYLING ── */
    .leaflet-popup-content-wrapper { 
      background: var(--surface-2); 
      color: var(--text); 
      border-radius: 12px; 
      border: 1px solid var(--border); 
      padding: 6px; 
      box-shadow: 0 12px 30px rgba(0,0,0,0.7); 
    }
    .leaflet-popup-tip { background: var(--surface-2); }
    .leaflet-container a.leaflet-popup-close-button { 
      color: var(--text-muted); 
      top: 8px; right: 8px; 
      transition: color 0.2s;
    }
    .leaflet-container a.leaflet-popup-close-button:hover {
      color: var(--gold);
    }

    /* ── CONFIRM BUTTON ── */
    .pin-confirm-btn { 
      background: var(--gold); 
      color: #000; 
      border: none; 
      padding: 14px 24px; 
      margin-top: 16px; 
      border-radius: 8px; 
      font-weight: 700; 
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      width: 100%; 
      cursor: pointer; 
      transition: all 0.2s ease; 
      font-family: 'DM Sans', sans-serif;
    }
    .pin-confirm-btn:hover { background: #e59d28; transform: translateY(-2px); }
    .pin-confirm-btn:active { transform: translateY(0); }
    
    .pin-confirm-btn.loading { 
      opacity: 0.5; 
      pointer-events: none; 
      background: var(--surface-3); 
      color: var(--text-muted); 
      border: 1px solid var(--border); 
    }

    /* Override leaflet default link colors if any leak */
    .leaflet-container a { color: var(--gold); }
  </style>
</head>
<body>

  <div id="loadingCover"><div id="loadingSpinner"></div></div>

  <div id="public-ui">
    <div class="hero-badge">📍 Map Planner</div>
    <h2>HELP SANTA <span>PLAN!</span></h2>
    <p>Tap the map to suggest a new area. We can't visit every street, but this helps our Elves see where the highest demand is!</p>
  </div>

  <div id="map"></div>

  <script>
    const params = new URLSearchParams(location.search);
    const apiUrl = params.get("api");
    let map, activePin = null;

    document.addEventListener("DOMContentLoaded", async () => {
      const loader = document.getElementById("loadingCover");
      
      if (!apiUrl) { 
        loader.innerHTML = "<div style='color: var(--red); font-weight: bold;'>❌ Missing ?api=URL parameter</div>"; 
        return; 
      }

      // Initialize Map (Same view and tiles as your tracker)
      map = L.map("map", { zoomControl: false }).setView([53.84, -0.42], 13);
      L.control.zoom({ position: 'bottomright' }).addTo(map);
      
      // Standard OpenStreetMap tiles
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: '© OpenStreetMap'
      }).addTo(map);

      try {
        const res = await fetch(apiUrl + "?function=getRoutes");
        const data = await res.json();
        const routes = data.routes || [];

        // ⭐ CURATED COLOR PALETTE: Red, Blue, Forest Green, Deep Orange, Purple, Teal
        const colorPalette = [
          '#d31c1c', // Red
          '#1E90FF', // Dodger Blue
          '#228B22', // Forest Green
          '#FF8C00', // Dark Orange
          '#8A2BE2', // Blue Violet
          '#008B8B', // Dark Cyan
          '#FF1493', // Deep Pink
          '#32CD32', // Lime Green
          '#4169E1', // Royal Blue
          '#FFD700', // Gold
          '#8B4513', // Saddle Brown
          '#4682B4'  // Steel Blue
        ];

        // Load all existing GPX tracks
        routes.forEach((route, index) => {
          if (route.gpxUrl) {
            // Pick a color from the palette based on the route index
            const routeColor = colorPalette[index % colorPalette.length];

            new L.GPX(route.gpxUrl, {
              async: true,
              polyline_options: { color: routeColor, weight: 4, opacity: 0.7 },
              marker_options: { startIconUrl: null, endIconUrl: null, shadowUrl: null }
            }).addTo(map);
          }
        });
        setTimeout(() => loader.classList.add("done"), 800);
      } catch (err) {
        loader.innerHTML = "<div style='color: var(--red); font-weight: bold;'>❌ Failed to load existing routes.</div>";
      }

      // Handle map clicks to drop the suggestion pin
      map.on('click', function(e) {
        const lat = e.latlng.lat;
        const lng = e.latlng.lng;

        if (activePin) map.removeLayer(activePin);

        // Using your exact gold marker icon
        const pinIcon = L.icon({
          iconUrl: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-gold.png",
          shadowUrl: "https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png",
          iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
        });

        activePin = L.marker([lat, lng], { icon: pinIcon }).addTo(map);
        
        const popupContent = document.createElement('div');
        popupContent.innerHTML = `
          <div style="text-align: center; font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 1px; color: var(--gold); margin-bottom: 4px; line-height: 1;">SUGGEST AREA?</div>
          <div style="text-align: center; font-size: 13px; color: var(--text-dim);">Tap the button to send to the North Pole.</div>
          <button class="pin-confirm-btn" id="confirmPinBtn">Drop Pin for Santa</button>
        `;

        activePin.bindPopup(popupContent).openPopup();

        // Submit the pin to your Google Sheet via API
        popupContent.querySelector('#confirmPinBtn').addEventListener('click', async (btn) => {
          const target = btn.target;
          target.classList.add("loading");
          target.innerText = "Sending...";
          
          try {
            const response = await fetch(apiUrl, {
              method: "POST",
              body: JSON.stringify({ action: "suggestRoute", lat: lat, lng: lng })
            });
            const result = await response.json();

            if (result.ok) {
              activePin.setPopupContent("<div style='text-align:center; padding: 14px; font-weight: bold; color: var(--green); font-size: 14px;'>✅ Pin dropped! Thanks!</div>");
              setTimeout(() => { map.removeLayer(activePin); activePin = null; }, 3000);
            } else {
              throw new Error("API rejected request.");
            }
          } catch (err) {
            target.classList.remove("loading");
            target.innerText = "Error. Try again?";
          }
        });
      });
    });
  </script>
</body>
</html>
