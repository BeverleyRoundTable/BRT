<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sleigh Spotter Bingo — TurboSanta</title>
<meta name="theme-color" content="#0d0d0b">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&family=Mountains+of+Christmas:wght@400;700&display=swap" rel="stylesheet">

<style>
  /* ═══════════════════════════════════════ */
  /* TURBOSANTA DESIGN SYSTEM */
  /* ═══════════════════════════════════════ */
  :root {
    --gold: #FBAF33;
    --gold-dim: rgba(251,175,51,0.12);
    --gold-glow: rgba(251,175,51,0.25);
    --dark: #0d0d0b;
    --surface: #161614;
    --surface-2: #1e1e1b;
    --surface-3: #252522;
    --border: rgba(255,255,255,0.08);
    --border-gold: rgba(251,175,51,0.2);
    --red: #D31C1C;
    --green: #2ecc71;
    --text: #eaeae5;
    --text-dim: rgba(255,255,255,0.55);
    --text-muted: rgba(255,255,255,0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── UI CONTROLS ── */
  .controls-wrapper {
    padding: 48px 24px 24px;
  }

  .controls {
    max-width: 540px;
    margin: 0 auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 32px 28px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }

  .ctrl-header { text-align: center; margin-bottom: 32px; }
  
  .ctrl-header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    letter-spacing: 2px;
    color: #fff;
    margin-bottom: 8px;
    line-height: 1;
  }
  
  .ctrl-header h1 span { color: var(--gold); }
  
  .ctrl-header p {
    font-size: 15px;
    color: var(--text-dim);
    line-height: 1.5;
  }

  .field { margin-bottom: 20px; }
  
  .field label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  
  .field input {
    width: 100%;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    color: #fff;
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    outline: none;
    transition: border 0.2s;
  }
  
  .field input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px var(--gold-glow);
  }
  
  .field input::placeholder { color: var(--text-muted); font-family: 'DM Sans', sans-serif; }

  .btn-row { display: flex; gap: 12px; margin-top: 24px; }
  
  .btn {
    flex: 1;
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 15px;
    border: none;
    border-radius: 8px;
    padding: 16px;
    cursor: pointer;
    transition: transform 0.1s, background 0.2s;
    text-align: center;
  }
  
  .btn:active { transform: scale(0.97); }
  
  .btn-gold {
    background: var(--gold);
    color: #000;
  }
  
  .btn-gold:hover { background: #e59d28; }
  
  .btn-ghost {
    background: var(--surface-2);
    color: #fff;
    border: 1px solid var(--border);
  }
  
  .btn-ghost:hover { background: var(--surface-3); }

  .info-text {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
    margin-top: 20px;
    line-height: 1.6;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* ── LOADER ── */
  .loader {
    position: fixed; inset: 0; background: var(--dark);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px; z-index: 9999; transition: opacity 0.4s;
  }
  .loader.done { opacity: 0; pointer-events: none; }
  .loader-spin {
    width: 40px; height: 40px; border: 3px solid var(--border);
    border-top-color: var(--gold); border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg) } }

  /* ── PRINTABLE BINGO CARD ── */
  .page-wrap {
    display: flex; justify-content: center; padding: 24px; 
    border-top: 1px solid var(--border);
  }

  .bingo-page {
    width: 595px; background: #fff; border-radius: 12px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.6); overflow: hidden;
    position: relative; font-family: 'DM Sans', sans-serif; color: #1D1D1A;
    border: 1px solid var(--border);
  }

  .bp-header {
    width: 100%; background: var(--gold); padding: 28px 24px 20px;
    text-align: center; position: relative;
  }
  .bp-header::after {
    content: ''; position: absolute; bottom: -1px; left: 0; right: 0;
    height: 24px; background: #fff; border-radius: 50% 50% 0 0;
  }
  
  .bp-title {
    font-family: 'Bebas Neue', sans-serif; font-size: 56px;
    letter-spacing: 2px; color: var(--red); line-height: 1; margin-bottom: 4px;
  }
  
  .bp-subtitle {
    font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 700;
    color: rgba(29,29,26,0.6); letter-spacing: 2px; text-transform: uppercase;
  }

  .bp-name {
    text-align: center; padding: 4px 20px 16px;
    font-family: 'Mountains of Christmas', cursive;
    font-size: 36px; font-weight: 700; color: #1D1D1A; line-height: 1;
  }
  
  .bp-name.empty {
    color: #ccc; font-family: 'DM Mono', monospace; font-size: 14px;
    text-transform: uppercase; letter-spacing: 2px; font-weight: 500;
    padding: 12px 20px 20px;
  }

  .bp-grid {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 0;
    margin: 0 24px 20px; border: 3px solid #1D1D1A; border-radius: 8px;
    overflow: hidden; background: #1D1D1A; gap: 2px;
  }
  
  .bp-cell {
    aspect-ratio: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; background: #fff; padding: 6px;
    text-align: center; position: relative;
  }
  
  .bp-cell-emoji { font-size: 32px; line-height: 1; margin-bottom: 6px; }
  
  .bp-cell-text {
    font-size: 9px; font-weight: 800; color: #1D1D1A;
    letter-spacing: 0.5px; line-height: 1.2; text-transform: uppercase;
  }

  /* Free space */
  .bp-cell.free { background: rgba(251,175,51,0.15); }
  .bp-cell.free .bp-cell-emoji { font-size: 40px; margin-bottom: 2px; }
  .bp-cell.free .bp-cell-text { color: var(--red); font-size: 11px; font-weight: 800; }

  /* Checkbox circle */
  .bp-check {
    position: absolute; top: 6px; right: 6px; width: 16px; height: 16px;
    border: 2px solid #ddd; border-radius: 50%;
  }
  .bp-cell.free .bp-check { border-color: rgba(251,175,51,0.4); }

  .bp-instructions {
    text-align: center; padding: 0 32px 16px; font-family: 'DM Mono', monospace;
    font-size: 10px; color: #888; font-weight: 500; line-height: 1.5;
    text-transform: uppercase; letter-spacing: 0.5px;
  }

  .bp-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px; border-top: 2px solid #f4f4f4;
  }
  .bp-footer-left { display: flex; align-items: center; gap: 10px; margin-left: 8px; }
  .bp-footer-logo { height: 24px; width: auto; object-fit: contain; }
  .bp-footer-brand {
    font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 700;
    color: #999; text-transform: uppercase; letter-spacing: 1px;
  }
  .bp-footer-right {
    font-family: 'DM Mono', monospace; font-size: 9px; color: #bbb;
    font-weight: 500; letter-spacing: 1px; text-transform: uppercase; margin-right: 8px;
  }

  /* ── PRINT RULES ── */
  @media print {
    body { background: #fff !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .controls-wrapper, .loader { display: none !important; }
    .page-wrap { padding: 0; background: none !important; border: none !important; }
    .bingo-page { box-shadow: none !important; border: none !important; border-radius: 0; }
    .bp-grid { border: 2px solid #000; gap: 2px; background: #000; }
    .bp-cell { background: #fff !important; }
    .bp-cell.free { background: rgba(251,175,51,0.2) !important; }
    @page { margin: 10mm; size: A4 portrait; }
  }

  /* ── MOBILE ── */
  @media(max-width: 640px) {
    .bingo-page { width: 100%; }
    .bp-title { font-size: 42px; }
    .bp-name { font-size: 28px; }
    .bp-cell-emoji { font-size: 24px; }
    .bp-cell-text { font-size: 7px; }
    .bp-cell.free .bp-cell-emoji { font-size: 28px; }
    .bp-cell.free .bp-cell-text { font-size: 8px; }
  }
</style>
</head>
<body>

<div class="loader" id="loader"><div class="loader-spin"></div></div>

<div class="controls-wrapper">
  <div class="controls" id="controls">
    <div class="ctrl-header">
      <h1>🎯 SLEIGH SPOTTER <span>BINGO</span></h1>
      <p>Randomised bingo cards for kids waiting at the window — every print is different!</p>
    </div>

    <div class="field">
      <label>Child's Name (optional)</label>
      <input type="text" id="childName" placeholder="e.g. Sophie" maxlength="30">
    </div>

    <div class="btn-row">
      <button class="btn btn-gold" onclick="generate()">🔀 New Card</button>
      <button class="btn btn-ghost" onclick="window.print()">🖨 Print</button>
    </div>

    <div class="info-text">Spot it, tick the circle, shout BINGO!</div>
  </div>
</div>

<div class="page-wrap" id="pageWrap"></div>

<script>
const API = new URLSearchParams(location.search).get('api') || '';
let CFG = { logo:'', sleighName:'Santa Sleigh' };

/* ══════════════════════════════════════════════════════════════
   BINGO ITEMS — Each has an emoji and a label.
   The grid picks 24 random items + 1 free space = 25 cells.
   Add or remove items here to customise what can appear.
   ══════════════════════════════════════════════════════════════ */

const ITEMS = [
  { emoji:'🎅', text:'Santa Waving' },
  { emoji:'🦌', text:'Reindeer Antlers' },
  { emoji:'🛷', text:'The Sleigh' },
  { emoji:'💡', text:'Flashing Lights' },
  { emoji:'🎵', text:'Christmas Music' },
  { emoji:'🔔', text:'Sleigh Bells' },
  { emoji:'🧝', text:'An Elf' },
  { emoji:'🪣', text:'Bucket Collector' },
  { emoji:'🎁', text:'Presents on Sleigh' },
  { emoji:'⭐', text:'A Star' },
  { emoji:'🎄', text:'Christmas Tree' },
  { emoji:'❄️', text:'Snowflakes' },
  { emoji:'📸', text:'Someone Taking a Photo' },
  { emoji:'🧣', text:'A Scarf' },
  { emoji:'🎶', text:'Singing Along' },
  { emoji:'👋', text:'Wave at Santa' },
  { emoji:'🏠', text:'Decorated House' },
  { emoji:'🕯️', text:'Candle in a Window' },
  { emoji:'🧤', text:'Gloves or Mittens' },
  { emoji:'🌟', text:'Something Sparkly' },
  { emoji:'📣', text:'PA Announcement' },
  { emoji:'🐕', text:'A Dog Watching' },
  { emoji:'👶', text:'A Baby in a Pram' },
  { emoji:'🍬', text:'Candy Cane' },
  { emoji:'☕', text:'Hot Chocolate' },
  { emoji:'🎀', text:'A Red Ribbon' },
  { emoji:'🧸', text:'A Teddy Bear' },
  { emoji:'🌙', text:'The Moon' },
  { emoji:'🔦', text:'A Torch or Light' },
  { emoji:'🧥', text:'A Big Winter Coat' },
  { emoji:'🎉', text:'Someone Cheering' },
  { emoji:'📱', text:'Phone Torch Waving' },
  { emoji:'🪟', text:'Face in a Window' },
  { emoji:'🚗', text:'Car Following Sleigh' },
  { emoji:'🎿', text:'Something Red' },
  { emoji:'⛄', text:'A Snowman' },
  { emoji:'🦺', text:'A Hi-Vis Jacket' },
  { emoji:'🔊', text:'Jingle Bells Song' },
  { emoji:'🫣', text:'Someone Peeking Out' },
  { emoji:'🥕', text:'Rudolph\'s Red Nose' }
];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

async function init() {
  if (API) {
    try {
      const res = await fetch(API);
      const data = await res.json();
      const s = data.settings || {};
      CFG.logo = s.logo_overlay_url || '';
      CFG.sleighName = s.sleigh_display_name || 'Santa Sleigh';
    } catch(e) {}
  }
  document.getElementById('loader').classList.add('done');
  generate();
}

function generate() {
  const name = document.getElementById('childName').value.trim();
  const logoHtml = CFG.logo ? `<img class="bp-footer-logo" src="${CFG.logo}" alt="">` : '';

  const nameHtml = name
    ? `<div class="bp-name">${name}'s Bingo Card</div>`
    : `<div class="bp-name empty">My Bingo Card</div>`;

  // Pick 24 random items
  const picked = shuffle(ITEMS).slice(0, 24);

  // Insert free space at center (index 12 in a 5x5 grid)
  picked.splice(12, 0, { emoji:'⭐', text:'Free Space', free: true });

  // Build grid cells
  const cellsHtml = picked.map(item => {
    const freeClass = item.free ? ' free' : '';
    return `<div class="bp-cell${freeClass}">
      <div class="bp-check"></div>
      <div class="bp-cell-emoji">${item.emoji}</div>
      <div class="bp-cell-text">${item.text}</div>
    </div>`;
  }).join('');

  document.getElementById('pageWrap').innerHTML = `
    <div class="bingo-page">
      <div class="bp-header">
        <div class="bp-title">Sleigh Spotter Bingo!</div>
        <div class="bp-subtitle">Can you spot them all?</div>
      </div>
      ${nameHtml}
      <div class="bp-grid">${cellsHtml}</div>
      <div class="bp-instructions">Spot each item as Santa passes — tick the circle when you see it. Five in a row = BINGO!</div>
      <div class="bp-footer">
        <div class="bp-footer-left">
          ${logoHtml}
          <span class="bp-footer-brand">${CFG.sleighName}</span>
        </div>
        <div class="bp-footer-right">Every card is unique!</div>
      </div>
    </div>
  `;
}

document.getElementById('childName').addEventListener('input', generate);
init();
</script>
</body>
</html>
