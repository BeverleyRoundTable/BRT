<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TurboSanta | Crew Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1D1D1A;
    --surface: #262622;
    --surface-2: #2f2f2a;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f0;
    --text-dim: rgba(255,255,255,0.5);
    --gold: #FBAF33;
    --gold-dim: rgba(251,175,51,0.15);
    --red: #d31c1c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Open Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .app { max-width: 600px; margin: 0 auto; padding: 32px 24px 64px; }

  header { text-align: center; margin-bottom: 32px; }

  header h1 {
    font-size: 2em; 
    font-weight: 800; 
    color: #FBAF33;   
    -webkit-background-clip: initial; 
    -webkit-text-fill-color: initial;
  }

  header p { 
    color: #FFFFFF; 
    margin-top: 6px; 
    font-size: 0.9em; 
    opacity: 0.8;   
  }

  /* ── CREW ALERT BANNER ── */
  .crew-alert {
    display: none;
    background: var(--red);
    border-radius: 12px;
    padding: 14px 18px;
    margin-bottom: 20px;
    animation: alertPulse 1.5s infinite;
  }
  .crew-alert.active { display: flex; align-items: center; gap: 12px; }
  @keyframes alertPulse {
    0%, 100% { opacity: 1; } 50% { opacity: 0.85; }
  }
  .crew-alert-icon { font-size: 1.4em; flex-shrink: 0; }
  .crew-alert-text { font-size: 0.95em; font-weight: 700; color: #fff; line-height: 1.4; }
  .crew-alert-label {
    font-size: 0.65em; font-weight: 800; text-transform: uppercase;
    letter-spacing: 0.1em; color: rgba(255,255,255,0.75); display: block; margin-bottom: 2px;
  }

  /* ── TABS ── */
  .format-row {
    display: flex; gap: 8px; margin-bottom: 24px; justify-content: center;
  }

  .format-btn {
    font-family: 'Open Sans', sans-serif; font-size: 0.85em; font-weight: 700;
    padding: 10px 10px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface-2); color: var(--text-dim); cursor: pointer;
    transition: 0.2s; flex: 1; text-align: center; max-width: 200px;
  }

  .format-btn:hover { border-color: var(--gold); color: var(--text); }
  .format-btn.active { border-color: var(--gold); background: var(--gold-dim); color: var(--gold); }

  /* ── PANELS & FIELDS ── */
  .section { display: none; }
  .section.active { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

  .panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 24px; margin-bottom: 20px;
  }

  .panel h3 {
    font-size: 0.82em; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--gold); margin-bottom: 16px;
  }

  .field { margin-bottom: 16px; }

  .field label {
    display: block; font-size: 0.75em; font-weight: 700;
    color: var(--text-dim); text-transform: uppercase;
    letter-spacing: 0.05em; margin-bottom: 6px;
  }

  .field input, .field select {
    width: 100%; background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px; color: var(--text);
    font-family: 'Open Sans', sans-serif; font-size: 0.95em; outline: none;
    transition: 0.2s;
  }

  .field input:focus, .field select:focus { border-color: var(--gold); }
  .field select option { background: var(--surface-2); color: var(--text); }

  /* ── AGREEMENTS ── */
  .agreement-item { display: flex; align-items: flex-start; margin-bottom: 12px; }
  .agreement-item input { width: 18px; height: 18px; margin-right: 10px; margin-top: 2px; accent-color: var(--gold); cursor: pointer; }
  .agreement-item label { text-transform: none; letter-spacing: normal; font-size: 0.85em; color: var(--text); font-weight: 400; cursor: pointer; margin-bottom: 0; line-height: 1.4; }
  
  /* ── BUTTONS ── */
  .btn-row { display: flex; gap: 10px; margin-top: 24px; }
  .btn {
    width: 100%; font-family: 'Open Sans', sans-serif; font-weight: 700; font-size: 0.95em;
    border: none; border-radius: 10px; padding: 14px 24px; cursor: pointer;
    transition: 0.2s;
  }
  .btn:active { transform: scale(0.98); }
  .btn-gold { background: linear-gradient(135deg, var(--gold), #e89a1d); color: #1a1000; }
  .btn-gold:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── CHECKLIST & ROSTER ── */
  .check-item {
    display: flex; align-items: center; padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }
  .check-item:last-child { border-bottom: none; }
  .check-item input[type="checkbox"] {
    width: 22px; height: 22px; margin-right: 14px; cursor: pointer;
    accent-color: var(--gold);
  }
  .check-item label {
    font-size: 0.95em; color: var(--text); font-weight: 600;
    margin: 0; cursor: pointer; flex: 1;
  }

  .vol-card {
    background: var(--surface-2); border-left: 4px solid var(--gold);
    border-radius: 8px; padding: 14px 16px; margin-bottom: 12px;
  }
  .vol-card strong { display: block; font-size: 1.05em; color: var(--gold); margin-bottom: 2px;}
  .vol-card span { font-size: 0.85em; color: var(--text-dim); }

  /* ── LOADING & STATUS ── */
  .status { text-align: center; padding: 40px; color: var(--text-dim); font-size: 0.9em; }
  .spinner {
    width: 32px; height: 32px; border: 3px solid var(--border);
    border-top-color: var(--gold); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg { text-align: center; padding: 60px 24px; color: #ff6b6b; }
  .error-msg code { background: var(--surface); padding: 4px 10px; border-radius: 6px; }

</style>
</head>
<body>

<div class="app">
  <header>
    <h1>🎅 Crew Hub</h1>
    <p>Volunteer tools & live operations</p>
  </header>

  <div id="initArea">
    <div class="status"><div class="spinner"></div>Connecting to TurboSanta API...</div>
  </div>

  <div id="mainApp" style="display: none;">

    <!-- ── CREW ALERT BANNER — always visible above tabs ── -->
    <div id="crewAlertBanner" class="crew-alert">
      <div class="crew-alert-icon">🔔</div>
      <div class="crew-alert-text">
        <span class="crew-alert-label">Message from Lead Elf</span>
        <span id="crewAlertText"></span>
      </div>
    </div>
    
    <div class="format-row">
      <button class="format-btn active" data-target="signup" onclick="switchTab(this)">📝 Sign Up</button>
      <button class="format-btn" data-target="qr" onclick="switchTab(this)">📱 QR Code</button>
      <button class="format-btn" data-target="ops" onclick="switchTab(this)">🛠️ Ops</button>
    </div>

    <div id="signup" class="section active">
      <div class="panel">
        <h3>Join a Route</h3>
        <form id="signupForm" onsubmit="submitVolunteer(event)">
          <div class="field">
            <label>Select Route & Date</label>
            <select id="routeSelect" required>
              <option value="">Loading routes...</option>
            </select>
          </div>
          <div class="field">
            <label>Full Name</label>
            <input type="text" id="volName" required placeholder="e.g. John Smith">
          </div>
          <div class="field">
            <label>Preferred Role</label>
            <select id="volRole" required>
              <option value="">Select a role...</option>
              <option value="Driver">Driver</option>
              <option value="Collections">Collections</option>
              <option value="Lead Elf">Lead Elf</option>
              <option value="Santa">Santa</option>
              <option value="Tech/GPS">Tech/GPS</option>
              <option value="Safety Walkers">Safety Walkers</option>
            </select>
          </div>
          <div class="field">
            <label>Phone Number (For the night)</label>
            <input type="tel" id="volPhone" required placeholder="07...">
          </div>

          <div class="field">
            <label>Organisation (Optional)</label>
            <input type="text" id="volOrg" placeholder="e.g. Scouts, Round Table, or leave blank">
          </div>

          <div class="field" style="margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border);">
            <label style="color: var(--gold);">Volunteer Agreement</label>
            
            <div class="agreement-item">
              <input type="checkbox" id="agree1" required>
              <label for="agree1">I agree to actively participate in collections and follow the safety instructions and guidance provided by the Lead Elf.</label>
            </div>
          </div>
          
          <div class="btn-row">
            <button type="submit" id="submitBtn" class="btn btn-gold">Sign Up Now</button>
          </div>
        </form>
      </div>
    </div>

    <div id="qr" class="section">
      <div class="panel" style="text-align: center;">
        <h3>Street Collection Tool</h3>
        <p style="font-size: 0.9em; color: var(--text-dim); margin-bottom: 20px;">
          Use this to quickly take digital donations on the move.
        </p>
        
        <button onclick="openFullQR()" class="btn btn-gold" style="box-shadow: 0 4px 15px rgba(251,175,51,0.4);">
          ⚡ Open Full-Screen QR
        </button>
      </div>
    </div>

    <div id="ops" class="section">
      <div class="panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
          <h3 style="margin-bottom: 0;">Tonight's Setup</h3>
          <button id="refreshBtn" onclick="loadRouteData()" style="display: none; background: var(--surface-2); border: 1px solid var(--border); color: var(--gold); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.85em; font-weight: bold; transition: 0.2s;">
            🔄 Refresh
          </button>
        </div>
        <div class="field" style="margin-bottom: 0;">
          <label>Select Route to Manage</label>
          <select id="opsRouteSelect" onchange="loadRouteData()">
            <option value="">Loading routes...</option>
          </select>
        </div>
      </div>

      <div id="opsContent" style="display:none;">
        <div class="panel">
          <h3>Pre-Departure Checklist</h3>
          <div id="checklistContainer">
            </div>
        </div>

        <div class="panel">
          <h3>Tonight's Crew</h3>
          <div id="crewContainer">
            </div>
        </div>
      </div>
    </div>

  </div>
</div>

<div id="qrModal" style="display:none; position:fixed; inset:0; background:#ffffff; z-index:9999; flex-direction:column; align-items:center; justify-content:center; padding:20px; text-align: center;">
  <h2 style="color:#000; font-weight:900; margin-bottom:10px; font-size:2.2em; text-transform:uppercase;">Donate Here</h2>
  <p style="color:#333; font-weight:700; margin-bottom:30px; font-size:1.1em;">Scan with your phone camera</p>
  <img id="qrImage" src="" style="width: 80vw; max-width: 350px; aspect-ratio: 1/1; margin-bottom: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); border-radius: 12px; border: 4px solid #fff;">
  <button onclick="document.getElementById('qrModal').style.display='none'" style="background:#1D1D1A; color:#fff; padding:16px 40px; border-radius:12px; font-size:1.1em; font-weight:bold; border:none; cursor:pointer; width: 80%; max-width: 300px;">Close / Back to Hub</button>
</div>

<script>
const API = new URLSearchParams(location.search).get('api') || '';
let globalDonateUrl = "";

document.addEventListener("DOMContentLoaded", () => {
  if (!API) {
    document.getElementById('initArea').innerHTML = 
      '<div class="error-msg">Missing <strong>?api=</strong> parameter.<br><br>Usage: <code>crew.html?api=YOUR_API_URL</code></div>';
  } else {
    init();
  }
});

async function init() {
  try {
    const res = await fetch(`${API}?function=getRoutes`);
    const data = await res.json();
    
    if(!data.routes) throw new Error("Invalid API response");

    globalDonateUrl = data.settings?.donate_url || "";

    // ── CREW ALERT: read on init and start polling ──
    updateCrewAlertBanner(data.settings?.crew_alert || '');
    setInterval(pollCrewAlert, 30000);

    populateRouteDropdowns(data.routes);
    
    document.getElementById('initArea').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
  } catch(e) {
    document.getElementById('initArea').innerHTML = 
      `<div class="error-msg">Connection Failed: ${e.message}</div>`;
  }
}

// ── CREW ALERT FUNCTIONS ──

function updateCrewAlertBanner(msg) {
  const banner = document.getElementById('crewAlertBanner');
  const text = document.getElementById('crewAlertText');
  if (!banner || !text) return;
  if (msg && msg.trim() !== '') {
    text.textContent = msg.trim();
    banner.classList.add('active');
  } else {
    banner.classList.remove('active');
  }
}

async function pollCrewAlert() {
  if (document.visibilityState !== 'visible') return;
  try {
    const res = await fetch(`${API}?function=getRoutes`);
    const data = await res.json();
    updateCrewAlertBanner(data.settings?.crew_alert || '');
  } catch(e) { /* silent fail — don't disrupt the crew */ }
}

// ── QR LOGIC ──
function openFullQR() {
  if (!globalDonateUrl) {
    alert("No donation URL is set in your Settings sheet!");
    return;
  }
  document.getElementById('qrImage').src = `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${encodeURIComponent(globalDonateUrl)}`;
  document.getElementById('qrModal').style.display = 'flex';
}

async function switchTab(btn) {
  const target = btn.dataset.target;
  
  if (target === "ops") {
    let secret = sessionStorage.getItem('opsSecret');
    
    if (!secret) {
      secret = prompt("🎅 Operations Authorization Required\n\nEnter the Master Password:");
      if (!secret) return; 
      
      const originalText = btn.innerText;
      btn.innerText = "Verifying...";
      
      try {
        const sep = API.includes('?') ? '&' : '?';
        const check = await fetch(`${API}${sep}function=verifyGodMode&secret=${encodeURIComponent(secret)}`);
        const result = await check.json();
        
        if (!result.valid) {
          alert("❌ Access Denied. Incorrect Password.");
          btn.innerText = originalText;
          return;
        }
        
        sessionStorage.setItem('opsSecret', secret);
      } catch(e) {
        alert("❌ Connection failed.");
        btn.innerText = originalText;
        return;
      }
      btn.innerText = originalText;
    }
  }

  document.querySelectorAll('.format-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  
  btn.classList.add('active');
  document.getElementById(target).classList.add('active');
}

function populateRouteDropdowns(routes) {
  const dropdowns = [document.getElementById('routeSelect'), document.getElementById('opsRouteSelect')];
  
  dropdowns.forEach(dropdown => {
    dropdown.innerHTML = '<option value="">-- Choose a Route --</option>';
    routes.forEach(route => {
      if(route.routeName && route.date) {
        const d = new Date(route.date);
        const friendlyDate = d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
        
        const option = document.createElement('option');
        option.value = route.routeName;
        option.textContent = `${route.routeName} — ${friendlyDate}`;
        dropdown.appendChild(option);
      }
    });
  });
}

async function submitVolunteer(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  btn.innerText = "Submitting...";
  btn.disabled = true;

  const payload = {
    action: "registerVolunteer",
    routeName: document.getElementById('routeSelect').value,
    name: document.getElementById('volName').value,
    role: document.getElementById('volRole').value,
    phone: document.getElementById('volPhone').value,
    organisation: document.getElementById('volOrg').value
  };

  try {
    await fetch(API, { method: "POST", body: JSON.stringify(payload) });
    alert("🎉 Thanks for signing up! You've been added to the roster.");
    document.getElementById('signupForm').reset();
  } catch (err) {
    alert("Something went wrong. Please check your connection and try again.");
  } finally {
    btn.innerText = "Sign Up Now";
    btn.disabled = false;
  }
}

async function loadRouteData() {
  const routeName = document.getElementById('opsRouteSelect').value;
  const contentDiv = document.getElementById('opsContent');
  const refreshBtn = document.getElementById('refreshBtn'); 
  
  if (!routeName) {
    contentDiv.style.display = 'none';
    refreshBtn.style.display = 'none'; 
    return;
  }
  
  contentDiv.style.display = 'block';
  refreshBtn.style.display = 'block'; 
  
  document.getElementById('checklistContainer').innerHTML = '<div class="status"><div class="spinner"></div></div>';
  document.getElementById('crewContainer').innerHTML = '<div class="status"><div class="spinner"></div></div>';

  try {
    const [checklistRes, volRes] = await Promise.all([
      fetch(`${API}?function=getChecklist&route=${routeName}`),
      fetch(`${API}?function=getVolunteers&route=${routeName}`)
    ]);

    const checklistPayload = await checklistRes.json();
    const volData = await volRes.json();

    renderChecklist(routeName, checklistPayload.tasks, checklistPayload.data);
    renderCrew(volData);
  } catch (e) {
    document.getElementById('checklistContainer').innerHTML = `<p style="color:#ff6b6b">Error loading data.</p>`;
    document.getElementById('crewContainer').innerHTML = ``;
  }
}

function renderChecklist(routeName, tasks, data) {
  const container = document.getElementById('checklistContainer');
  container.innerHTML = "";

  if (!tasks || tasks.length === 0) {
    container.innerHTML = "<p>No checklist items found in sheet.</p>";
    return;
  }

  tasks.forEach(item => {
    const isChecked = data[item] === true || data[item] === "TRUE" || data[item] === "true";
    const id = `chk_${item.replace(/\s+/g, '')}`;
    
    const div = document.createElement('div');
    div.className = 'check-item';
    div.innerHTML = `
      <input type="checkbox" id="${id}" ${isChecked ? 'checked' : ''} 
             onchange="updateChecklistItem('${routeName}', '${item}', this.checked)">
      <label for="${id}">${item}</label>
    `;
    container.appendChild(div);
  });
}

async function updateChecklistItem(routeName, item, isChecked) {
  const secret = sessionStorage.getItem('opsSecret') || '';
  const payload = {
    action: "updateChecklist",
    routeName: routeName,
    item: item,
    value: isChecked,
    secret: secret
  };

  try {
    const response = await fetch(API, { method: "POST", body: JSON.stringify(payload) });
    const result = await response.json();
    if(!result.ok) {
        alert("Blocked: " + result.error);
        document.getElementById(`chk_${item.replace(/\s+/g, '')}`).checked = !isChecked;
    }
  } catch (err) {
    console.error("Failed to update checklist", err);
    alert("Failed to save. Check your connection.");
  }
}

function renderCrew(volunteers) {
  const container = document.getElementById('crewContainer');
  container.innerHTML = "";

  if (!volunteers || volunteers.length === 0) {
    container.innerHTML = '<p style="color:var(--text-dim); font-size:0.9em;">No volunteers signed up yet.</p>';
    return;
  }

  volunteers.forEach(vol => {
    const div = document.createElement('div');
    div.className = 'vol-card';
    
    const name = vol["Volunteer Name"] || "Unknown";
    const role = vol["Role"] || "Volunteer";
    const phone = vol["Phone Number"] || "No number";
    const status = vol["Check-in Status"] || "Pending";
    const routeName = vol["RouteName"];

    const btnStyle = status === "Checked In" 
      ? "background: #28a745; color: white; border: none; padding: 4px 8px; border-radius: 4px; font-size: 0.8em; cursor: default;" 
      : "background: var(--surface); color: var(--gold); border: 1px solid var(--gold); padding: 4px 8px; border-radius: 4px; font-size: 0.8em; cursor: pointer;";
    
    const btnText = status === "Checked In" ? "✅ Here" : "Tap to Check-in";
    const disabledAttr = status === "Checked In" ? "disabled" : "";

    const orgBadge = vol["Organisation"] ? `<span style="background: var(--gold-dim); color: var(--gold); padding: 2px 6px; border-radius: 4px; font-size: 0.75em; margin-left: 6px;">${vol["Organisation"]}</span>` : "";

    div.innerHTML = `
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <div>
          <strong>${name}${orgBadge}</strong>
          <span>${role}  ·  📞 ${phone}</span>
        </div>
        <button style="${btnStyle}" ${disabledAttr} onclick="checkInVolunteer(this, '${routeName}', '${name}', '${role}')">${btnText}</button>
      </div>
    `;
    container.appendChild(div);
  });
}

async function checkInVolunteer(btn, routeName, volName, role) {
  let bucketNumber = "";

  if (role.toLowerCase().includes("collect")) {
    bucketNumber = prompt(`Assign a Bucket Number for ${volName}:`);
    if (bucketNumber === null) return; 
  }

  btn.innerText = "⏳...";
  const secret = sessionStorage.getItem('opsSecret') || '';
  
  const payload = {
    action: "checkIn",
    routeName: routeName,
    name: volName,
    bucket: bucketNumber,
    secret: secret
  };

  try {
    const response = await fetch(API, { method: "POST", body: JSON.stringify(payload) });
    const result = await response.json();
    
    if(!result.ok) {
        alert("Blocked: " + result.error);
        btn.innerText = "Tap to Check-in";
        return;
    }
    
    btn.innerText = "✅ Here" + (bucketNumber ? ` (#${bucketNumber})` : "");
    btn.style.background = "#28a745";
    btn.style.color = "white";
    btn.style.border = "none";
    btn.disabled = true;
    
    const infoSpan = btn.parentElement.querySelector('span');
    if (bucketNumber) infoSpan.innerText += `  ·  🪣 Bucket: ${bucketNumber}`;

  } catch (err) {
    alert("Failed to check in. Try again.");
    btn.innerText = "Tap to Check-in";
  }
}
</script>
</body>
</html>
