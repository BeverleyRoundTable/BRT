<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Santa’s Been Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    padding: 16px;
    font-family: 'Open Sans', sans-serif;
    background: transparent;
    text-align: center;
    -webkit-font-smoothing: antialiased;
  }

  .card {
    background: rgba(29, 29, 26, 0.95);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-radius: 22px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    padding: 24px 20px 28px;
    box-shadow:
      0 6px 20px rgba(0,0,0,0.35),
      inset 0 1px 0 rgba(255,255,255,0.05);
    max-width: 720px;
    margin: 0 auto;
  }
  
  .card h2 {
    color: #FFFFFF;
    margin-top: 0;
    margin-bottom: 8px;
    font-weight: 800;
    letter-spacing: -0.02em;
  }

  .helper-text {
    font-size: 0.85rem;
    color: #FFFFFF;
    opacity: 0.85;
    margin-top: 6px;
  }

  .upload-label {
    display: inline-block;
    margin: 12px auto;
    padding: 12px 24px;
    border-radius: 999px;
    background: #2f2f2a;
    border: 1px solid rgba(255, 255, 255, 0.08);
    cursor: pointer;
    font-weight: 700;
    color: #FFFFFF;
    transition: all 0.2s ease;
  }

  .upload-label:active {
    transform: scale(0.96);
  }

  .upload-label input {
    display: none;
  }
  
  .upload-label:focus-within {
    border-color: #FBAF33;
    box-shadow: 0 0 0 3px rgba(251, 175, 51, 0.2);
  }

  button {
    height: 42px;
    padding: 0 26px;
    border-radius: 999px;
    border: none;
    background: #FBAF33;
    color: #000000;
    font-weight: 800;
    font-family: inherit;
    font-size: 0.95em;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
  }

  button:active:not(:disabled) {
    transform: scale(0.96);
  }

  button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    background: #2f2f2a;
    color: rgba(255, 255, 255, 0.5);
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: none;
  }

  /* Actions row */
  .actions {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    gap: 14px;
    margin-top: 20px;
  }

  #download {
    display: none;
  }

  .actions a {
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    height: 42px;
    padding: 0 24px;
    border-radius: 999px;
    background: #2f2f2a;
    border: 1px solid rgba(255, 255, 255, 0.08);
    color: #FFFFFF;
    font-weight: 700;
    font-size: 0.9em;
    text-decoration: none;
    transition: all 0.2s ease;
    cursor: pointer;
  }

  .actions a:active {
    transform: scale(0.96);
  }

  canvas {
    display: none;
  }

  @keyframes santaGlow {
    0% {
      box-shadow:
        0 6px 20px rgba(0,0,0,0.35),
        inset 0 1px 0 rgba(255,255,255,0.05),
        0 0 0 rgba(251, 175, 51, 0);
    }
    50% {
      box-shadow:
        0 6px 20px rgba(0,0,0,0.35),
        inset 0 1px 0 rgba(255,255,255,0.05),
        0 0 28px rgba(251, 175, 51, 0.35);
    }
    100% {
      box-shadow:
        0 6px 20px rgba(0,0,0,0.35),
        inset 0 1px 0 rgba(255,255,255,0.05),
        0 0 0 rgba(251, 175, 51, 0);
    }
  }

  .card.success {
    animation: santaGlow 1.4s ease-out;
  }

  @keyframes buttonPulse {
    0%   { transform: scale(1); box-shadow: 0 0 0 rgba(251, 175, 51, 0.0); }
    50%  { transform: scale(1.04); box-shadow: 0 0 22px rgba(251, 175, 51, 0.6); }
    100% { transform: scale(1); box-shadow: 0 0 0 rgba(251, 175, 51, 0.0); }
  }

  button.success {
    animation: buttonPulse 0.9s ease-out;
  }

</style>
</head>

<body>

<div class="card">
  <h2>🎅 Santa’s Been!</h2>

  <label class="upload-label">
  📸 Upload your photo
  <input id="photoInput" type="file" accept="image/*">
</label>

<p class="helper-text">
  Stand in the middle — Santa will do the rest 🎄
</p>

<div class="actions">
  <button id="generateBtn" onclick="generate()" disabled>
    Create Image
  </button>

  <a id="download" download="santas_been.png">⬇ Download image</a>
</div>

<canvas id="canvas" width="1000" height="1000"></canvas>

<script>
const FRAME_SRC = "https://raw.githubusercontent.com/BeverleyRoundTable/BRT/main/santa_frame.png";

const FRAME = { x: 230, y: 230, size: 540 };

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
ctx.imageSmoothingQuality = "high";

const frameImg = new Image();
frameImg.crossOrigin = "anonymous";
frameImg.src = FRAME_SRC;

const photoInput = document.getElementById("photoInput");
const generateBtn = document.getElementById("generateBtn");
const downloadLink = document.getElementById("download");

photoInput.addEventListener("change", () => {
  generateBtn.disabled = !photoInput.files.length;
});

function generate(){
  if (!photoInput.files.length) return;

  generateBtn.disabled = true;
  generateBtn.textContent = "Creating image…";

  const photo = new Image();
  photo.onload = () => draw(photo);
  photo.src = URL.createObjectURL(photoInput.files[0]);
}
  
function drawTimestamp() {
  const date = new Date();
  const label =
    "Santa visited • " +
    date.toLocaleDateString("en-GB", {
      day: "numeric",
      month: "short"
    });

  ctx.save();

  // Ensuring Open Sans is used on the canvas export
  ctx.font = "600 22px 'Open Sans', sans-serif";
  ctx.textAlign = "right";
  ctx.textBaseline = "bottom";

  // subtle shadow for legibility
  ctx.shadowColor = "rgba(0,0,0,0.35)";
  ctx.shadowBlur = 4;

  ctx.fillStyle = "rgba(255,255,255,0.8)";
  ctx.fillText(label, 960, 960);

  ctx.restore();
}

function draw(photo){
  ctx.clearRect(0, 0, 1000, 1000);

  const INSET = 8;
  const NUDGE = 0.08;

  const srcSize = Math.min(photo.width, photo.height);
  const srcX = (photo.width - srcSize) / 2;
  const srcY = Math.max(0, (photo.height - srcSize) / 2 - srcSize * NUDGE);

  const destX = FRAME.x + INSET;
  const destY = FRAME.y + INSET;
  const destSize = FRAME.size - INSET * 2;

  // Soft printed-photo shadow
  ctx.save();
  ctx.shadowColor = "rgba(0,0,0,0.18)";
  ctx.shadowBlur = 14;
  ctx.shadowOffsetY = 6;

  ctx.drawImage(
    photo,
    srcX, srcY, srcSize, srcSize,
    destX, destY, destSize, destSize
  );

  ctx.restore();

  // Frame on top
  ctx.drawImage(frameImg, 0, 0, 1000, 1000);
  drawTimestamp();

    // Export
  downloadLink.href = canvas.toDataURL("image/png");

  // ⭐ Auto filename with date
  downloadLink.download =
    "santas_been_" +
    new Date().toISOString().slice(0, 10) +
    ".png";

  setTimeout(() => {
  downloadLink.style.display = "inline-flex";
  }, 150);

  generateBtn.disabled = false;
  generateBtn.textContent = "Create another image";

    // ✨ Success pulse
  const card = document.querySelector(".card");
  const btn  = document.getElementById("generateBtn");

  if (card) {
    card.classList.add("success");
    setTimeout(() => card.classList.remove("success"), 1500);
  }

  if (btn) {
    btn.classList.add("success");
    setTimeout(() => btn.classList.remove("success"), 900);
  }

  sendHeight(40); // 🔑 FORCE iframe resize after content change
}
  
/* ---------- iframe auto-height ---------- */
function sendHeight(extra = 0){
  const h = document.documentElement.scrollHeight + extra;
  parent.postMessage({ santasBeenHeight: h }, "*");
}

window.addEventListener("load", () => {
  sendHeight(30);
  setTimeout(() => sendHeight(30), 150);
  setTimeout(() => sendHeight(30), 350);
});

window.addEventListener("resize", () => sendHeight(30));

const observer = new MutationObserver(() => sendHeight(30));
observer.observe(document.body, { childList: true, subtree: true });
</script>

</body>
</html>
