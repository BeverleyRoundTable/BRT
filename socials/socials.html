<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BRT Social Asset Composer</title>
  <link href="https://fonts.googleapis.com/css2?family=Saira:wght@700;800;900&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --gold:#FBAF33; --gold-hover:#FFC358; --dark:#1D1D1A; --ink:#fff; --card:#26261f; --bg:#131310; --border:rgba(255,255,255,0.15); --dim:#a7a7a2; --muted:#75756e; --success:#6FCF97; --danger:#E85D5D; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Open Sans', sans-serif; background: var(--dark); color: var(--ink); padding: 40px 20px; display: flex; justify-content: center; }
    .container { width: 100%; max-width: 960px; display: grid; grid-template-columns: 1fr 340px; gap: 30px; }
    @media (max-width: 840px) { .container { grid-template-columns: 1fr; } }
    .preview-box { display: flex; flex-direction: column; align-items: center; gap: 15px; }
    .canvas-wrap { width: 100%; }
    canvas { max-width: 100%; height: auto; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); background: #000; touch-action: none; cursor: grab; }
    canvas.dragging { cursor: grabbing; }
    .controls-box { background: var(--card); padding: 22px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); height: fit-content; }
    h2 { font-family: 'Saira', sans-serif; text-transform: uppercase; margin-bottom: 18px; color: var(--gold); font-size: 20px; }
    h4 { font-family: 'Saira', sans-serif; font-size: 12px; font-weight: 800; color: var(--dim); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }
    .block { background: var(--bg); border-radius: 8px; padding: 14px; margin-bottom: 16px; }
    .block.flush { background: transparent; padding: 0; }
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: var(--dim); }
    input[type=text], select { width: 100%; padding: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: #fff; font: inherit; }
    select { cursor: pointer; }
    input[type=text]:focus, select:focus { outline: none; border-color: var(--gold); }
    .btn { display: inline-block; width: 100%; padding: 13px; background: var(--gold); color: var(--dark); border: 0; border-radius: 8px; font-weight: 800; text-transform: uppercase; cursor: pointer; font-family: 'Saira', sans-serif; letter-spacing: 0.05em; transition: transform 0.1s, background 0.15s; }
    .btn:hover { background: var(--gold-hover); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { background: var(--muted); cursor: not-allowed; opacity: 0.6; }
    .btn-secondary { background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.2); }
    .btn-secondary:hover { background: rgba(255,255,255,0.06); }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-tab { flex: 1; background: transparent; color: var(--dim); border: 1px solid var(--border); border-radius: 6px; padding: 8px 6px; font-family: 'Saira', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; cursor: pointer; }
    .btn-tab.active { background: var(--gold); color: var(--dark); border-color: var(--gold); }
    .source-tabs { display: flex; gap: 8px; margin-bottom: 14px; }
    .source-pane { display: none; }
    .source-pane.active { display: block; }
    .dropzone { border: 2px dashed var(--border); border-radius: 8px; padding: 24px 14px; text-align: center; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
    .dropzone:hover, .dropzone.dragging { border-color: var(--gold); background: rgba(255,255,255,0.03); }
    .dropzone .big { font-family: 'Saira', sans-serif; font-size: 15px; color: #fff; margin-bottom: 4px; }
    .dropzone p { color: var(--dim); font-size: 12px; }
    .dropzone input { display: none; }
    .slider-row { display: grid; grid-template-columns: 1fr auto; gap: 4px 10px; align-items: center; margin-bottom: 8px; }
    .slider-row .slabel { font-size: 12px; font-weight: 600; color: var(--dim); }
    .slider-row .sval { font-family: 'Courier New', monospace; font-size: 11px; color: var(--gold); font-weight: 700; min-width: 44px; text-align: right; }
    .slider-row input[type=range] { grid-column: 1 / -1; width: 100%; accent-color: var(--gold); margin: 0; }
    .block-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .block-head h4 { margin: 0; }
    .btn-reset { background: transparent; color: var(--muted); border: 1px solid var(--border); padding: 4px 10px; font-size: 10px; font-family: 'Saira', sans-serif; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; border-radius: 6px; }
    .btn-reset:hover { color: #fff; border-color: var(--dim); }
    .hint { color: var(--muted); font-size: 11px; line-height: 1.4; margin-bottom: 10px; }
    .status { font-size: 12px; padding: 8px 10px; border-radius: 6px; margin-top: 8px; display: none; }
    .status.show { display: block; }
    .status.info { background: rgba(255,255,255,0.05); color: var(--dim); }
    .status.ok { background: rgba(111,207,151,0.12); color: var(--success); }
    .status.err { background: rgba(232,93,93,0.12); color: var(--danger); }
    .draft-box { width: 100%; min-height: 120px; padding: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: #fff; font: inherit; font-size: 13px; line-height: 1.5; resize: vertical; white-space: pre-wrap; }
    .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--muted); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: -2px; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="container">
  <div class="preview-box">
    <div class="canvas-wrap"><canvas id="canvas" width="1080" height="1080"></canvas></div>
    <button class="btn" id="downloadBtn">Download Finished Image</button>
  </div>

  <div class="controls-box">
    <h2>Layout Composer</h2>

    <!-- EVENT PICKER (from sheet) -->
    <div class="block" id="pickerBlock" hidden>
      <h4>Load from Sheet</h4>
      <div class="form-group" style="margin-bottom:0;">
        <select id="eventPicker"><option value="">Loading events…</option></select>
      </div>
      <div class="status" id="pickerStatus"></div>
    </div>

    <div class="block flush">
      <div class="form-group"><label>Event Title</label><input type="text" id="fTitle"></div>
      <div class="form-group"><label>Date &amp; Time</label><input type="text" id="fDate"></div>
      <div class="form-group"><label>Location</label><input type="text" id="fLocation"></div>
    </div>

    <!-- IMAGE SOURCE -->
    <div class="block">
      <h4>Background Image</h4>
      <div class="source-tabs">
        <button class="btn-tab active" data-pane="provided">From event</button>
        <button class="btn-tab" data-pane="upload">Upload</button>
      </div>
      <div class="source-pane active" data-pane="provided">
        <button class="btn btn-secondary" id="swapSourceBtn">Swap Image Layer</button>
      </div>
      <div class="source-pane" data-pane="upload">
        <label for="imgUpload" class="dropzone" id="dropzone">
          <div class="big">Drop a photo here</div>
          <p>or click to choose from your device</p>
          <input type="file" id="imgUpload" accept="image/*">
        </label>
      </div>
    </div>

    <!-- IMAGE CROP -->
    <div class="block">
      <div class="block-head"><h4>Image Crop</h4><button class="btn-reset" id="imgReset" type="button">Reset</button></div>
      <p class="hint">Drag the image on the canvas to pan, scroll to zoom — or use the sliders.</p>
      <div class="slider-row"><span class="slabel">Scale</span><span class="sval" id="imgScaleVal">1.00×</span><input type="range" id="imgScale" min="0.5" max="3" step="0.01" value="1"></div>
      <div class="slider-row"><span class="slabel">X offset</span><span class="sval" id="imgXVal">0</span><input type="range" id="imgX" min="-800" max="800" step="1" value="0"></div>
      <div class="slider-row"><span class="slabel">Y offset</span><span class="sval" id="imgYVal">0</span><input type="range" id="imgY" min="-800" max="800" step="1" value="0"></div>
    </div>

    <!-- LOGO ADJUST -->
    <div class="block">
      <div class="block-head"><h4>Logo Adjust</h4><button class="btn-reset" id="logoReset" type="button">Reset</button></div>
      <div class="slider-row"><span class="slabel">Scale</span><span class="sval" id="logoScaleVal">1.00×</span><input type="range" id="logoScale" min="0.5" max="3" step="0.01" value="1"></div>
      <div class="slider-row"><span class="slabel">X offset</span><span class="sval" id="logoXVal">0</span><input type="range" id="logoX" min="-400" max="400" step="1" value="0"></div>
      <div class="slider-row"><span class="slabel">Y offset</span><span class="sval" id="logoYVal">0</span><input type="range" id="logoY" min="-400" max="400" step="1" value="0"></div>
    </div>

    <!-- TEXT GENERATION -->
    <div class="block" id="textBlock" hidden>
      <h4>Social Post Text</h4>
      <button class="btn" id="genTextBtn">Generate post text</button>
      <textarea class="draft-box" id="draftBox" placeholder="Generated text appears here — edit freely before saving." style="margin-top:10px;"></textarea>
      <button class="btn btn-secondary" id="saveDraftBtn" style="margin-top:8px;" hidden>Save to sheet</button>
      <div class="status" id="textStatus"></div>
    </div>

  </div>
</div>

<script>
  // ============================================================
  // CONFIG — backend URL from ?api=, token from ?token=
  // ============================================================
  var URL_PARAMS  = new URLSearchParams(window.location.search);
  var BACKEND_URL = URL_PARAMS.get('api') || 'https://script.google.com/macros/s/AKfycbzSNVYKw0BFib-d9ExtsMp2q_t74yeORr2XjyR947Um3Ns6nR2F0bJx2QRMhwQtah6s/exec';
  var SAVE_TOKEN  = URL_PARAMS.get('token') || null;
  var LOGO_URL    = 'https://raw.githubusercontent.com/BeverleyRoundTable/BRT/main/icons/BRTLogo.png';
  var FALLBACK_BG = 'https://img.freepik.com/free-vector/event-concept-illustration_114360-931.jpg';

  var imgArray = [URL_PARAMS.get('sheetImg'), URL_PARAMS.get('aiImg')].filter(Boolean);
  var currentImgIdx = 0;

  var canvas = document.getElementById('canvas');
  var ctx = canvas.getContext('2d');

  var el = {
    title: document.getElementById('fTitle'),
    date: document.getElementById('fDate'),
    loc: document.getElementById('fLocation'),
    download: document.getElementById('downloadBtn'),
    swap: document.getElementById('swapSourceBtn'),
    picker: document.getElementById('eventPicker'),
    draft: document.getElementById('draftBox')
  };

  // Pre-fill from pipeline link if present
  el.title.value = URL_PARAMS.get('title') || 'UPCOMING SOCIAL';
  el.date.value  = URL_PARAMS.get('date') || '';
  el.loc.value   = URL_PARAMS.get('loc') || '';

  var state = { logo: null, eventsByTitle: {} };
  var baseImg = new Image(); // no crossOrigin — Drive/Workspace sources don't send CORS headers

  // ============================================================
  // BACKEND HELPERS
  // ============================================================
  function backend(qs) {
    var sep = BACKEND_URL.indexOf('?') === -1 ? '?' : '&';
    return fetch(BACKEND_URL + sep + qs).then(function (r) { return r.json(); });
  }

  function setStatus(id, msg, kind, spin) {
    var s = document.getElementById(id);
    s.className = 'status show ' + (kind || 'info');
    s.innerHTML = spin ? '<span class="spinner"></span>' + msg : msg;
  }
  function clearStatus(id) { document.getElementById(id).className = 'status'; }

  // ============================================================
  // LOAD EVENT LIST FROM SHEET
  // ============================================================
  function loadEvents() {
    document.getElementById('pickerBlock').hidden = false;
    document.getElementById('textBlock').hidden = false;
    setStatus('pickerStatus', 'Loading events…', 'info', true);

    backend('action=events')
      .then(function (res) {
        if (!res.ok) throw new Error(res.error || 'Failed');
        var events = res.events || [];
        el.picker.innerHTML = '<option value="">— Pick an event —</option>';
        events.forEach(function (ev, i) {
          state.eventsByTitle[ev.title] = ev;
          var opt = document.createElement('option');
          opt.value = ev.title;
          opt.textContent = ev.title + (ev.dateText ? ' · ' + ev.dateText : '');
          el.picker.appendChild(opt);
        });
        clearStatus('pickerStatus');
        if (!events.length) setStatus('pickerStatus', 'No upcoming events found in the sheet.', 'info');
      })
      .catch(function (err) {
        setStatus('pickerStatus', 'Could not load events: ' + err.message + ' (CORS or backend issue)', 'err');
      });
  }

  el.picker.addEventListener('change', function () {
    var ev = state.eventsByTitle[el.picker.value];
    if (!ev) return;
    el.title.value = ev.title.replace(/[\u{1F000}-\u{1FFFF}\u{2600}-\u{27BF}]/gu, '').replace(/\s+/g, ' ').trim();
    el.date.value = ev.dateText || '';
    el.loc.value = ev.location || '';
    el.draft.value = ev.draft || '';
    document.getElementById('saveDraftBtn').hidden = !ev.draft;
    // Load the event's image into the provided slot
    imgArray = [ev.img].filter(Boolean);
    currentImgIdx = 0;
    resetImgSliders();
    setBaseImage(imgArray.length ? imgArray[0] : '');
    render();
  });

  // ============================================================
  // GENERATE TEXT (from site)
  // ============================================================
  document.getElementById('genTextBtn').addEventListener('click', function () {
    var title = el.title.value.trim();
    if (!title) { setStatus('textStatus', 'Enter an event title first.', 'err'); return; }
    var btn = document.getElementById('genTextBtn');
    btn.disabled = true;
    setStatus('textStatus', 'Generating with AI…', 'info', true);

    var qs = 'action=generate-text'
      + '&title=' + encodeURIComponent(title)
      + '&date='  + encodeURIComponent(el.date.value)
      + '&loc='   + encodeURIComponent(el.loc.value);

    backend(qs)
      .then(function (res) {
        if (!res.ok) throw new Error(res.error || 'Failed');
        el.draft.value = res.text || '';
        document.getElementById('saveDraftBtn').hidden = false;
        clearStatus('textStatus');
      })
      .catch(function (err) { setStatus('textStatus', 'Generation failed: ' + err.message, 'err'); })
      .finally(function () { btn.disabled = false; });
  });

  // ============================================================
  // SAVE DRAFT BACK TO SHEET (token-gated)
  // ============================================================
  document.getElementById('saveDraftBtn').addEventListener('click', function () {
    if (!SAVE_TOKEN) {
      setStatus('textStatus', 'No save token — open this site with ?token=… to enable saving.', 'err');
      return;
    }
    var title = el.title.value.trim();
    var text = el.draft.value;
    if (!title) { setStatus('textStatus', 'Need an event title to save against.', 'err'); return; }
    var btn = document.getElementById('saveDraftBtn');
    btn.disabled = true;
    setStatus('textStatus', 'Saving to sheet…', 'info', true);

    // Match against the original (possibly emoji'd) sheet title if we loaded from the picker
    var sheetTitle = title;
    Object.keys(state.eventsByTitle).forEach(function (t) {
      var stripped = t.replace(/[\u{1F000}-\u{1FFFF}\u{2600}-\u{27BF}]/gu, '').replace(/\s+/g, ' ').trim();
      if (stripped === title) sheetTitle = t;
    });

    var qs = 'action=save-draft'
      + '&token=' + encodeURIComponent(SAVE_TOKEN)
      + '&title=' + encodeURIComponent(sheetTitle)
      + '&text='  + encodeURIComponent(text);

    backend(qs)
      .then(function (res) {
        if (!res.ok) throw new Error(res.error || 'Failed');
        setStatus('textStatus', 'Saved to sheet ✓', 'ok');
        if (state.eventsByTitle[sheetTitle]) state.eventsByTitle[sheetTitle].draft = text;
      })
      .catch(function (err) { setStatus('textStatus', 'Save failed: ' + err.message, 'err'); })
      .finally(function () { btn.disabled = false; });
  });

  // ============================================================
  // IMAGE SOURCE
  // ============================================================
  function setBaseImage(url) { baseImg.src = url || FALLBACK_BG; }
  baseImg.onload = function () { render(); };
  baseImg.onerror = function () {
    ctx.fillStyle = '#131310'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#a7a7a2'; ctx.font = "600 30px 'Open Sans', sans-serif"; ctx.textAlign = 'center';
    ctx.fillText('Image blocked — try Swap or Upload', canvas.width / 2, canvas.height / 2);
    ctx.textAlign = 'left'; render(true);
  };

  document.querySelectorAll('.source-tabs .btn-tab').forEach(function (btn) {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.source-tabs .btn-tab').forEach(function (b) { b.classList.toggle('active', b === btn); });
      document.querySelectorAll('.source-pane').forEach(function (p) { p.classList.toggle('active', p.dataset.pane === btn.dataset.pane); });
    });
  });

  el.swap.addEventListener('click', function () {
    if (imgArray.length <= 1) return alert('Only one image source for this event. Use the Upload tab for your own photo.');
    currentImgIdx = (currentImgIdx + 1) % imgArray.length;
    resetImgSliders();
    setBaseImage(imgArray[currentImgIdx]);
  });

  var imgUpload = document.getElementById('imgUpload');
  var dropzone = document.getElementById('dropzone');
  imgUpload.addEventListener('change', function (e) { handleBgFile(e.target.files[0]); });
  ['dragover', 'dragenter'].forEach(function (ev) { dropzone.addEventListener(ev, function (e) { e.preventDefault(); dropzone.classList.add('dragging'); }); });
  ['dragleave', 'drop'].forEach(function (ev) { dropzone.addEventListener(ev, function (e) { e.preventDefault(); dropzone.classList.remove('dragging'); }); });
  dropzone.addEventListener('drop', function (e) { if (e.dataTransfer.files[0]) handleBgFile(e.dataTransfer.files[0]); });
  function handleBgFile(file) {
    if (!file || !file.type.startsWith('image/')) return;
    var reader = new FileReader();
    reader.onload = function () { resetImgSliders(); baseImg.src = reader.result; };
    reader.readAsDataURL(file);
  }

  // ============================================================
  // SLIDERS
  // ============================================================
  var SLIDER_FMT = {
    imgScale: function (v) { return Number(v).toFixed(2) + '×'; }, imgX: function (v) { return Math.round(v); }, imgY: function (v) { return Math.round(v); },
    logoScale: function (v) { return Number(v).toFixed(2) + '×'; }, logoX: function (v) { return Math.round(v); }, logoY: function (v) { return Math.round(v); }
  };
  var SLIDER_DEFAULTS = { imgScale: 1, imgX: 0, imgY: 0, logoScale: 1, logoX: 0, logoY: 0 };
  function readout(id) { var i = document.getElementById(id), o = document.getElementById(id + 'Val'); if (i && o) o.textContent = (SLIDER_FMT[id] || function (v) { return v; })(i.value); }
  function setSlider(id, v) { var i = document.getElementById(id); if (i) { i.value = v; readout(id); } }
  Object.keys(SLIDER_DEFAULTS).forEach(function (id) { var i = document.getElementById(id); i.addEventListener('input', function () { readout(id); render(); }); readout(id); });
  function resetImgSliders() { ['imgScale', 'imgX', 'imgY'].forEach(function (id) { setSlider(id, SLIDER_DEFAULTS[id]); }); }
  document.getElementById('imgReset').addEventListener('click', function () { resetImgSliders(); render(); });
  document.getElementById('logoReset').addEventListener('click', function () { ['logoScale', 'logoX', 'logoY'].forEach(function (id) { setSlider(id, SLIDER_DEFAULTS[id]); }); render(); });

  [el.title, el.date, el.loc].forEach(function (inp) { inp.addEventListener('input', function () { render(); }); });

  // ============================================================
  // RENDER
  // ============================================================
  function render(skipBg) {
    var W = canvas.width, H = canvas.height;
    if (!skipBg) ctx.clearRect(0, 0, W, H);
    if (!skipBg && baseImg.complete && baseImg.naturalWidth > 0) {
      drawImageCover(baseImg, W, H, parseFloat(document.getElementById('imgScale').value) || 1, parseInt(document.getElementById('imgX').value) || 0, parseInt(document.getElementById('imgY').value) || 0);
    }
    var grad = ctx.createLinearGradient(0, H * 0.5, 0, H);
    grad.addColorStop(0, 'rgba(0,0,0,0)'); grad.addColorStop(0.5, 'rgba(0,0,0,0.6)'); grad.addColorStop(1, 'rgba(0,0,0,0.95)');
    ctx.fillStyle = grad; ctx.fillRect(0, H * 0.5, W, H * 0.5);
    ctx.fillStyle = '#FBAF33'; ctx.fillRect(0, 0, 15, H);

    var pad = 60, cy = H - pad;
    ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
    ctx.font = "700 22px 'Saira', sans-serif"; ctx.fillStyle = '#FBAF33'; ctx.fillText('#DOMORE', pad, cy); cy -= 45;
    var metaText = [el.date.value, el.loc.value].filter(Boolean).join('  ·  ');
    if (metaText) { ctx.font = "600 28px 'Open Sans', sans-serif"; ctx.fillStyle = '#fff'; ctx.fillText(metaText, pad, cy); cy -= 55; }
    var words = (el.title.value || '').toUpperCase().split(' ').filter(Boolean);
    ctx.font = "900 75px 'Saira', sans-serif";
    if (words.length) {
      var first = words[0], rest = words.slice(1).join(' ');
      if (rest) { ctx.fillStyle = '#fff'; ctx.fillText(rest, pad + ctx.measureText(first + ' ').width, cy); }
      ctx.fillStyle = '#FBAF33'; ctx.fillText(first, pad, cy); cy -= 80;
    }
    ctx.font = "800 24px 'Saira', sans-serif"; ctx.fillStyle = '#fff'; ctx.fillText('BEVERLEY ROUND TABLE', pad, cy);
    drawLogo(W, H);
  }

  function drawImageCover(img, W, H, scale, offX, offY) {
    var ir = img.naturalWidth / img.naturalHeight, cr = W / H, sx, sy, sw, sh;
    if (ir > cr) { sh = img.naturalHeight; sw = img.naturalHeight * cr; sx = (img.naturalWidth - sw) / 2; sy = 0; }
    else { sw = img.naturalWidth; sh = img.naturalWidth / cr; sx = 0; sy = (img.naturalHeight - sh) / 2; }
    ctx.save(); ctx.translate(W / 2 + offX, H / 2 + offY); ctx.scale(scale, scale);
    ctx.drawImage(img, sx, sy, sw, sh, -W / 2, -H / 2, W, H); ctx.restore();
  }

  function drawLogo(W, H) {
    var logoSize = W * 0.13, margin = W * 0.05;
    var ls = parseFloat(document.getElementById('logoScale').value) || 1;
    var lx = parseInt(document.getElementById('logoX').value) || 0;
    var ly = parseInt(document.getElementById('logoY').value) || 0;
    var x = W - logoSize - margin, y = margin;
    var img = state.logo;
    if (img && img.complete && img.naturalWidth > 0) {
      var ratio = img.naturalWidth / img.naturalHeight;
      var dW = ratio > 1 ? logoSize : logoSize * ratio;
      var dH = ratio > 1 ? logoSize / ratio : logoSize;
      var ax = x + (logoSize - dW);
      ctx.save(); ctx.translate(ax + dW / 2 + lx, y + dH / 2 + ly); ctx.scale(ls, ls);
      ctx.drawImage(img, -dW / 2, -dH / 2, dW, dH); ctx.restore();
    } else {
      ctx.save(); ctx.translate(x + logoSize / 2 + lx, y + logoSize / 2 + ly); ctx.scale(ls, ls);
      ctx.fillStyle = '#FBAF33'; ctx.beginPath(); ctx.arc(0, 0, logoSize / 2, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#1D1D1A'; ctx.font = '800 ' + Math.round(logoSize * 0.42) + "px 'Saira', sans-serif";
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('RT', 0, logoSize * 0.02); ctx.restore();
    }
  }

  // ============================================================
  // DRAG / ZOOM
  // ============================================================
  (function () {
    var pointers = new Map(), dragStart = null, pinchStart = null;
    function cScale() { var r = canvas.getBoundingClientRect(); return r.width ? canvas.width / r.width : 1; }
    function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
    function pd(p) { return Math.hypot(p[1].x - p[0].x, p[1].y - p[0].y); }
    canvas.addEventListener('pointerdown', function (e) {
      if (!baseImg.complete) return;
      canvas.setPointerCapture(e.pointerId); pointers.set(e.pointerId, { x: e.clientX, y: e.clientY }); canvas.classList.add('dragging');
      if (pointers.size === 1) { dragStart = { sx: parseInt(document.getElementById('imgX').value, 10) || 0, sy: parseInt(document.getElementById('imgY').value, 10) || 0, px: e.clientX, py: e.clientY }; pinchStart = null; }
      else if (pointers.size === 2) { pinchStart = { dist: pd(Array.from(pointers.values())), scale: parseFloat(document.getElementById('imgScale').value) || 1 }; dragStart = null; }
    });
    canvas.addEventListener('pointermove', function (e) {
      if (!pointers.has(e.pointerId)) return;
      pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
      if (pointers.size === 1 && dragStart) {
        var s = cScale();
        setSlider('imgX', clamp(dragStart.sx + (e.clientX - dragStart.px) * s, -800, 800));
        setSlider('imgY', clamp(dragStart.sy + (e.clientY - dragStart.py) * s, -800, 800)); render();
      } else if (pointers.size === 2 && pinchStart) {
        setSlider('imgScale', clamp(pinchStart.scale * (pd(Array.from(pointers.values())) / pinchStart.dist), 0.5, 3)); render();
      }
    });
    function endP(e) {
      pointers.delete(e.pointerId);
      if (pointers.size === 0) { dragStart = null; pinchStart = null; canvas.classList.remove('dragging'); }
      else if (pointers.size === 1) { var rem = Array.from(pointers.values())[0]; dragStart = { sx: parseInt(document.getElementById('imgX').value, 10) || 0, sy: parseInt(document.getElementById('imgY').value, 10) || 0, px: rem.x, py: rem.y }; pinchStart = null; }
    }
    canvas.addEventListener('pointerup', endP); canvas.addEventListener('pointercancel', endP);
    canvas.addEventListener('wheel', function (e) {
      if (!baseImg.complete) return; e.preventDefault();
      var cur = parseFloat(document.getElementById('imgScale').value) || 1;
      var step = Math.abs(e.deltaY) > 50 ? 0.08 : 0.04;
      setSlider('imgScale', clamp(cur + (e.deltaY < 0 ? 1 : -1) * step, 0.5, 3)); render();
    }, { passive: false });
  })();

  // ============================================================
  // DOWNLOAD
  // ============================================================
  el.download.addEventListener('click', function () {
    try {
      var a = document.createElement('a');
      a.download = (el.title.value || 'brt').toLowerCase().replace(/\s+/g, '_') + '_social.png';
      a.href = canvas.toDataURL('image/png'); a.click();
    } catch (err) {
      alert("Couldn't export — this background blocked the download (CORS). Use the Upload tab for the photo from your device, then download.");
    }
  });

  // ============================================================
  // INIT
  // ============================================================
  var logo = new Image();
  logo.crossOrigin = 'anonymous'; // GitHub sends CORS headers — keeps logo download-clean
  logo.onload = function () { state.logo = logo; render(); };
  logo.onerror = function () { render(); };
  logo.src = LOGO_URL;

  setBaseImage(imgArray.length ? imgArray[currentImgIdx] : '');
  loadEvents();
</script>
</body>
</html>
