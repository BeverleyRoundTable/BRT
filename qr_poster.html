<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Poster Generator | Round Table</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1D1D1A; /* Official Table Grey */
    --surface: #262622;
    --surface-2: #2f2f2a;
    --border: rgba(255,255,255,0.08);
    --text: #FFFFFF; /* Official White */
    --text-dim: rgba(255,255,255,0.6);
    --gold: #FBAF33; /* Official Golden Yellow */
    --gold-dim: rgba(251,175,51,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Open Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── CONTROLS (screen only) ── */
  .controls {
    max-width: 800px;
    margin: 0 auto;
    padding: 32px 24px 24px;
  }

  .controls header {
    text-align: center;
    margin-bottom: 32px;
  }

  .controls h1 {
    font-size: 2.2em;
    font-weight: 800;
    color: var(--gold); /* Fixed: Solid Gold to prevent cream look */
    margin-bottom: 4px;
  }

  .controls header p {
    color: var(--text);
    opacity: 0.8;
    margin-top: 6px;
    font-size: 0.95em;
  }

  .control-row {
    display: flex;
    gap: 12px;
    align-items: end;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .control-group {
    flex: 1;
    min-width: 200px;
  }

  .control-group label {
    display: block;
    font-size: 0.75em;
    font-weight: 700;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }

  .control-group select,
  .control-group input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'Open Sans', sans-serif;
    font-size: 0.9em;
    outline: none;
  }

  .control-group select:focus,
  .control-group input:focus { border-color: var(--gold); }

  .btn {
    font-family: 'Open Sans', sans-serif;
    font-weight: 700;
    font-size: 0.88em;
    border: none;
    border-radius: 10px;
    padding: 12px 24px;
    cursor: pointer;
    transition: transform 0.1s;
    white-space: nowrap;
  }

  .btn:active { transform: scale(0.97); }

  .btn-gold {
    background: var(--gold);
    color: #1a1000;
  }

  .btn-ghost {
    background: var(--surface-2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 20px;
    flex-wrap: wrap;
  }

  /* ── POSTER PREVIEW (screen) ── */
  .poster-preview-wrap {
    max-width: 700px;
    margin: 0 auto;
    padding: 0 24px 60px;
  }

  /* ── THE POSTER (A4) ── */
  .poster {
    width: 210mm;
    min-height: 297mm;
    background: #ffffff;
    color: #1D1D1A;
    font-family: 'Open Sans', sans-serif;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    border-radius: 4px;
  }

  .poster-accent-top {
    height: 10px;
    background: var(--gold); /* Fixed: Brand Gold */
  }

  .poster-content {
    padding: 48px 48px 36px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  .poster-logo {
    width: 90px;
    height: 90px;
    object-fit: contain;
    margin-bottom: 16px;
  }

  .poster-sleigh-name {
    font-size: 14px;
    font-weight: 700;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 24px;
  }

  .poster-headline {
    font-size: 48px;
    font-weight: 900;
    line-height: 1.1;
    color: var(--gold); /* Fixed: Brand Gold Headline */
    margin-bottom: 8px;
    letter-spacing: -0.02em;
  }

  .poster-subline {
    font-size: 22px;
    font-weight: 700;
    color: #1D1D1A;
    margin-bottom: 28px;
    text-transform: uppercase;
  }

  .poster-date-block {
    background: #1D1D1A; /* Fixed: Brand Grey */
    color: white;
    padding: 20px 60px;
    border-radius: 14px;
    margin-bottom: 24px;
  }

  .poster-date-block .day-name {
    font-size: 18px;
    font-weight: 600;
    opacity: 0.9;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .poster-date-block .date-main {
    font-size: 42px;
    font-weight: 900;
    line-height: 1.1;
  }

  .poster-streets {
    font-size: 18px;
    font-weight: 600;
    color: #333;
    line-height: 1.6;
    margin-bottom: 32px;
    max-width: 550px;
  }

  .poster-streets .separator {
    color: var(--gold);
    margin: 0 8px;
    font-weight: 900;
  }

  .poster-divider {
    width: 100px;
    height: 4px;
    background: var(--gold);
    border-radius: 2px;
    margin: 0 auto 32px;
  }

  .poster-qr-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 32px;
  }

  .poster-qr-box {
    padding: 16px;
    border: 4px solid #1D1D1A;
    border-radius: 20px;
    display: inline-block;
    margin-bottom: 16px;
    background: white;
  }

  .poster-scan-text {
    font-size: 24px;
    font-weight: 800;
    color: #1D1D1A;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .poster-footer {
    margin-top: auto;
    padding: 24px 48px;
    background: #1D1D1A;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
  }

  .poster-footer img {
    width: 38px;
    height: 38px;
    object-fit: contain;
  }

  .poster-footer .footer-text {
    font-size: 14px;
    font-weight: 600;
    opacity: 0.9;
  }

  /* ── PRINT ── */
  @media print {
    body { background: white; }
    .controls { display: none !important; }
    .poster-preview-wrap { padding: 0; max-width: none; }
    .poster {
      width: 100%;
      box-shadow: none;
      border-radius: 0;
    }
    @page { margin: 0; size: A4 portrait; }
  }
</style>
</head>
<body>

<div class="controls" id="controls">
  <header>
    <h1>📌 QR Poster Generator</h1>
    <p>Generate brand-compliant route posters for your sleigh</p>
  </header>
  <div id="controlsInner">
    <div style="text-align:center; padding:40px; opacity:0.5;">Loading routes…</div>
  </div>
</div>

<div class="poster-preview-wrap" id="posterWrap" style="display:none;">
  <div class="poster" id="poster"></div>
</div>

<script>
const API = new URLSearchParams(location.search).get('api') || '';

const STATE = {
  settings: {},
  routes: [],
  selectedRoute: 0
};

if (!API) {
  document.getElementById('controlsInner').innerHTML = 
    '<div style="text-align:center; color:#ff6b6b; padding:40px;">Missing <strong>?api=</strong> parameter.</div>';
} else {
  init();
}

async function init() {
  try {
    const res = await fetch(API);
    const data = await res.json();
    STATE.settings = data.settings || {};
    STATE.routes = data.routes || [];

    if (!STATE.routes.length) {
      document.getElementById('controlsInner').innerHTML = '<div style="text-align:center; padding:40px;">No routes found.</div>';
      return;
    }

    renderControls();
    generatePoster();
  } catch(e) {
    document.getElementById('controlsInner').innerHTML = `<div style="text-align:center; padding:40px; color:#ff6b6b;">Failed to load: ${e.message}</div>`;
  }
}

function formatDateLong(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  if (isNaN(d)) return dateStr;
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
}

function getDayName(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][d.getDay()];
}

function renderControls() {
  const options = STATE.routes.map((r, i) => 
    `<option value="${i}">${r.routeName || 'Route'} — ${formatDateLong(r.date)}</option>`
  ).join('');

  document.getElementById('controlsInner').innerHTML = `
    <div class="control-row">
      <div class="control-group">
        <label>Select Route</label>
        <select id="routeSelect" onchange="STATE.selectedRoute=this.value; generatePoster()">
          ${options}
        </select>
      </div>
    </div>
    <div class="control-row">
      <div class="control-group">
        <label>Custom Headline</label>
        <input type="text" id="customHeadline" placeholder="Santa is coming!" oninput="generatePoster()">
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-gold" onclick="window.print()">🖨️ Print Poster</button>
      <button class="btn btn-ghost" onclick="printAll()">🖨️ Print All Routes</button>
    </div>
  `;
}

function generatePoster(idx) {
  const route = STATE.routes[idx !== undefined ? idx : STATE.selectedRoute];
  if (!route) return;

  const s = STATE.settings;
  const headline = document.getElementById('customHeadline')?.value || "Santa's Coming to YOUR Street!";
  const trackerUrl = s.tracker_url || `https://track.sleigh.com/?api=${encodeURIComponent(API)}`;

  const streets = (route.streets || '').split(',').map(s => s.trim()).filter(Boolean);
  const streetsHtml = streets.join('<span class="separator">·</span>');

  let h = `
    <div class="poster-accent-top"></div>
    <div class="poster-content">
      ${s.logo_overlay_url ? `<img class="poster-logo" src="${s.logo_overlay_url}">` : ''}
      <div class="poster-sleigh-name">${s.sleigh_display_name || 'Santa Sleigh'}</div>
      <div class="poster-headline">${headline}</div>
      <div class="poster-subline">${route.routeName || ''}</div>
      
      <div class="poster-date-block">
        <div class="day-name">${getDayName(route.date)}</div>
        <div class="date-main">${formatDateLong(route.date)}</div>
      </div>

      <div class="poster-streets">${streetsHtml}</div>
      <div class="poster-divider"></div>

      <div class="poster-qr-section">
        <div class="poster-qr-box" id="qrTarget"></div>
        <div class="poster-scan-text">Scan to Track Santa LIVE</div>
      </div>
    </div>
    <div class="poster-footer">
      ${s.logo_overlay_url ? `<img src="${s.logo_overlay_url}">` : ''}
      <span class="footer-text">${s.sleigh_display_name || 'Round Table'} · Powered by TurboSanta</span>
    </div>
  `;

  document.getElementById('poster').innerHTML = h;
  document.getElementById('posterWrap').style.display = 'block';

  new QRCode(document.getElementById('qrTarget'), {
    text: trackerUrl,
    width: 220,
    height: 220,
    colorDark: "#1D1D1A",
    correctLevel: QRCode.CorrectLevel.H
  });
}

async function printAll() {
  const wrap = document.getElementById('posterWrap');
  const poster = document.getElementById('poster');
  let allHtml = '';

  for (let i = 0; i < STATE.routes.length; i++) {
    generatePoster(i);
    await new Promise(r => setTimeout(r, 400));
    allHtml += `<div class="poster" style="page-break-after: always;">${poster.innerHTML}</div>`;
  }

  poster.outerHTML = allHtml;
  window.print();
  location.reload(); // Reset after print
}
</script>
</body>
</html>
