<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sleigh Dashboard — Elf Cam</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  
  <style>
    /* ═══════════════════════════════════════ */
    /* TURBOSANTA DESIGN SYSTEM */
    /* ═══════════════════════════════════════ */
    :root {
      --gold: #FBAF33;
      --gold-dim: rgba(251,175,51,0.12);
      --gold-glow: rgba(251,175,51,0.25);
      --dark: #0d0d0b;
      --surface: #161614;
      --surface-2: #1e1e1b;
      --surface-3: #252522;
      --border: rgba(255,255,255,0.08);
      --border-gold: rgba(251,175,51,0.2);
      --red: #D31C1C;
      --green: #2ecc71;
      --text: #eaeae5;
      --text-dim: rgba(255,255,255,0.55);
      --text-muted: rgba(255,255,255,0.3);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 24px;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    /* ── HEADER ── */
    header { margin-bottom: 32px; width: 100%; }
    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 48px;
      letter-spacing: 2px;
      color: #fff;
      line-height: 1;
      margin-bottom: 8px;
    }
    header h1 span { color: var(--gold); }
    header p {
      color: var(--text-dim);
      font-size: 15px;
      font-weight: 500;
    }

    /* ── STATUS PANEL ── */
    .status-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px 24px;
      width: 100%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      margin-bottom: 24px;
    }
    
    .status-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    
    .status-indicator {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 48px;
      letter-spacing: 2px;
      color: var(--red);
      line-height: 1;
    }
    
    .status-indicator.active {
      color: var(--green);
      animation: pulse 2s infinite alternate;
    }
    
    @keyframes pulse {
      from { text-shadow: 0 0 8px rgba(46,204,113,0.2); }
      to { text-shadow: 0 0 24px rgba(46,204,113,0.6); }
    }

    /* ── BUTTONS ── */
    .btn {
      width: 100%;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      padding: 18px 24px;
      cursor: pointer;
      transition: transform 0.1s, background 0.2s, box-shadow 0.2s;
      text-align: center;
    }
    
    .btn:active { transform: scale(0.97); }
    
    .btn-gold {
      background: var(--gold);
      color: #000;
      box-shadow: 0 4px 20px var(--gold-glow);
    }
    
    .btn-gold:hover { background: #e59d28; }
    
    .btn-stop {
      background: rgba(211,28,28,0.15);
      color: var(--red);
      border: 1px solid rgba(211,28,28,0.3);
      box-shadow: none;
    }
    
    .btn-stop:hover { background: rgba(211,28,28,0.25); }

    /* ── VIDEO & PREVIEW ── */
    #video, #canvas { display: none; }
    
    #preview {
      margin-top: 24px;
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--border);
      display: none;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    /* ── LOG CONSOLE ── */
    #log {
      margin-top: 24px;
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--text-dim);
      text-align: left;
      height: 64px;
      overflow: hidden;
      line-height: 1.5;
    }
    
    .log-error { color: var(--red) !important; font-weight: 700; }
    .log-success { color: var(--green) !important; font-weight: 700; }

  </style>
</head>
<body>

  <div class="app">
    <header>
      <h1>SLEIGH <span>DASHBOARD</span></h1>
      <p>Mount phone to dashboard. Keep this page open.</p>
    </header>

    <div class="status-box">
      <div class="status-label">Elf Cam Status</div>
      <div class="status-indicator" id="statusText">OFFLINE</div>
    </div>

    <button class="btn btn-gold" id="startBtn">▶ Start Auto-Camera</button>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    <img id="preview" alt="Last Photo Snapped">

    <div id="log">Waiting to start...</div>
  </div>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const startBtn = document.getElementById('startBtn');
    const statusText = document.getElementById('statusText');
    const preview = document.getElementById('preview');
    const log = document.getElementById('log');

    let stream = null;
    let captureInterval = null;
    const SNAP_INTERVAL_MS = 60000; // Takes a photo every 60 seconds

    // Grab the API URL from memory, just like the tracker does
    const params = new URLSearchParams(location.search);
    const apiUrl = params.get("api") || localStorage.getItem("SANTA_API");

    if (!apiUrl) {
      log.innerHTML = "<span class='log-error'>❌ ERROR: No API URL found. Open the main tracker link first!</span>";
      startBtn.disabled = true;
      startBtn.style.opacity = 0.5;
    } else {
      localStorage.setItem("SANTA_API", apiUrl);
    }

    function addLog(msg, type = "normal") {
      if (type === "error") {
        log.innerHTML = `<span class="log-error">${msg}</span>`;
      } else if (type === "success") {
        log.innerHTML = `<span class="log-success">${msg}</span>`;
      } else {
        log.innerText = msg;
      }
      console.log(msg);
    }

    async function startCamera() {
      try {
        // Request the rear camera
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        video.srcObject = stream;
        
        statusText.innerText = "BROADCASTING";
        statusText.className = "status-indicator active";
        
        startBtn.innerText = "🛑 Stop Camera";
        startBtn.className = "btn btn-stop";
        
        addLog("Camera started. First photo snapping in 5s...");
        
        // Take the first picture quickly, then start the loop
        setTimeout(snapAndUpload, 5000);
        captureInterval = setInterval(snapAndUpload, SNAP_INTERVAL_MS);

      } catch (err) {
        addLog("❌ Camera Error: " + err.message, "error");
        alert("Could not access camera. Make sure permissions are granted!");
      }
    }

    function stopCamera() {
      if (stream) { stream.getTracks().forEach(track => track.stop()); }
      clearInterval(captureInterval);
      
      statusText.innerText = "OFFLINE";
      statusText.className = "status-indicator";
      
      startBtn.innerText = "▶ Start Auto-Camera";
      startBtn.className = "btn btn-gold";
      
      addLog("Camera stopped.");
    }

    async function snapAndUpload() {
      if (!stream) return;
      addLog("📸 Snapping photo...");

      // 1. Calculate a much smaller size (Max 800px wide)
      const MAX_WIDTH = 800;
      let width = video.videoWidth;
      let height = video.videoHeight;
      
      if (width > MAX_WIDTH) {
        height = Math.floor(height * (MAX_WIDTH / width));
        width = MAX_WIDTH;
      }

      // 2. Draw the shrunken image to the canvas
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0, width, height);

      // 3. Compress to a lightweight JPEG (Usually under 100KB!)
      const base64Image = canvas.toDataURL('image/jpeg', 0.85);
      
      // Show local preview
      preview.src = base64Image;
      preview.style.display = "block";

      addLog("☁ Uploading lightweight photo to Google Sheet...");

      try {
        const payload = {
          action: "uploadElfCam",
          imageData: base64Image
        };

        const response = await fetch(apiUrl, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain" // Forces strict CORS bypass
          },
          body: JSON.stringify(payload)
        });

        const data = await response.json();
        if (data.ok) {
          addLog("✅ Upload Success! Next photo in 60s.", "success");
        } else {
          addLog("❌ Upload Failed: " + data.error, "error");
        }
      } catch (err) {
        addLog("❌ Network Error: Could not reach Google. Retrying next loop.", "error");
      }
    }

    startBtn.addEventListener("click", () => {
      if (statusText.innerText === "OFFLINE") { startCamera(); } 
      else { stopCamera(); }
    });
  </script>
</body>
</html>
